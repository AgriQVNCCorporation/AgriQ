<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Elite Leaderboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b; --bg: #000; --surface: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05); --text-main: #fff; --text-dim: #a1a1aa;
            --danger: #ff3b3b; --border: rgba(255, 255, 255, 0.1); --gold: #ffda44;
            --silver: #e2e2e2; --bronze: #cd7f32;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            outline: none;
        }

        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .app-container {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 120px;
        }

        /* --- Elite Animations --- */
        @keyframes crownFloat {
            0%, 100% { transform: translate(-50%, 0) rotate(-5deg) scale(1); filter: drop-shadow(0 0 8px var(--gold)); }
            50% { transform: translate(-50%, -12px) rotate(5deg) scale(1.15); filter: drop-shadow(0 0 20px var(--gold)); }
        }

        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 218, 68, 0.15); border-color: var(--gold); }
            50% { box-shadow: 0 0 40px rgba(255, 218, 68, 0.4); border-color: #fff; }
        }

        /* LOADER */
        #leader-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.6s ease; 
        }
        #leader-loader.fade-out { opacity: 0; visibility: hidden; }
        .spinner { width: 35px; height: 35px; border: 3px solid #111; border-top: 3px solid var(--danger); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .brand span { color: var(--danger); font-family: 'JetBrains Mono'; }

        main { padding: 0 16px; max-width: 500px; margin: 0 auto; }

        /* PODIUM - Fixed Layout Logic */
        .podium { 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 10px; 
            margin: 65px 0 35px; 
            height: 180px; 
            width: 100%;
        }
        .podium-item { 
            background: linear-gradient(180deg, #1a1a1a, #000); 
            border: 2px solid var(--border);
            border-radius: 24px; 
            padding: 15px 4px; 
            text-align: center; 
            flex: 1; 
            position: relative;
            min-width: 0;
            overflow: visible; /* To allow crown to show */
        }

        .podium-1 { 
            height: 100%; 
            animation: goldGlow 3s infinite ease-in-out;
            z-index: 10;
        }
        
        /* The Actual Floating Crown */
        .podium-1::before {
            content: '👑'; 
            position: absolute; 
            top: -45px; 
            left: 50%;
            font-size: 35px; 
            animation: crownFloat 2.5s infinite ease-in-out;
            pointer-events: none;
            z-index: 20;
        }

        .podium-2 { height: 75%; border-color: var(--silver); }
        .podium-3 { height: 62%; border-color: var(--bronze); }

        /* FIXED: Text Overflow Handling */
        .p-name { 
            font-weight: 800; 
            font-size: 11px; 
            display: block; 
            margin: 12px auto 0; 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            width: 90%; 
        }
        .p-score { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 16px; margin-top: 4px; display: block; }

        /* LIST */
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .rank-card {
            background: var(--card-bg); 
            border: 1px solid var(--border);
            padding: 16px 20px; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        
        .rank-num { width: 30px; font-family: 'JetBrains Mono'; font-weight: 800; color: var(--text-dim); font-size: 14px; }
        .user-name { 
            font-weight: 600; 
            color: #fff; 
            flex: 1; 
            font-size: 14px; 
            letter-spacing: -0.2px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .score-val { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 18px; color: var(--danger); }

        /* DASHBOARD BUTTON */
        .btn-home {
            position: fixed; 
            bottom: calc(env(safe-area-inset-bottom) + 25px); 
            left: 50%; 
            transform: translateX(-50%);
            background: #fff; 
            color: #000; 
            padding: 18px 36px; 
            border-radius: 100px;
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            z-index: 2000;
            width: max-content;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div id="leader-loader"><div class="spinner"></div></div>

    <div class="app-container">
        <header>
            <div class="brand">AGRI<span>Q</span> PRO</div>
            <div style="font-size: 10px; font-weight: 900; color: #fff; background: var(--danger); padding: 5px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px;">Hall of Fame</div>
        </header>

        <main>
            <div class="podium" id="podium-area"></div>
            <div class="list-container" id="leaderboard-list"></div>
            <div style="height: 120px;"></div> </main>
    </div>

    <button onclick="window.location.href='index.html'" class="btn-home">
        <i data-lucide="layout-grid" size="18"></i> DASHBOARD
    </button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('leaderboard').orderByChild('score').limitToLast(50).on('value', (snap) => {
            let players = [];
            snap.forEach(child => {
                let data = child.val();
                let cleanName = data.name || data.username || data.User || "Anonymous";
                let cleanScore = data.score !== undefined ? data.score : 0;
                players.push({ name: cleanName, score: cleanScore });
            });

            players.sort((a, b) => b.score - a.score); 
            renderUI(players);
            document.getElementById('leader-loader').classList.add('fade-out');
        });

        function renderUI(users) {
            const podium = document.getElementById('podium-area');
            const list = document.getElementById('leaderboard-list');

            podium.innerHTML = `
                <div class="podium-item podium-2">
                    <span style="font-size:24px">🥈</span>
                    <span class="p-name">${users[1]?.name || '---'}</span>
                    <span class="p-score" style="color:var(--silver)">${users[1]?.score || 0}%</span>
                </div>
                <div class="podium-item podium-1">
                    <span style="font-size:32px">🥇</span>
                    <span class="p-name" style="color:var(--gold); font-weight:900; font-size:13px;">${users[0]?.name || '---'}</span>
                    <span class="p-score" style="color:var(--gold)">${users[0]?.score || 0}%</span>
                </div>
                <div class="podium-item podium-3">
                    <span style="font-size:20px">🥉</span>
                    <span class="p-name">${users[2]?.name || '---'}</span>
                    <span class="p-score" style="color:var(--bronze)">${users[2]?.score || 0}%</span>
                </div>
            `;

            list.innerHTML = "";
            users.forEach((u, i) => {
                const card = document.createElement('div');
                card.className = "rank-card";
                card.style.animation = `fadeIn 0.3s ease forwards ${i * 0.04}s`;
                card.style.opacity = "0";
                card.innerHTML = `
                    <div class="rank-num">#${i+1}</div>
                    <div class="user-name">${u.name}</div>
                    <div class="user-score"><span class="score-val">${u.score}%</span></div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
