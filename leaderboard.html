<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>AgriQ Pro | Hall of Champions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.3);
            --bg: #020617;
            --surface: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1e293b;
            --gold: #f59e0b;
            --silver: #94a3b8;
            --bronze: #b45309;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); margin: 0; color: var(--text-main); 
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; 
        }

        #leader-loader {
            position: fixed; inset: 0; background: #020617; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #leader-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px;
            background: var(--surface); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-weight: 900; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }

        .btn-icon {
            background: var(--glass); color: var(--text-main); padding: 10px;
            border-radius: 12px; border: 1.5px solid var(--border); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        main { padding: 0 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin: 50px 0 30px; }
        .podium-item { 
            background: var(--surface); border: 1.5px solid var(--border); border-radius: 24px;
            padding: 20px 10px; text-align: center; position: relative; flex: 1;
            display: flex; flex-direction: column; align-items: center; min-width: 0;
            transition: var(--transition);
        }
        .podium-1 { 
            height: 220px; border-color: var(--gold); 
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.1) 0%, var(--surface) 100%);
            transform: scale(1.08); z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .podium-1 .crown { position: absolute; top: -30px; font-size: 32px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 10px var(--gold)); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .avatar-box {
            width: 50px; height: 50px; border-radius: 16px; border: 2px solid var(--border);
            margin-bottom: 12px; overflow: hidden; background: var(--bg);
            display: flex; align-items: center; justify-content: center; font-weight: 900;
            position: relative; background-size: cover; background-position: center;
        }
        .podium-1 .avatar-box { width: 65px; height: 65px; border-color: var(--gold); border-width: 3px; border-radius: 20px; }

        .p-name { font-weight: 800; font-size: 10px; text-transform: uppercase; color: var(--text-dim); width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
        .podium-1 .p-name { color: var(--gold); font-size: 11px; letter-spacing: 0.5px; }
        .p-score { font-family: 'JetBrains Mono'; font-weight: 900; font-size: 18px; color: var(--text-main); }

        .rank-card {
            background: var(--surface); border: 1.5px solid var(--border);
            padding: 14px 16px; border-radius: 20px;
            display: flex; align-items: center; gap: 14px; margin-bottom: 10px;
            transition: 0.2s; position: relative;
        }
        .rank-card.is-me { 
            border-color: var(--primary); 
            background: var(--primary-glow);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
        }
        
        .rank-1 { border-color: var(--gold); }
        .rank-2 { border-color: var(--silver); }
        .rank-3 { border-color: var(--bronze); }

        .list-img {
            width: 42px; height: 42px; border-radius: 12px; border: 1.5px solid var(--border);
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; background: var(--bg); background-size: cover; background-position: center;
        }

        .rank-num { width: 22px; font-family: 'JetBrains Mono'; font-weight: 800; color: var(--text-dim); font-size: 13px; text-align: center; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 6px; color: var(--text-main); }
        .user-meta { font-size: 8px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px; }
        .score-val { font-family: 'JetBrains Mono'; font-weight: 900; color: var(--primary); font-size: 15px; }
        .me-badge { 
            background: var(--primary); color: #000; font-size: 7px; 
            padding: 2px 6px; border-radius: 4px; font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="leader-loader">
        <div style="color:var(--primary);"><i data-lucide="zap" class="animate-pulse" size="48"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size:10px; margin-top:15px; letter-spacing:2px; font-weight:800; color: var(--primary);">ESTABLISHING UPLINK...</p>
    </div>

    <header>
        <div class="brand">HALL OF <span>CHAMPIONS</span></div>
        <button onclick="window.location.href='index.html'" class="btn-icon" aria-label="Dashboard"><i data-lucide="home" size="18"></i></button>
    </header>

    <main>
        <div class="podium" id="podium-area"></div>
        <div id="leaderboard-list"></div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUid = null;
        let studentsData = {};
        let cachedScores = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUid = user.uid;
                initGlobalSync();
            } else {
                window.location.href = 'index.html';
            }
        });

        function initGlobalSync() {
            db.ref('students').on('value', (snap) => {
                studentsData = snap.val() || {};
                if (cachedScores) processData(cachedScores);
            });

            db.ref('leaderboard').on('value', (snap) => {
                cachedScores = snap.val() || {};
                processData(cachedScores);
            });
        }

        function processData(rawData) {
            const aggregated = {};

            Object.values(rawData).forEach(entry => {
                if (!entry.uid) return;
                if (!aggregated[entry.uid]) {
                    aggregated[entry.uid] = { 
                        uid: entry.uid, 
                        score: 0, 
                        acc: 0, 
                        count: 0,
                        originalName: entry.name 
                    };
                }
                aggregated[entry.uid].score += (parseInt(entry.score) || 0);
                aggregated[entry.uid].acc += (parseFloat(entry.accuracy) || 0);
                aggregated[entry.uid].count++;
            });

            const sorted = Object.values(aggregated).map(u => {
                const profile = studentsData[u.uid] || {};
                const finalName = profile.name || u.originalName || "CHAMPION";
                const finalPhoto = profile.profilePic || profile.photoURL || null;

                return {
                    ...u,
                    displayName: finalName.toUpperCase(),
                    photo: finalPhoto,
                    avgAcc: Math.round(u.acc / u.count)
                };
            }).sort((a, b) => b.score - a.score);

            renderUI(sorted);
            const loader = document.getElementById('leader-loader');
            if(loader) loader.classList.add('fade-out');
        }

        function renderUI(users) {
            const podium = document.getElementById('podium-area');
            const list = document.getElementById('leaderboard-list');

            const getAvatarHtml = (u, borderColor) => {
                if (!u) return `<div class="avatar-box" style="border-color:${borderColor}">?</div>`;
                const style = u.photo ? `background-image:url('${u.photo}'); border-color:${borderColor};` : `border-color:${borderColor};`;
                return `<div class="avatar-box" style="${style}">${u.photo ? '' : u.displayName[0]}</div>`;
            };

            if (users.length >= 1) {
                podium.innerHTML = `
                    <div class="podium-item podium-2">
                        ${getAvatarHtml(users[1], 'var(--silver)')}
                        <span class="p-name">${users[1]?.displayName || '---'}</span>
                        <span class="p-score">${users[1]?.score || 0}</span>
                    </div>
                    <div class="podium-item podium-1">
                        <div class="crown">👑</div>
                        ${getAvatarHtml(users[0], 'var(--gold)')}
                        <span class="p-name">${users[0]?.displayName || '---'}</span>
                        <span class="p-score">${users[0]?.score || 0}</span>
                    </div>
                    <div class="podium-item podium-3">
                        ${getAvatarHtml(users[2], 'var(--bronze)')}
                        <span class="p-name">${users[2]?.displayName || '---'}</span>
                        <span class="p-score">${users[2]?.score || 0}</span>
                    </div>
                `;
            }

            list.innerHTML = users.map((u, i) => {
                const rank = i + 1;
                const isMe = u.uid === currentUid;
                const imgStyle = u.photo ? `background-image:url('${u.photo}');` : '';
                
                return `
                    <div class="rank-card ${isMe ? 'is-me' : ''} ${rank <= 3 ? 'rank-'+rank : ''}">
                        <div class="rank-num">${rank}</div>
                        <div class="list-img" style="${imgStyle}">
                            ${u.photo ? '' : u.displayName[0]}
                        </div>
                        <div class="user-info">
                            <div class="user-name">
                                <span>${u.displayName}</span>
                                ${isMe ? '<span class="me-badge">YOU</span>' : ''}
                                ${rank <= 3 ? '<i data-lucide="shield-check" size="10" style="color:var(--primary);"></i>' : ''}
                            </div>
                            <div class="user-meta">${u.avgAcc}% ACC • ${getLevel(u.score)}</div>
                        </div>
                        <div class="score-val">${u.score}</div>
                    </div>
                `;
            }).join('');

            if(window.lucide) lucide.createIcons();
        }

        function getLevel(score) {
            if (score > 5000) return "ELITE SQUAD";
            if (score > 2000) return "PRO HUNTER";
            return "ASPIRANT";
        }
    </script>
</body>
</html>
