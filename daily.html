<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f9ff">
    <title>AgriQ Pro | Daily Rapid Drill</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #10b981; 
            --primary-glow: rgba(16, 185, 129, 0.1);
            --bg: #f0fdf4;
            --surface: #ffffff;
            --text-main: #064e3b;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.15);
            --warning: #eab308; 
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #dcfce7, transparent);
            margin: 0; color: var(--text-main); min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden; overflow-y: auto;
        }

        #app-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transition: 0.6s; }
        
        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }

        .timer-badge { 
            background: #fff; color: var(--danger); padding: 8px 16px; 
            border-radius: 12px; border: 1.5px solid var(--danger); 
            font-family: 'JetBrains Mono'; font-weight: 800; font-size: 14px;
        }

        .profile-container { width: 42px; height: 42px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; padding-bottom: 200px; }

        .marker-scroll { 
            display: flex; gap: 10px; overflow-x: auto; padding: 5px 5px 20px 5px; 
            scrollbar-width: none; position: sticky; top: 80px; z-index: 999;
        }
        .marker-scroll::-webkit-scrollbar { display: none; }
        
        .q-pill { 
            min-width: 42px; height: 42px; border-radius: 12px; background: #fff; border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-dim); flex-shrink: 0;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        
        .q-pill.done { background: var(--primary); border-color: var(--primary); color: #fff; }
        .q-pill.marked { background: var(--warning); border-color: var(--warning); color: #fff; }
        .q-pill.active { border-color: var(--primary); color: var(--text-main); background: var(--primary-glow); border-width: 2px; }

        .q-card { background: #fff; border-radius: 28px; padding: 26px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        .opt-box { 
            background: #fff; border: 1.5px solid var(--border); padding: 18px; 
            border-radius: 20px; margin-bottom: 12px; font-weight: 700; cursor: pointer; color: var(--text-main);
            transition: 0.2s; font-size: 14px; line-height: 1.4;
        }
        .opt-box.selected { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: 0 8px 20px var(--primary-glow); }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 460px; padding: 16px; background: var(--glass);
            backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px;
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); z-index: 1001;
        }

        .btn-row { display: flex; gap: 10px; }
        .btn-primary { flex: 1.5; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;}
        .btn-sec { flex: 1; padding: 16px; border-radius: 18px; background: #fff; color: var(--text-main); border: 1.5px solid var(--border); font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;}

        #custom-modal { position: fixed; inset: 0; background: rgba(6, 78, 59, 0.4); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 24px; backdrop-filter: blur(8px); }
        .modal-content { background: #fff; width: 100%; max-width: 350px; border-radius: 28px; padding: 30px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-loader">
        <div id="loader-icon" style="color:var(--primary);"><i data-lucide="zap" size="64" fill="currentColor"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; font-weight: 800;">GENERATING DAILY DRILL...</p>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <div id="modal-title" style="font-weight:900; margin-bottom:10px; text-transform:uppercase; color:var(--primary);">Alert</div>
            <div id="modal-text" style="font-size:13px; color:var(--text-dim); margin-bottom:25px;">Message</div>
            <div class="modal-actions" style="display:flex; gap:12px;">
                <button class="btn-sec" id="modal-cancel-btn">CANCEL</button>
                <button class="btn-primary" id="modal-confirm-btn">CONFIRM</button>
            </div>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="profile-container" id="user-initial">U</div>
            <div>
                <div style="font-weight: 900; font-size: 9px; letter-spacing: 1px; color: var(--primary);">DAILY RAPID DRILL</div>
                <span id="user-display-name" style="font-weight:800; font-size:14px; color:var(--text-main);">STUDENT</span>
            </div>
        </div>
        <div id="q-timer" class="timer-badge">05:00</div>
    </header>

    <main id="main-content">
        <div id="marker-grid" class="marker-scroll"></div>
        
        <div class="q-card">
            <div id="q-display" style="font-size: 17px; font-weight: 700; line-height: 1.6; color: var(--text-main);">Preparing your assessment...</div>
        </div>

        <div id="opts-display"></div>
    </main>

    <div class="controls">
        <div class="btn-row">
            <button class="btn-sec" style="flex: 1;" onclick="changeQ(-1)"><i data-lucide="chevron-left" size="20"></i></button>
            <button class="btn-sec" id="mark-btn" style="flex: 2; border-color: var(--warning); color: var(--warning);" onclick="toggleMark()">
                MARK <i data-lucide="bookmark" size="18"></i>
            </button>
            <button class="btn-primary" style="flex: 1.5;" onclick="changeQ(1)">NEXT <i data-lucide="chevron-right" size="20"></i></button>
        </div>
        <button class="btn-primary" style="background:var(--text-main); width: 100%;" onclick="submitTest()">
            FINISH DRILL <i data-lucide="check-circle" size="18"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let questions = [], currentIdx = 0, userChoices = {}, markedQuestions = {}, timer;
        let totalSecondsRemaining = 300; // STRICT 5 MINUTE TIMER
        const moduleKey = "DAILY_DRILL"; // Fixed identifier for leaderboard
        let isSubmitting = false;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && !isSubmitting) processFinalResults();
        });

        auth.onAuthStateChanged(user => {
            if (!user) return window.location.href = 'index.html';
            db.ref(`students/${user.uid}`).once('value', snap => {
                const userData = snap.val();
                if (userData && userData.name) {
                    document.getElementById('user-display-name').innerText = userData.name.toUpperCase();
                    document.getElementById('user-initial').innerText = userData.name[0];
                }
            });
            loadDailyQuestions();
        });

        async function loadDailyQuestions() {
            try {
                const snap = await db.ref('subjects').once('value');
                if (snap.exists()) {
                    let allQuestionsPool = [];
                    
                    // Iterate through ALL subjects and pool questions unconditionally
                    snap.forEach(moduleSnap => {
                        const data = moduleSnap.val();
                        if (data) {
                            // Extract questions safely based on standard database structures
                            let rawQs = [];
                            if (Array.isArray(data)) {
                                rawQs = data;
                            } else if (data.questions) {
                                rawQs = data.questions.data || data.questions || [];
                            }
                            
                            // Only add if it's an array
                            if (Array.isArray(rawQs)) {
                                allQuestionsPool = allQuestionsPool.concat(rawQs);
                            }
                        }
                    });

                    // Filter out any "null" or undefined questions to prevent crashes
                    allQuestionsPool = allQuestionsPool.filter(q => q != null && typeof q === 'object');

                    if(allQuestionsPool.length === 0) {
                        document.getElementById('app-loader').classList.add('fade-out');
                        return showModal("NO DATA", "No active questions found in the database.", "alert", () => window.location.href='index.html');
                    }

                    // Shuffle the giant pool of questions
                    allQuestionsPool.sort(() => Math.random() - 0.5);

                    // Pick exactly 10 random questions (or less if pool is smaller)
                    const selected10 = allQuestionsPool.slice(0, 10);
                    
                    setupQuestions(selected10);
                } else {
                    document.getElementById('app-loader').classList.add('fade-out');
                    showModal("ERROR", "Database empty.", "alert", () => window.location.href='index.html');
                }
            } catch (e) { 
                console.error(e); 
                document.getElementById('app-loader').classList.add('fade-out');
                showModal("DATABASE ERROR", "Failed to load: " + e.message, "alert", () => window.location.href='index.html');
            }
        }

        function setupQuestions(dataArray) {
            questions = dataArray.map(q => ({
                ...q,
                displayQ: q.question || q.q || "Missing Question Text",
                correct: q.answer || q.ans,
                shuffledOpts: [...(q.options || [])].sort(() => Math.random() - 0.5)
            }));
            initUI();
            document.getElementById('app-loader').classList.add('fade-out');
            startGlobalTimer();
        }

        function initUI() {
            const grid = document.getElementById('marker-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const p = document.createElement('div');
                p.className = 'q-pill';
                p.id = `mark-${i}`;
                p.innerText = i + 1;
                p.onclick = () => { currentIdx = i; showQ(); };
                grid.appendChild(p);
            });
            showQ();
        }

        function toggleMark() {
            markedQuestions[currentIdx] = !markedQuestions[currentIdx];
            showQ();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('q-display').innerText = q.displayQ;
            
            document.querySelectorAll('.q-pill').forEach((p, i) => {
                p.classList.remove('active', 'done', 'marked');
                
                if (markedQuestions[i]) {
                    p.classList.add('marked');
                } else if (userChoices[i] !== undefined && userChoices[i] !== null) {
                    p.classList.add('done');
                }
                
                if (i === currentIdx) {
                    p.classList.add('active');
                }
            });

            const markBtn = document.getElementById('mark-btn');
            if (markedQuestions[currentIdx]) {
                markBtn.style.background = 'var(--warning)';
                markBtn.style.color = '#fff';
                markBtn.innerHTML = 'MARKED <i data-lucide="bookmark-check" size="18"></i>';
            } else {
                markBtn.style.background = '#fff';
                markBtn.style.color = 'var(--warning)';
                markBtn.innerHTML = 'MARK <i data-lucide="bookmark" size="18"></i>';
            }

            const optBox = document.getElementById('opts-display');
            optBox.innerHTML = '';
            q.shuffledOpts.forEach(opt => {
                const div = document.createElement('div');
                div.className = `opt-box ${userChoices[currentIdx] === opt ? 'selected' : ''}`;
                div.innerText = opt;
                
                div.onclick = () => { 
                    if (userChoices[currentIdx] === opt) {
                        userChoices[currentIdx] = null;
                    } else {
                        userChoices[currentIdx] = opt;
                    }
                    showQ(); 
                };
                optBox.appendChild(div);
            });
            
            document.getElementById(`mark-${currentIdx}`).scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            lucide.createIcons();
        }

        function startGlobalTimer() {
            timer = setInterval(() => {
                if (totalSecondsRemaining <= 0) { clearInterval(timer); processFinalResults(); }
                else {
                    totalSecondsRemaining--;
                    let m = Math.floor(totalSecondsRemaining/60).toString().padStart(2,'0');
                    let s = (totalSecondsRemaining%60).toString().padStart(2,'0');
                    document.getElementById('q-timer').innerText = `${m}:${s}`;
                    
                    if(totalSecondsRemaining <= 30) {
                        document.getElementById('q-timer').style.background = totalSecondsRemaining % 2 === 0 ? 'var(--danger)' : '#fff';
                        document.getElementById('q-timer').style.color = totalSecondsRemaining % 2 === 0 ? '#fff' : 'var(--danger)';
                    }
                }
            }, 1000);
        }

        function changeQ(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) { 
                currentIdx = next; 
                showQ(); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function submitTest() { 
            showModal("SUBMIT DRILL", "Are you sure you want to finalize your daily drill?", "confirm", processFinalResults); 
        }

        async function processFinalResults() {
            if(isSubmitting) return;
            isSubmitting = true;
            clearInterval(timer);

            let score = 0;
            const details = questions.map((q, i) => {
                const userAns = (userChoices[i] === null || userChoices[i] === undefined) ? "SKIPPED" : userChoices[i];
                const isCorrect = userAns === q.correct;
                if(isCorrect) score++;
                return { question: q.displayQ, user: userAns, actual: q.correct };
            });

            const resultData = { 
                uid: auth.currentUser.uid,
                score, total: questions.length, 
                accuracy: Math.round((score / (questions.length || 1)) * 100),
                module: moduleKey, timestamp: Date.now() 
            };

            try {
                await db.ref('leaderboard').push(resultData);
                const userRef = db.ref(`students/${auth.currentUser.uid}`);
                const snap = await userRef.once('value');
                const d = snap.val() || {};
                
                const newTests = (d.testsTaken || 0) + 1;
                await userRef.update({
                    totalScore: (d.totalScore || 0) + score,
                    testsTaken: newTests,
                    avgAccuracy: Math.round(((d.avgAccuracy || 0) * (newTests - 1) + resultData.accuracy) / newTests)
                });

                localStorage.setItem('agriq_last_result', JSON.stringify({ ...resultData, details }));
                window.location.replace('analysisdaily.html');
            } catch (e) {
                window.location.replace('analysisdaily.html');
            }
        }

        function showModal(title, text, type, onConfirm) {
            const m = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            m.style.display = 'flex';
            document.getElementById('modal-confirm-btn').onclick = () => { m.style.display='none'; if(onConfirm) onConfirm(); };
            document.getElementById('modal-cancel-btn').onclick = () => m.style.display='none';
            if(type === 'alert') document.getElementById('modal-cancel-btn').classList.add('hidden');
            else document.getElementById('modal-cancel-btn').classList.remove('hidden');
        }

        lucide.createIcons();
    </script>
</body>
</html>
