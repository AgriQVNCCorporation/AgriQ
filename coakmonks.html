<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>AgriQ Pro | COAK Monks</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            /* COAK Theme Colors */
            --primary: #8b5cf6; 
            --primary-dark: #7c3aed;
            --primary-light: #ede9fe;
            --bg: #f5f3ff; 
            --surface: #ffffff;
            --text-main: #2e1065; 
            --text-dim: #6d28d9; 
            --border: #ddd6fe;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); margin: 0; color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }

        header { 
            padding: 20px 24px; background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(15px); position: sticky; top: env(safe-area-inset-top); z-index: 100;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--primary-light); padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .back-btn:active { transform: scale(0.9); }
        .brand { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .brand i { color: var(--primary); }

        main { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* General Stats Grid */
        .rank-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }
        
        .rank-card { 
            padding: 20px; border-radius: 28px; color: white;
            display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: var(--transition); cursor: pointer;
            text-decoration: none;
        }
        .rank-card:active { transform: scale(0.96); }
        .rank-global { background: linear-gradient(135deg, #0084ff 0%, #00c6ff 100%); }
        .rank-daily { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }

        .rank-bg-icon { position: absolute; right: -10px; bottom: -15px; opacity: 0.2; transform: rotate(-15deg); pointer-events: none; }
        .r-title { font-size: 9px; font-weight: 800; opacity: 0.9; text-transform: uppercase; letter-spacing:1px; margin-bottom: 4px; display: block; }
        .r-val { font-size: 32px; font-weight: 900; font-family: 'JetBrains Mono'; line-height: 1; }
        .r-pts { font-size: 10px; font-weight: 800; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-top: 8px; }

        /* Level Up Stats Card */
        .stats-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 24px; border-radius: 28px; color: white;
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.25);
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .stats-bg-icon { position: absolute; right: -15px; top: -10px; opacity: 0.1; transform: rotate(15deg); pointer-events: none; }
        
        .level-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; position: relative; z-index: 2; }
        .level-info h4 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; opacity: 0.9; }
        .level-info .lvl-val { font-size: 36px; font-weight: 900; font-family: 'JetBrains Mono'; line-height: 1; margin-top: 4px; }
        .xp-pill { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; backdrop-filter: blur(5px); }

        .progress-container { background: rgba(0,0,0,0.2); height: 8px; border-radius: 10px; overflow: hidden; position: relative; z-index: 2; }
        .progress-bar { background: #fff; height: 100%; border-radius: 10px; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-text { font-size: 10px; font-weight: 700; opacity: 0.8; margin-top: 8px; text-align: right; display: block; position: relative; z-index: 2; }

        /* Module Selection Card */
        .module-card { 
            background: var(--surface); padding: 24px; border-radius: 28px; 
            border: 1px solid var(--border); margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.05);
        }
        
        .custom-select { position: relative; margin-top: 15px; }
        .select-btn {
            width: 100%; padding: 18px 20px; border-radius: 18px; 
            border: 1.5px solid var(--border); background: var(--bg); font-weight: 700;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; color: var(--text-main); transition: var(--transition);
        }
        .select-btn.active { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); background: #fff; }
        .select-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--surface);
            border: 1px solid var(--border); border-radius: 18px; margin-top: 8px;
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.15); z-index: 50; display: none;
            max-height: 250px; overflow-y: auto;
        }
        .select-dropdown.show { display: block; animation: fadeIn 0.2s ease; }
        .select-option {
            padding: 16px 20px; font-weight: 600; cursor: pointer; border-bottom: 1px solid var(--bg);
            transition: var(--transition); display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .select-option:last-child { border-bottom: none; }
        .select-option:hover { background: var(--primary-light); color: var(--primary-dark); padding-left: 25px; }

        .btn-start {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--primary); color: white; font-weight: 800;
            font-size: 16px; margin-top: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); transition: var(--transition);
        }
        .btn-start:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(139, 92, 246, 0.2); }

        /* FIXED POST CAROUSEL SECTION */
        .post-section { margin-top: 30px; margin-bottom: 20px; }
        .section-title { font-weight: 900; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .carousel-container { overflow: hidden; width: 100%; border-radius: 24px; position: relative; }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; align-items: flex-start; }
        .carousel-slide { min-width: 100%; flex-shrink: 0; padding-bottom: 10px; }
        
        .post-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); width: 100%;
            display: flex; flex-direction: column; max-height: 280px; 
            margin: 0 2px; /* Prevent shadow clipping */
        }
        
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-shrink: 0; }
        .post-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        .post-meta h4 { margin: 0; font-size: 14px; font-weight: 800; color: var(--text-main); }
        .post-meta span { font-size: 10px; color: var(--text-dim); font-weight: 600; }
        
        .post-content { 
            font-size: 13px; color: var(--text-dim); line-height: 1.6; font-weight: 600; 
            overflow-y: auto; overflow-x: hidden; padding-right: 5px; word-wrap: break-word;
            flex-grow: 1;
        }
        
        /* Custom scrollbar for post content */
        .post-content::-webkit-scrollbar { width: 4px; }
        .post-content::-webkit-scrollbar-track { background: transparent; }
        .post-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .dots-container { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: 0.3s; }
        .dot.active { background: var(--primary); width: 14px; border-radius: 4px; }

        footer { text-align: center; padding: 30px 20px 10px; color: var(--text-dim); }
        .copyright { font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 800; letter-spacing: 1px; }

        /* Custom Toast & Modal */
        #toast { 
            position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            background: #2e1065; color: white; padding: 14px 24px; border-radius: 50px;
            font-size: 13px; font-weight: 700; display: none; z-index: 10001; 
            animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            white-space: nowrap; box-shadow: 0 10px 25px rgba(46, 16, 101, 0.4);
            border: 1px solid #4c1d95;
        }

        #modal-overlay {
            position: fixed; inset: 0; background: rgba(46, 16, 101, 0.6); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px;
        }
        .modal { background: white; padding: 30px; border-radius: 32px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); border: 2px solid var(--primary-light); }
        .modal-btn { padding: 16px 24px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; flex: 1; transition: var(--transition); }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="margin-top:0; font-weight:900; color: var(--text-main);">Title</h3>
            <div id="m-body"><p id="m-text" style="color:var(--text-dim); font-size:14px; line-height:1.5; font-weight:600;">Message</p></div>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button class="modal-btn" style="background:var(--primary-light); color:var(--text-dim);" onclick="closeModal()">Cancel</button>
                <button class="modal-btn" style="background:var(--primary); color:white" id="m-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div class="back-btn" onclick="window.location.href='dashboard.html'">
                <i data-lucide="chevron-left" size="22" color="var(--primary-dark)"></i>
            </div>
            <div class="brand"><i data-lucide="book-open-check" size="22"></i> COAK MONKS</div>
        </div>
        <i data-lucide="help-circle" size="20" style="color:var(--text-dim); cursor:pointer;" onclick="showInfo()"></i>
    </header>

    <main>
        <div class="rank-grid">
            <a href="leaderboard.html" class="rank-card rank-global">
                <i data-lucide="globe" size="100" class="rank-bg-icon"></i>
                <span class="r-title">Global Rank</span>
                <div class="r-val">#<span id="rank-val">--</span></div>
                <div><span class="r-pts" id="points-val">0 XP</span></div>
            </a>
            
            <a href="leaderboarddaily.html" class="rank-card rank-daily">
                <i data-lucide="zap" size="100" class="rank-bg-icon"></i>
                <span class="r-title">Daily Drill Rank</span>
                <div class="r-val">#<span id="daily-rank-val">--</span></div>
                <div><span class="r-pts" id="daily-points-val">0 XP</span></div>
            </a>
        </div>

        <div class="stats-card">
            <i data-lucide="swords" size="140" class="stats-bg-icon"></i>
            <div class="level-header">
                <div class="level-info">
                    <h4>Monk Level</h4>
                    <div class="lvl-val" id="coak-level">--</div>
                </div>
                <div class="xp-pill"><span id="coak-xp">0</span> XP</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="xp-bar"></div>
            </div>
            <span class="progress-text" id="xp-needed">Loading...</span>
        </div>

        <div class="module-card">
            <h3 style="margin: 0; font-weight: 900; font-size:18px;">Specialized Training</h3>
            <p style="font-size: 12px; color: var(--text-dim); margin: 6px 0 18px; font-weight:600;">Select an advanced COAK Monk Test</p>
            
            <div class="custom-select">
                <div class="select-btn" id="select-btn" onclick="toggleDropdown()">
                    <span id="selected-text" style="display:flex; align-items:center; gap:10px;">
                        <i data-lucide="target" size="18" color="var(--primary)"></i> Choose Module
                    </span>
                    <i data-lucide="chevron-down" size="18" id="dropdown-icon" style="color:var(--text-dim); transition:0.3s;"></i>
                </div>
                <div class="select-dropdown" id="select-dropdown">
                    <div class="select-option" style="color:var(--text-dim); text-align:center; justify-content:center;">FETCHING FROM DATABASE...</div>
                </div>
            </div>

            <button class="btn-start" onclick="initiateTest()">
                Start Test<i data-lucide="swords" size="18"></i>
            </button>
        </div>

        <div class="post-section">
            <div class="section-title"><i data-lucide="radio" size="18" color="var(--primary)"></i> Exam Updates</div>
            
            <div class="carousel-container">
                <div class="carousel-track" id="post-track">
                    <div style="width:100%; text-align:center; padding:20px; color:var(--text-dim); font-size:12px;">Loading updates...</div>
                </div>
            </div>
            <div class="dots-container" id="post-dots"></div>
        </div>

        <footer>
            <div class="copyright">© 2026 AGRIQ PRO V5.0</div>
            <div style="font-size: 10px; margin-top: 6px; font-weight:600;">Designed for Excellence</div>
        </footer>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        lucide.createIcons();

        let currentSelectedModule = "";
        let currentSelectedIsRetake = false; // Added tracking for retakes
        let completedModules = new Set();
        const XP_PER_LEVEL = 500; // XP required per COAK level
        
        // Carousel Variables
        let slideIndex = 0;
        let slideInterval = null;

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = 'login.html';
            else {
                loadDashboardData(user.uid); // Load Global & Daily Ranks
                loadCoakData(user.uid);      // Load COAK specific XP and Modules
                loadPosts();                 // Load Exam Updates Carousel
                fetchCustomToast();
            }
        });

        // 1. Fetch Custom Toast from "coakmonk" node
        function fetchCustomToast() {
            db.ref('coakmonk/announcement').once('value', snap => {
                if(snap.exists()) {
                    const msg = snap.val();
                    setTimeout(() => showToast(`🔮 ${msg}`), 1000);
                } else {
                    setTimeout(() => showToast("🎖️ Welcome to the COAK Monks Test!"), 1000);
                }
            });
        }

        // 2. Load General Dashboard Data (Global & Daily Drill Ranks)
        function loadDashboardData(uid) {
            db.ref('leaderboard').on('value', snap => {
                const globalScores = {};
                const dailyScores = {};

                snap.forEach(child => {
                    const d = child.val();

                    if (d.module === "DAILY_DRILL") {
                        if(!dailyScores[d.uid]) dailyScores[d.uid] = 0;
                        dailyScores[d.uid] += (parseInt(d.score) || 0);
                    } else {
                        if(!globalScores[d.uid]) globalScores[d.uid] = 0;
                        globalScores[d.uid] += (parseInt(d.score) || 0);
                    }
                });

                const sortedGlobal = Object.entries(globalScores).sort((a,b) => b[1] - a[1]);
                const gRank = sortedGlobal.findIndex(x => x[0] === uid) + 1;
                document.getElementById('rank-val').innerText = gRank > 0 ? gRank : "--";
                document.getElementById('points-val').innerText = (globalScores[uid] || 0) + " XP";

                const sortedDaily = Object.entries(dailyScores).sort((a,b) => b[1] - a[1]);
                const dRank = sortedDaily.findIndex(x => x[0] === uid) + 1;
                document.getElementById('daily-rank-val').innerText = dRank > 0 ? dRank : "--";
                document.getElementById('daily-points-val').innerText = (dailyScores[uid] || 0) + " XP";
            });
        }

        // 3. Load User Stats and Completed Modules (COAK Specific)
        function loadCoakData(uid) {
            db.ref(`students/${uid}/coakXP`).on('value', snap => {
                let xp = snap.val() || 0;
                updateLevelUI(xp);
            });

            db.ref(`students/${uid}/coakCompleted`).on('value', snap => {
                completedModules.clear();
                if(snap.exists()) {
                    snap.forEach(child => completedModules.add(child.key));
                }
                fetchCoakModules();
            });
        }

        function updateLevelUI(xp) {
            const currentLevel = Math.floor(xp / XP_PER_LEVEL) + 1;
            const currentLevelXP = xp % XP_PER_LEVEL;
            const progressPercent = (currentLevelXP / XP_PER_LEVEL) * 100;

            document.getElementById('coak-level').innerText = currentLevel;
            document.getElementById('coak-xp').innerText = xp;
            document.getElementById('xp-bar').style.width = `${progressPercent}%`;
            document.getElementById('xp-needed').innerText = `${currentLevelXP} / ${XP_PER_LEVEL} to Next Level`;
        }

        // 4. Fetch Modules strictly from 'coakmonk/modules' node
        function fetchCoakModules() {
            db.ref('coakmonk/modules').once('value', snap => {
                const dropdown = document.getElementById('select-dropdown');
                dropdown.innerHTML = '';
                let activeCount = 0;

                if (!snap.exists()) {
                    dropdown.innerHTML = `<div class="select-option locked" style="justify-content:center;">NO MODULES CONFIGURED</div>`;
                    return;
                }
                
                snap.forEach(sub => {
                    const modData = sub.val();
                    if (modData.enabled !== false) {
                        activeCount++;
                        const val = sub.key;
                        const label = modData.displayName || sub.key.replace(/_/g, ' ').toUpperCase();
                        const isCompleted = completedModules.has(val);
                        
                        const optionDiv = document.createElement('div');
                        optionDiv.className = `select-option`; // Removed 'locked' so they can be selected again
                        
                        if (isCompleted) {
                            optionDiv.innerHTML = `
                                <span style="display:flex; align-items:center; gap:10px;">
                                    <i data-lucide="check-circle-2" size="16" color="var(--primary)" style="opacity:0;" class="opt-check"></i> ${label}
                                </span>
                                <span style="font-size:9px; background:var(--bg); color:var(--text-dim); padding:2px 6px; border-radius:6px; font-weight:800;">RETAKE (0 XP)</span>
                            `;
                        } else {
                            optionDiv.innerHTML = `
                                <span style="display:flex; align-items:center; gap:10px;">
                                    <i data-lucide="check-circle-2" size="16" color="var(--primary)" style="opacity:0;" class="opt-check"></i> ${label}
                                </span>
                                ${modData.isNew ? `<span style="font-size:9px; background:var(--primary-light); color:var(--primary-dark); padding:2px 6px; border-radius:6px; font-weight:800;">NEW</span>` : ''}
                            `;
                        }
                        
                        optionDiv.onclick = () => selectModule(val, label, optionDiv, isCompleted);
                        dropdown.appendChild(optionDiv);
                    }
                });

                if (activeCount === 0) {
                    dropdown.innerHTML = `<div class="select-option locked" style="justify-content:center; cursor:default;">NO ACTIVE MODULES</div>`;
                }
                lucide.createIcons();
            });
        }

        // Dropdown Logic
        function toggleDropdown() {
            const dropdown = document.getElementById('select-dropdown');
            const btn = document.getElementById('select-btn');
            const icon = document.getElementById('dropdown-icon');
            dropdown.classList.toggle('show');
            btn.classList.toggle('active');
            icon.style.transform = dropdown.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function selectModule(value, label, element, isCompleted) {
            currentSelectedModule = value;
            currentSelectedIsRetake = isCompleted; // Track if this is a retake
            document.getElementById('selected-text').innerHTML = `<i data-lucide="target" size="18" color="var(--primary)"></i> ${label}`;
            document.querySelectorAll('.opt-check').forEach(el => el.style.opacity = '0');
            element.querySelector('.opt-check').style.opacity = '1';
            toggleDropdown();
            lucide.createIcons();
        }

        window.onclick = function(event) {
            if (!event.target.closest('.custom-select')) {
                const dropdown = document.getElementById('select-dropdown');
                if (dropdown && dropdown.classList.contains('show')) toggleDropdown();
            }
        }

        // 5. FETCH DYNAMIC POSTS FOR CAROUSEL
        function loadPosts() {
            db.ref('posts').orderByChild('timestamp').limitToLast(5).on('value', snap => {
                const track = document.getElementById('post-track');
                const dotsContainer = document.getElementById('post-dots');
                track.innerHTML = '';
                dotsContainer.innerHTML = '';
                
                if(!snap.exists()) {
                    track.innerHTML = `<div style="width:100%; text-align:center; padding:20px; color:var(--text-dim); font-size:12px;">No recent updates.</div>`;
                    return;
                }

                const posts = [];
                snap.forEach(child => { posts.push(child.val()); });
                posts.sort((a,b) => b.timestamp - a.timestamp); // Newest first

                posts.forEach((post, i) => {
                    const d = new Date(post.timestamp);
                    const timeString = d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    const safeContent = post.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    track.innerHTML += `
                        <div class="carousel-slide">
                            <div class="post-card">
                                <div class="post-header">
                                    <div class="post-avatar">${(post.author || 'A').charAt(0).toUpperCase()}</div>
                                    <div class="post-meta">
                                        <h4>${post.author || 'Official AgriQ Admin'}</h4>
                                        <span>${timeString}</span>
                                    </div>
                                </div>
                                <div class="post-content" style="white-space: pre-wrap;">${safeContent}</div>
                            </div>
                        </div>
                    `;

                    if (posts.length > 1) {
                        dotsContainer.innerHTML += `<div class="dot ${i === 0 ? 'active' : ''}"></div>`;
                    }
                });

                if (posts.length > 1) {
                    startCarousel(posts.length);
                } else {
                    clearInterval(slideInterval);
                    track.style.transform = `translateX(0%)`;
                }
            });
        }

        function startCarousel(totalSlides) {
            clearInterval(slideInterval);
            slideIndex = 0;
            document.getElementById('post-track').style.transform = `translateX(0%)`;
            
            slideInterval = setInterval(() => {
                slideIndex = (slideIndex + 1) % totalSlides;
                document.getElementById('post-track').style.transform = `translateX(-${slideIndex * 100}%)`;
                
                const dots = document.querySelectorAll('.dot');
                dots.forEach(d => d.classList.remove('active'));
                if(dots[slideIndex]) dots[slideIndex].classList.add('active');
            }, 5000);
        }

        // Test Initiation & Info Modals
        function initiateTest() {
            if(!currentSelectedModule) return showToast("Please select a module to enter the dojo.");
            
            // Adjust Modal title & message depending on whether they are doing a retake
            document.getElementById('m-title').innerText = currentSelectedIsRetake ? "PRACTICE MODE" : "ENTER DOJO";
            document.getElementById('m-title').style.color = "var(--primary-dark)";
            
            let message = currentSelectedIsRetake 
                ? `<p style="color:var(--text-dim); font-size:14px; line-height:1.5; font-weight:600;">You have already mastered this module. You can retake ${currentSelectedModule.replace(/_/g, ' ').toUpperCase()} for practice, but <b>no additional XP</b> will be awarded.</p>`
                : `<p style="color:var(--text-dim); font-size:14px; line-height:1.5; font-weight:600;">Commence specialized training for ${currentSelectedModule.replace(/_/g, ' ').toUpperCase()}?</p>`;
            
            document.getElementById('m-body').innerHTML = message;
            document.getElementById('modal-overlay').style.display = 'flex';
            
            document.getElementById('m-confirm').onclick = () => {
                // Pass a retake flag in the URL if needed by the test page
                const retakeFlag = currentSelectedIsRetake ? '&retake=true' : '';
                window.location.href = `coakmonktest.html?mod=${currentSelectedModule}&type=coak${retakeFlag}`;
            };
        }

        function showInfo() {
            document.getElementById('m-title').innerText = "COAK MONKS";
            document.getElementById('m-title').style.color = "var(--text-main)";
            document.getElementById('m-body').innerHTML = `<p style="color:var(--text-dim); font-size:13px; line-height:1.6; font-weight:600; text-align:left;">COAK Monks is an elite training ground.<br><br>• Earn specialized XP.<br>• Unlock exclusive ranks.<br>• Master advanced syllabus modules pulled directly from the COAK network.</p>`;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('m-confirm').onclick = closeModal;
            document.getElementById('m-confirm').innerText = "Got it";
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }
    </script>
</body>
</html>
