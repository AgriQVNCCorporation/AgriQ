<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Rivalry Arena</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b;
            --primary-glow: rgba(255, 59, 59, 0.4);
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --success: #00ff88;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, #1a0005 0%, #000000 100%); 
            min-height: 100vh;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .screen { min-height: 100vh; padding: 24px; display: flex; flex-direction: column; animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none !important; }

        .cyber-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 24px; 
            position: relative; 
            border-top: 4px solid var(--primary);
            box-shadow: 0 10px 40px -10px rgba(255, 0, 0, 0.2);
        }
        
        .btn-primary { 
            width: 100%; padding: 20px; border-radius: 22px; border: none; 
            background: #ffffff; color: #000; font-weight: 900; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-primary:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; margin-top: 10px; }

        .match-arena { display: grid; grid-template-columns: 1fr 50px 1fr; width: 100%; align-items: center; gap: 12px; margin: 40px 0; }
        .p-card { 
            background: #050505; border: 2px solid var(--border); border-radius: 20px; 
            padding: 15px; height: 160px; display: flex; flex-direction: column; 
            justify-content: center; text-align: center;
        }
        .user-active { border-color: var(--primary); box-shadow: 0 0 25px var(--primary-glow); }
        
        .rival-slot-box { height: 160px; overflow: hidden; border-radius: 20px; border: 2px solid var(--border); background: #000; }
        #rival-strips { transition: transform 4s cubic-bezier(0.16, 1, 0.3, 1); }
        .strip-item { height: 160px; padding: 15px; display: flex; flex-direction: column; justify-content: center; }

        .opt-box { 
            background: var(--surface); border: 2px solid var(--border); padding: 18px; 
            border-radius: 20px; margin-bottom: 12px; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; gap: 12px; color: #fff; transition: 0.2s;
        }
        .opt-box.selected { border-color: var(--primary); background: rgba(255, 59, 59, 0.1); color: var(--primary); }

        #app-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #111; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }

        input, select { 
            width: 100%; padding: 18px; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 18px; color: #fff; margin-bottom: 15px; outline: none; font-weight: 600;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .badge { font-family: 'JetBrains Mono'; background: #111; padding: 8px 16px; border-radius: 14px; border: 1px solid var(--border); font-size: 14px; }
    </style>
</head>
<body>

    <div id="app-loader">
        <div class="spinner"></div>
        <p style="font-weight: 800; color: #fff; margin-top: 20px; letter-spacing: 2px; font-size: 10px; font-family: 'JetBrains Mono';">INITIALIZING ARENA...</p>
    </div>

    <div id="screen-reg" class="screen hidden">
        <div style="text-align: center; margin-top: 20px; margin-bottom: 30px;">
            <h1 style="font-weight: 900; font-size: 38px; margin: 0; color: var(--primary); letter-spacing: -2px;">AGRIQ<span style="color:#fff">PRO</span></h1>
            <p style="color: var(--text-dim); font-size: 11px; font-family: 'JetBrains Mono'; letter-spacing: 1px;">RIVALRY ARENA // VER 2.7</p>
        </div>
        
        <div class="cyber-card">
            <input type="text" id="reg-name" placeholder="Candidate Name">
            <input type="text" id="reg-college" placeholder="University/College">
            <select id="diff-select">
                <option value="low">ROOKIE (LVL 1-10)</option>
                <option value="medium" selected>PRO (LVL 11-25)</option>
                <option value="hard">ELITE (LVL 26-99)</option>
            </select>
            <select id="subject-select">
                <option value="">Fetching Subjects...</option>
            </select>
            <button class="btn-primary" onclick="initMatch()" style="background: var(--primary); color: #fff; margin-top: 10px;">ENTER ARENA ⚔️</button>
        </div>
    </div>

    <div id="screen-match" class="screen hidden" style="justify-content: center; text-align: center;">
        <div id="match-status" style="font-family:'JetBrains Mono'; color:var(--primary); font-size:11px; animation: flicker 0.5s infinite; letter-spacing: 1px;">LOCATING RIVAL...</div>
        <div class="match-arena">
            <div class="p-card user-active">
                <div style="font-size:9px; color:var(--primary); font-weight:800; margin-bottom:10px;">CHALLENGER</div>
                <div id="user-card-name" style="font-size:16px; font-weight:800;">---</div>
            </div>
            <div style="font-weight:900; color:var(--primary); font-size: 20px;">VS</div>
            <div class="rival-slot-box"><div id="rival-strips"></div></div>
        </div>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <header>
            <div class="badge">Q <span id="q-progress" style="color:var(--primary); font-weight:800;">01</span> / 20</div>
            <div id="q-timer" class="badge" style="color:var(--primary); min-width: 80px; text-align: center;">100s</div>
        </header>
        <div class="cyber-card" style="border-top-color: #fff;">
            <div id="q-text" style="font-size:18px; font-weight:700; line-height:1.6; color: #fff;">...</div>
        </div>
        <div id="options-container" style="margin-top: 20px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
            <button class="btn-primary btn-outline" id="prev-btn" onclick="nav(-1)">BACK</button>
            <button class="btn-primary btn-outline" id="next-btn" onclick="nav(1)">SKIP</button>
            <button class="btn-primary" id="submit-btn" style="grid-column: span 2; margin-top: 10px; background: var(--primary); color: #fff;" onclick="endQuiz()">SUBMIT SESSION 🏁</button>
        </div>
    </div>

    <div id="screen-result" class="screen hidden" style="justify-content: center; text-align: center;">
        <h1 id="res-status" style="font-size: 52px; font-weight: 900; margin: 0;">RESULT</h1>
        <div class="cyber-card" style="margin: 30px 0;">
            <div id="res-score" style="font-size: 42px; font-weight: 800; font-family: 'JetBrains Mono';">0 / 20</div>
            <div id="res-rival" style="color: var(--primary); font-size: 11px; margin-top: 12px; font-weight: 800;"></div>
        </div>
        <button class="btn-primary" onclick="location.reload()">REMATCH 🔄</button>
        <button class="btn-primary btn-outline" onclick="window.location.href='rivalryleaderboard.html'">VIEW STANDINGS 🏆</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = {}, rival = {}, questions = [], qIdx = 0, answers = {}, timerInt;
        let globalTime = 100;

        const rivals = [
            {name:"IRONCLAD", coll:"VNMKV"}, {name:"SHADOW", coll:"MPKV"}, 
            {name:"AGRI_BOSS", coll:"PDKV"}, {name:"ROOT_TERMINATOR", coll:"IARI"}
        ];

        const initApp = async () => {
            try {
                const snap = await db.ref('questions').once('value');
                const selector = document.getElementById('subject-select');
                if (snap.exists()) {
                    selector.innerHTML = '<option value="">-- CHOOSE FIELD --</option>';
                    Object.keys(snap.val()).forEach(k => {
                        selector.innerHTML += `<option value="${k}">${k.toUpperCase()}</option>`;
                    });
                }
                document.getElementById('app-loader').classList.add('hidden');
                document.getElementById('screen-reg').classList.remove('hidden');
            } catch(e) { console.error(e); }
        };

        initApp();

        async function initMatch() {
            user.name = document.getElementById('reg-name').value.trim().toUpperCase();
            user.college = document.getElementById('reg-college').value.trim().toUpperCase();
            user.subject = document.getElementById('subject-select').value;
            user.diff = document.getElementById('diff-select').value;

            if(!user.name || !user.subject) return alert("Missing Info");

            document.getElementById('user-card-name').innerText = user.name;
            document.getElementById('screen-reg').classList.add('hidden');
            document.getElementById('screen-match').classList.remove('hidden');

            // Slot machine animation
            const strip = document.getElementById('rival-strips');
            rivals.forEach(r => {
                const div = document.createElement('div');
                div.className = 'strip-item';
                div.innerHTML = `<strong>${r.name}</strong><br><small>${r.coll}</small>`;
                strip.appendChild(div);
            });
            rival = rivals[Math.floor(Math.random() * rivals.length)];
            setTimeout(() => strip.style.transform = `translateY(-${(rivals.length-1)*160}px)`, 500);

            try {
                const qSnap = await db.ref('questions/' + user.subject).once('value');
                const rawData = qSnap.val();
                questions = Object.values(rawData).sort(() => 0.5 - Math.random()).slice(0, 20);
            } catch(e) { console.error(e); }

            setTimeout(() => {
                document.getElementById('screen-match').classList.add('hidden');
                document.getElementById('screen-quiz').classList.remove('hidden');
                renderQuestion(); 
                runTimer();
            }, 4000);
        }

        function renderQuestion() {
            const q = questions[qIdx];
            if(!q) return;

            document.getElementById('q-progress').innerText = (qIdx + 1).toString().padStart(2, '0');
            document.getElementById('q-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            // UNIVERSAL PICKER: Handles A, B, C, D or options array or option1, 2, 3...
            let opts = q.options && Array.isArray(q.options) ? q.options : 
                       [q.A, q.B, q.C, q.D, q.option1, q.option2, q.option3, q.option4].filter(Boolean);

            opts.forEach(o => {
                const div = document.createElement('div');
                div.className = `opt-box ${answers[qIdx] === o ? 'selected' : ''}`;
                div.innerHTML = `<span>⚡</span> ${o}`;
                div.onclick = () => { answers[qIdx] = o; renderQuestion(); };
                container.appendChild(div);
            });

            document.getElementById('prev-btn').style.visibility = qIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').classList.toggle('hidden', qIdx === questions.length - 1);
            document.getElementById('submit-btn').classList.toggle('hidden', qIdx !== questions.length - 1);
        }

        function nav(dir) { qIdx += dir; renderQuestion(); }

        function runTimer() {
            timerInt = setInterval(() => {
                globalTime--;
                document.getElementById('q-timer').innerText = globalTime + 's';
                if(globalTime <= 0) endQuiz();
            }, 1000);
        }

        function endQuiz() {
            clearInterval(timerInt);
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.answer) score++; });

            let rScore = user.diff === 'hard' ? 17 : user.diff === 'medium' ? 12 : 7;
            rScore += Math.floor(Math.random() * 4);
            const win = score >= rScore;

            if(win) {
                const id = (user.name + "_" + user.college).replace(/[.#$[\]]/g, "_");
                db.ref('rivalry_arena/' + id).transaction(c => {
                    if (!c) return { name: user.name, college: user.college, wins: 1 };
                    c.wins = (c.wins || 0) + 1; return c;
                });
            }

            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('res-status').innerText = win ? "VICTORY" : "DEFEAT";
            document.getElementById('res-status').style.color = win ? "#00ff88" : "#ff3b3b";
            document.getElementById('res-score').innerText = `${score} / 20`;
            document.getElementById('res-rival').innerText = `RIVAL SECURED ${rScore}/20`;
        }
    </script>
</body>
</html>
