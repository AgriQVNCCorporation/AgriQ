<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f5f3ff">
    <title>AgriQ Pro | COAK Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* COAK Monks Purple Theme */
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #ede9fe;
            --bg: #f5f3ff;
            --surface: #ffffff;
            --text-main: #2e1065;
            --text-dim: #6d28d9;
            --border: #ddd6fe;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --success: #22c55e;
            --success-light: #f0fdf4;
            --warning: #f59e0b;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; color: var(--text-main); 
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden; padding-top: env(safe-area-inset-top);
        }

        header { 
            padding: 20px 24px; background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(15px); position: sticky; top: env(safe-area-inset-top); z-index: 100;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--primary-light); padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); color: var(--primary-dark); }
        .back-btn:active { transform: scale(0.9); }
        .brand { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; padding-bottom: 100px; }

        /* Score Card */
        .score-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 32px; padding: 30px 20px; color: white; text-align: center;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.25); margin-bottom: 25px;
            position: relative; overflow: hidden; animation: slideDown 0.5s ease;
        }
        .score-bg-icon { position: absolute; right: -20px; top: -20px; opacity: 0.1; transform: rotate(15deg); pointer-events: none; }
        
        .score-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; margin-bottom: 10px; }
        .score-value { font-size: 56px; font-weight: 900; font-family: 'JetBrains Mono'; line-height: 1; margin-bottom: 5px; }
        .score-total { font-size: 16px; font-weight: 700; opacity: 0.8; }
        
        .xp-badge {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; font-weight: 800; margin-top: 15px;
        }

        /* Stats Row */
        .stats-row { display: flex; gap: 15px; margin-bottom: 30px; animation: slideUp 0.5s ease 0.1s both; }
        .stat-box { 
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.05);
        }
        .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .stat-val { font-size: 24px; font-weight: 900; font-family: 'JetBrains Mono'; color: var(--text-main); margin-bottom: 2px; }
        .stat-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }

        /* Detailed Analysis */
        .section-title { font-weight: 900; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--text-main); animation: slideUp 0.5s ease 0.2s both; }
        
        .details-container { display: flex; flex-direction: column; gap: 15px; animation: slideUp 0.5s ease 0.3s both; }
        
        .q-detail-card {
            background: var(--surface); border: 1.5px solid var(--border); border-radius: 24px;
            padding: 20px; overflow: hidden; position: relative;
        }
        .q-detail-card.correct { border-color: var(--success); box-shadow: 0 4px 15px var(--success-light); }
        .q-detail-card.wrong { border-color: var(--danger); box-shadow: 0 4px 15px var(--danger-light); }
        .q-detail-card.skipped { border-color: var(--warning); }

        .status-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .correct .status-badge { background: var(--success-light); color: var(--success); }
        .wrong .status-badge { background: var(--danger-light); color: var(--danger); }
        .skipped .status-badge { background: #fef3c7; color: var(--warning); }

        .q-text { font-size: 14px; font-weight: 700; color: var(--text-main); line-height: 1.5; margin: 0 0 15px 0; padding-right: 70px; }
        
        .ans-row { display: flex; flex-direction: column; gap: 8px; font-size: 12px; font-weight: 600; }
        .ans-user { display: flex; align-items: flex-start; gap: 8px; padding: 12px; border-radius: 12px; background: var(--bg); color: var(--text-dim); }
        .wrong .ans-user { background: var(--danger-light); color: var(--danger); }
        .ans-actual { display: flex; align-items: flex-start; gap: 8px; padding: 12px; border-radius: 12px; background: var(--success-light); color: var(--success); }

        /* Bottom Nav */
        .bottom-actions {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--border);
            display: flex; gap: 15px; z-index: 100;
        }

        .btn {
            flex: 1; padding: 16px; border-radius: 16px; border: none; font-weight: 800; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition);
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px var(--primary-glow); }
        .btn-outline { background: var(--primary-light); color: var(--primary-dark); }

        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="back-btn" onclick="window.location.href='coakmonks.html'">
                <i data-lucide="chevron-left" size="22"></i>
            </div>
            <div class="brand"><i data-lucide="swords" size="22" color="var(--primary)"></i> COAK REPORT</div>
        </div>
    </header>

    <main>
        <div class="score-card">
            <i data-lucide="shield-check" size="160" class="score-bg-icon"></i>
            <div class="score-title">Trial Score</div>
            <div class="score-value" id="display-score">--</div>
            <div class="score-total">out of <span id="display-total">--</span></div>
            
            <div class="xp-badge">
                <i data-lucide="zap" size="14"></i> +<span id="display-xp">0</span> COAK XP Earned
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-icon" style="background: var(--primary-light); color: var(--primary-dark);">
                    <i data-lucide="target" size="20"></i>
                </div>
                <div class="stat-val" id="display-acc">--%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon" style="background: var(--primary-light); color: var(--primary-dark);">
                    <i data-lucide="hash" size="20"></i>
                </div>
                <div class="stat-val" id="display-module">--</div>
                <div class="stat-label">Module ID</div>
            </div>
        </div>

        <div class="section-title"><i data-lucide="microscope" size="20" color="var(--primary)"></i> Battle Analysis</div>
        <div class="details-container" id="details-container">
            <div style="text-align: center; color: var(--text-dim); padding: 20px; font-weight: 600;">Loading analysis...</div>
        </div>
    </main>

    <div class="bottom-actions">
        <button class="btn btn-outline" onclick="window.location.href='coakmonks.html'">
            <i data-lucide="door-open" size="18"></i> EXIT COAK
        </button>
        <button class="btn btn-primary" onclick="window.location.href='coakleaderbord.html'">
            <i data-lucide="trophy" size="18"></i> RANKS
        </button>
    </div>

    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            const rawData = localStorage.getItem('agriq_last_result');
            
            if (!rawData) {
                // If accessed directly without data, redirect to COAK dashboard
                window.location.replace('coakmonk.html');
                return;
            }

            const data = JSON.parse(rawData);

            // Populate Top Cards
            document.getElementById('display-score').innerText = data.score;
            document.getElementById('display-total').innerText = data.total;
            document.getElementById('display-acc').innerText = data.accuracy + '%';
            
            // Format module ID nicely (e.g., coak_agronomy_01 -> COAK AGRONOMY 01)
            let modStr = data.module || "UNKNOWN";
            if(modStr.length > 10) {
                modStr = modStr.slice(0,8) + '..';
            }
            document.getElementById('display-module').innerText = modStr.toUpperCase();
            
            // COAK specific XP calculation (matching the test logic: score * 10)
            document.getElementById('display-xp').innerText = data.score * 10;

            // Populate Detailed List
            const container = document.getElementById('details-container');
            container.innerHTML = '';

            if (data.details && data.details.length > 0) {
                data.details.forEach((q, idx) => {
                    let statusClass = 'wrong';
                    let statusText = 'INCORRECT';
                    let icon = 'x-circle';

                    if (q.user === q.actual) {
                        statusClass = 'correct';
                        statusText = 'CORRECT';
                        icon = 'check-circle-2';
                    } else if (q.user === 'SKIPPED') {
                        statusClass = 'skipped';
                        statusText = 'SKIPPED';
                        icon = 'minus-circle';
                    }

                    const cardHTML = `
                        <div class="q-detail-card ${statusClass}">
                            <div class="status-badge"><i data-lucide="${icon}" size="10" style="margin-right:2px; vertical-align:-1px;"></i> ${statusText}</div>
                            <h4 class="q-text">Q${idx + 1}. ${q.question}</h4>
                            
                            <div class="ans-row">
                                <div class="ans-user">
                                    <i data-lucide="${statusClass === 'correct' ? 'check' : (statusClass === 'skipped' ? 'minus' : 'x')}" size="16" style="flex-shrink:0; margin-top:1px;"></i>
                                    <div><strong>Your Move:</strong> <br>${q.user}</div>
                                </div>
                                ${statusClass !== 'correct' ? `
                                <div class="ans-actual">
                                    <i data-lucide="check-circle" size="16" style="flex-shrink:0; margin-top:1px;"></i>
                                    <div><strong>Master's Answer:</strong> <br>${q.actual}</div>
                                </div>` : ''}
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
                lucide.createIcons();
            } else {
                container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px; font-weight: 600;">No detailed data available.</div>';
            }
        });
    </script>
</body>
</html>
