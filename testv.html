<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f9ff">
    <title>AgriQ Pro | Active Sky Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff;
            --primary-glow: rgba(0, 132, 255, 0.1);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #002d4d;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.15);
            --warning: #eab308;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent);
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #app-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transition: 0.6s; }
        
        /* PAUSE OVERLAY STYLES */
        #pause-overlay {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px);
            z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000;
        }

        .timer-badge { 
            background: #fff; color: var(--primary); padding: 8px 16px; 
            border-radius: 12px; border: 1.5px solid var(--border); 
            font-family: 'JetBrains Mono'; font-weight: 800; font-size: 14px;
        }

        .profile-container { width: 42px; height: 42px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; }

        main { 
            padding: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            flex: 1; 
            padding-bottom: 200px;
        }

        .marker-scroll { 
            display: flex; gap: 10px; overflow-x: auto; padding: 5px 5px 20px 5px; 
            scrollbar-width: none; position: sticky; top: 80px; z-index: 999;
        }
        .marker-scroll::-webkit-scrollbar { display: none; }
        
        .q-pill { 
            min-width: 42px; height: 42px; border-radius: 12px; background: #fff; border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-dim); flex-shrink: 0;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        
        .q-pill.done { background: var(--success); border-color: var(--success); color: #fff; }
        .q-pill.marked { background: var(--warning); border-color: var(--warning); color: #fff; }
        .q-pill.active { border-color: var(--primary); color: var(--text-main); background: var(--primary-glow); border-width: 2px; }

        .q-card { background: #fff; border-radius: 28px; padding: 26px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        
        .q-number-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .retake-badge {
            display: none;
            background: #f1f5f9;
            color: var(--text-dim);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            margin-left: 10px;
            vertical-align: middle;
        }

        .opt-box { 
            background: #fff; border: 1.5px solid var(--border); padding: 18px; 
            border-radius: 20px; margin-bottom: 12px; font-weight: 700; cursor: pointer; color: var(--text-main);
            transition: 0.2s; font-size: 14px; line-height: 1.4;
        }
        .opt-box.selected { border-color: var(--success); background: var(--success); color: #fff; box-shadow: 0 8px 20px var(--success-glow); }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 460px; padding: 16px; background: var(--glass);
            backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px;
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            z-index: 1001;
        }

        .btn-row { display: flex; gap: 10px; }
        .btn-primary { flex: 1.5; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;}
        .btn-sec { flex: 1; padding: 16px; border-radius: 18px; background: #fff; color: var(--text-main); border: 1.5px solid var(--border); font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;}

        #custom-modal { position: fixed; inset: 0; background: rgba(0, 45, 77, 0.3); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 24px; backdrop-filter: blur(8px); }
        .modal-content { background: #fff; width: 100%; max-width: 350px; border-radius: 28px; padding: 30px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-loader">
        <div id="loader-icon" style="color:var(--primary);"><i data-lucide="cloud-lightning" size="64" fill="currentColor"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; font-weight: 800;">SYNCING SCALES...</p>
    </div>

    <div id="pause-overlay">
        <i data-lucide="pause-circle" size="72" color="var(--primary)" style="margin-bottom: 20px;"></i>
        <h2 style="font-size: 24px; font-weight: 900; color: var(--text-main); margin-bottom: 10px;">TEST PAUSED</h2>
        <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 30px;">Your timer has been stopped. Do not close this tab.</p>
        <button class="btn-primary" style="width: auto; padding: 16px 40px;" onclick="togglePause()">RESUME TEST</button>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <div id="modal-title" style="font-weight:900; margin-bottom:10px; text-transform:uppercase; color:var(--primary);">Alert</div>
            <div id="modal-text" style="font-size:13px; color:var(--text-dim); margin-bottom:25px;">Message</div>
            <div class="modal-actions" style="display:flex; gap:12px;">
                <button class="btn-sec" id="modal-cancel-btn">CANCEL</button>
                <button class="btn-primary" id="modal-confirm-btn">CONFIRM</button>
            </div>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="profile-container" id="user-initial">U</div>
            <div>
                <div style="font-weight: 900; font-size: 9px; letter-spacing: 1px; color: var(--primary);">LIVE ASSESSMENT</div>
                <span id="user-display-name" style="font-weight:800; font-size:14px; color:var(--text-main);">STUDENT</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="q-timer" class="timer-badge">00:00</div>
            <button onclick="togglePause()" style="background:none; border:none; color:var(--primary); cursor:pointer; padding:5px; display:flex;">
                <i data-lucide="pause-circle" size="24"></i>
            </button>
        </div>
    </header>

    <main id="main-content">
        <div id="marker-grid" class="marker-scroll"></div>
        
        <div class="q-card">
            <span id="q-number" class="q-number-label">
                QUESTION <span id="q-current-count">--</span> OF <span id="q-total-count">--</span>
                <span id="retake-badge" class="retake-badge">RETAKE</span>
            </span>
            <div id="q-display" style="font-size: 17px; font-weight: 700; line-height: 1.6; color: var(--text-main);">Preparing your assessment...</div>
        </div>

        <div id="opts-display"></div>
    </main>

    <div class="controls">
        <div class="btn-row">
            <button class="btn-sec" style="flex: 1;" onclick="changeQ(-1)"><i data-lucide="chevron-left" size="20"></i></button>
            
            <button class="btn-sec" id="mark-btn" style="flex: 2; border-color: var(--warning); color: var(--warning);" onclick="toggleMark()">
                MARK <i data-lucide="bookmark" size="18"></i>
            </button>
            
            <button class="btn-primary" style="flex: 1.5;" onclick="changeQ(1)">NEXT <i data-lucide="chevron-right" size="20"></i></button>
        </div>
        <button class="btn-primary" style="background:var(--danger); width: 100%;" onclick="submitTest()">
            FINISH ASSESSMENT <i data-lucide="check-circle" size="18"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let questions = [], currentIdx = 0, userChoices = {}, markedQuestions = {}, timer;
        let totalSecondsRemaining = 3600; 
        
        // --- NEW: Dynamic Routing Setup ---
        const params = new URLSearchParams(window.location.search);
        const moduleKey = params.get('mod');
        const folderKey = params.get('folder'); // Checks if it came from the new nested folder system
        
        // Use moduleKey directly, or append folder if available for analytics
        let activeSessionId = folderKey ? `${folderKey}_${moduleKey}` : moduleKey; 
        
        const retakeParam = params.get('retake');
        const isRetake = retakeParam === 'true' || retakeParam === 'half';
        const isHalfXP = retakeParam === 'half';
        
        let isSubmitting = false;
        let isPaused = false;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && !isSubmitting && !isPaused) {
                togglePause();
            }
        });

        if (isRetake) {
            const badge = document.getElementById('retake-badge');
            badge.style.display = 'inline-block';
            if (isHalfXP) badge.innerText = 'RETAKE (1/2 XP)';
        }

        auth.onAuthStateChanged(user => {
            if (!user) return window.location.href = 'dashboard.html';
            db.ref(`students/${user.uid}`).once('value', snap => {
                const userData = snap.val();
                if (userData) {
                    document.getElementById('user-display-name').innerText = userData.name.toUpperCase();
                    document.getElementById('user-initial').innerText = userData.name[0];
                }
            });
            loadQuestions();
        });

        async function loadQuestions() {
            if (!moduleKey) return window.location.href = 'courses.html';

            try {
                // --- NEW: Database Router ---
                let dbPath = `subjects/${moduleKey}`;
                if (folderKey) {
                    // Fetch from the nested structure created by admin
                    dbPath = `nested_subjects/${folderKey}/${moduleKey}`;
                }

                const snap = await db.ref(dbPath).once('value');
                
                if (snap.exists()) {
                    const data = snap.val();
                    
                    if (data.current_session_id) {
                        activeSessionId = data.current_session_id;
                    }

                    const rawQuestions = data.questions?.data || data.questions || [];
                    
                    if (data.config && data.config.timeLimit) {
                        totalSecondsRemaining = parseInt(data.config.timeLimit, 10);
                    }
                    
                    setupQuestions(rawQuestions);
                } else {
                    showModal("ERROR", "Module not found or not available.", "alert", () => window.location.href='courses.html');
                }
            } catch (e) { 
                console.error(e);
                showModal("ERROR", "Failed to load test. Please check connection.", "alert", () => window.location.href='courses.html');
            }
        }

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function setupQuestions(dataArray) {
            if (!dataArray || dataArray.length === 0) {
                return showModal("EMPTY TEST", "There are no questions in this module.", "alert", () => window.location.href='courses.html');
            }

            const shuffledQuestions = shuffleArray([...dataArray]);

            questions = shuffledQuestions.map(q => ({
                ...q,
                displayQ: q.question || q.q,
                correct: q.answer || q.ans,
                shuffledOpts: shuffleArray([...(q.options || [])])
            }));
            
            initUI();
            document.getElementById('app-loader').classList.add('fade-out');
            startGlobalTimer();
        }

        function initUI() {
            const grid = document.getElementById('marker-grid');
            grid.innerHTML = '';
            document.getElementById('q-total-count').innerText = questions.length;

            questions.forEach((_, i) => {
                const p = document.createElement('div');
                p.className = 'q-pill';
                p.id = `mark-${i}`;
                p.innerText = i + 1;
                p.onclick = () => { currentIdx = i; showQ(); };
                grid.appendChild(p);
            });
            showQ();
        }

        function toggleMark() {
            markedQuestions[currentIdx] = !markedQuestions[currentIdx];
            showQ();
        }

        function togglePause() {
            isPaused = !isPaused;
            const overlay = document.getElementById('pause-overlay');
            if (isPaused) {
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }

        function showQ() {
            const q = questions[currentIdx];
            
            document.getElementById('q-current-count').innerText = currentIdx + 1;
            document.getElementById('q-display').innerHTML = `<span style="color: var(--primary); font-weight: 800;">Q.${currentIdx + 1}</span> ${q.displayQ}`;
            
            document.querySelectorAll('.q-pill').forEach((p, i) => {
                p.classList.remove('active', 'done', 'marked');
                
                if (markedQuestions[i]) {
                    p.classList.add('marked');
                } else if (userChoices[i] !== undefined && userChoices[i] !== null) {
                    p.classList.add('done');
                }
                
                if (i === currentIdx) {
                    p.classList.add('active');
                }
            });

            const markBtn = document.getElementById('mark-btn');
            if (markedQuestions[currentIdx]) {
                markBtn.style.background = 'var(--warning)';
                markBtn.style.color = '#fff';
                markBtn.innerHTML = 'MARKED <i data-lucide="bookmark-check" size="18"></i>';
            } else {
                markBtn.style.background = '#fff';
                markBtn.style.color = 'var(--warning)';
                markBtn.innerHTML = 'MARK <i data-lucide="bookmark" size="18"></i>';
            }

            const optBox = document.getElementById('opts-display');
            optBox.innerHTML = '';
            q.shuffledOpts.forEach(opt => {
                const div = document.createElement('div');
                div.className = `opt-box ${userChoices[currentIdx] === opt ? 'selected' : ''}`;
                div.innerText = opt;
                
                div.onclick = () => { 
                    if (userChoices[currentIdx] === opt) {
                        userChoices[currentIdx] = null; 
                    } else {
                        userChoices[currentIdx] = opt; 
                    }
                    showQ(); 
                };
                optBox.appendChild(div);
            });
            
            document.getElementById(`mark-${currentIdx}`).scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            lucide.createIcons(); 
        }

        function updateTimerUI() {
            let m = Math.floor(totalSecondsRemaining / 60).toString().padStart(2, '0');
            let s = (totalSecondsRemaining % 60).toString().padStart(2, '0');
            document.getElementById('q-timer').innerText = `${m}:${s}`;
        }

        function startGlobalTimer() {
            updateTimerUI(); 
            
            timer = setInterval(() => {
                if (isPaused) return; 

                if (totalSecondsRemaining <= 0) { 
                    clearInterval(timer); 
                    processFinalResults(); 
                } else {
                    totalSecondsRemaining--;
                    updateTimerUI();
                }
            }, 1000);
        }

        function changeQ(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) { 
                currentIdx = next; 
                showQ(); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function submitTest() { 
            let msg = "Do you want to end this session?";
            if (isHalfXP) {
                msg += "<br><br><span style='color:var(--text-dim); font-size:12px;'>You will earn HALF XP for this retake.</span>";
            } else if (isRetake) {
                msg += "<br><br><span style='color:var(--text-dim); font-size:12px;'>You will earn 0 XP for this retake.</span>";
            }
            showModal("SUBMIT", msg, "confirm", processFinalResults); 
        }

        async function processFinalResults() {
            if(isSubmitting) return;
            isSubmitting = true;
            clearInterval(timer);

            let correctCount = 0;
            const details = questions.map((q, i) => {
                const userAns = (userChoices[i] === null || userChoices[i] === undefined) ? "SKIPPED" : userChoices[i];
                const isCorrect = userAns === q.correct;
                if(isCorrect) correctCount++;
                return { question: q.displayQ, user: userAns, actual: q.correct };
            });

            let earnedXP = correctCount;
            if (isHalfXP) {
                earnedXP = Math.floor(correctCount / 2);
            } else if (isRetake) {
                earnedXP = 0;
            }

            const resultData = { 
                uid: auth.currentUser.uid,
                score: earnedXP, 
                rawScore: correctCount, 
                total: questions.length, 
                accuracy: Math.round((correctCount / (questions.length || 1)) * 100),
                module: moduleKey, 
                session_id: activeSessionId, 
                timestamp: Date.now(),
                isRetake: isRetake
            };

            try {
                await db.ref('leaderboard').push(resultData);
                
                const userRef = db.ref(`students/${auth.currentUser.uid}`);
                const snap = await userRef.once('value');
                const d = snap.val() || {};
                
                const newTests = (d.testsTaken || 0) + 1;
                
                await userRef.update({
                    totalScore: (d.totalScore || 0) + earnedXP,
                    testsTaken: newTests,
                    avgAccuracy: Math.round(((d.avgAccuracy || 0) * (newTests - 1) + resultData.accuracy) / newTests)
                });

                await userRef.child(`results/${activeSessionId}`).set({
                    score: earnedXP,
                    timestamp: Date.now()
                });

                localStorage.setItem('agriq_last_result', JSON.stringify({ ...resultData, details }));
                window.location.replace('analysis.html');
            } catch (e) {
                window.location.replace('analysis.html');
            }
        }

        function showModal(title, text, type, onConfirm) {
            const m = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            m.style.display = 'flex';
            document.getElementById('modal-confirm-btn').onclick = () => { m.style.display='none'; if(onConfirm) onConfirm(); };
            document.getElementById('modal-cancel-btn').onclick = () => m.style.display='none';
            if(type === 'alert') document.getElementById('modal-cancel-btn').classList.add('hidden');
        }

        lucide.createIcons();
    </script>
</body>
</html>
