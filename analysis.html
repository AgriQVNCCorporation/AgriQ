<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Deep Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --primary-soft: #f5f7ff;
            --accent: #10b981;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --danger: #ef4444;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        /* --- SMOOTH LOADER STYLES --- */
        #analysis-loader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s; 
        }

        #analysis-loader.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .spinner { 
            width: 40px; height: 40px; border: 4px solid #f1f5f9; 
            border-top: 4px solid var(--primary); border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* --------------------------- */

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-weight: 900; font-size: 22px; letter-spacing: -1px; }
        .brand span { color: var(--primary); }

        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; }

        .quote-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; padding: 25px; border-radius: 24px; margin-bottom: 25px;
            text-align: center; position: relative; overflow: hidden;
        }
        .quote-box i { position: absolute; opacity: 0.1; right: -10px; bottom: -10px; transform: scale(4); }
        .quote-text { font-style: italic; font-size: 15px; line-height: 1.6; font-weight: 500; position: relative; z-index: 1; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { 
            background: var(--surface); padding: 20px; border-radius: 20px; 
            text-align: center; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9;
        }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--primary); display: block; }
        .stat-lbl { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .analysis-card {
            background: var(--surface); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; border: 1px solid #f1f5f9;
            box-shadow: var(--card-shadow); position: relative;
        }
        .status-tag { 
            position: absolute; top: 20px; right: 20px; font-size: 10px; 
            font-weight: 800; padding: 4px 8px; border-radius: 8px; text-transform: uppercase;
        }
        .tag-correct { background: #f0fdf4; color: var(--accent); }
        .tag-wrong { background: #fef2f2; color: var(--danger); }

        .q-text { font-weight: 700; font-size: 15px; margin-bottom: 12px; line-height: 1.5; padding-right: 60px; }
        .ans-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; margin-top: 8px; }
        
        .btn-primary { 
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: var(--primary); color: white; font-weight: 800;
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px;
        }
        .btn-secondary {
            width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #f1f5f9;
            background: white; color: var(--text-main); font-weight: 800;
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 15px;
        }

        footer { padding: 40px 24px; text-align: center; color: var(--text-dim); font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="analysis-loader">
        <div class="spinner"></div>
        <p style="font-weight: 700; color: var(--text-dim); margin-top: 15px;">Generating Deep Analysis...</p>
    </div>

    <header>
        <div class="brand">Agri<span>Q</span> Analysis</div>
        <div id="user-display" style="font-size: 12px; font-weight: 800; color: var(--text-dim);">...</div>
    </header>

    <main>
        <div class="quote-box">
            <i data-lucide="quote"></i>
            <p class="quote-text" id="inspire-quote">"The best way to predict the future is to create it."</p>
        </div>

        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-val" id="stat-accuracy">0%</span>
                <span class="stat-lbl">Accuracy</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="stat-score">0/0</span>
                <span class="stat-lbl">Final Score</span>
            </div>
        </div>

        <h3 style="font-weight: 800; margin-bottom: 15px;">Question Review</h3>
        <div id="review-list"></div>

        <button class="btn-primary" onclick="window.location.href='leaderboard.html'">
            <i data-lucide="trophy"></i> View Global Leaderboard
        </button>

        <button class="btn-secondary" onclick="window.location.href='index.html'">
            <i data-lucide="rotate-ccw"></i> Try Another Subject
        </button>
    </main>

    <footer>
        &copy; 2026 AGRIQ PRO • EXCELLENCE IN AGRICULTURE
    </footer>

    <script>
        lucide.createIcons();

        const quotes = [
            "Agriculture is our wisest pursuit, because it will in the end contribute most to real wealth and good morals.",
            "The master's eye fattens the horse. Stay focused on your goals.",
            "Do not count the days, make the days count. Your exam prep is a marathon.",
            "Farming is a profession of hope. Keep studying, keep growing."
        ];

        window.onload = () => {
            // Get data from localStorage
            const results = JSON.parse(localStorage.getItem('agriq_last_result')) || null;
            const userName = localStorage.getItem('agriq_user') || "Aspirant";

            document.getElementById('user-display').innerText = userName.toUpperCase();
            document.getElementById('inspire-quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

            if (!results) {
                document.getElementById('review-list').innerHTML = "<p style='text-align:center;'>No recent test data found.</p>";
                // Remove loader if no data
                document.getElementById('analysis-loader').classList.add('fade-out');
                return;
            }

            // Stats
            document.getElementById('stat-accuracy').innerText = results.accuracy + "%";
            document.getElementById('stat-score').innerText = results.score + "/" + results.total;

            // Render Questions
            const list = document.getElementById('review-list');
            results.details.forEach((item, i) => {
                const isCorrect = item.userAns === item.correctAns;
                const card = document.createElement('div');
                card.className = 'analysis-card';
                
                card.innerHTML = `
                    <span class="status-tag ${isCorrect ? 'tag-correct' : 'tag-wrong'}">
                        ${isCorrect ? 'Correct' : 'Incorrect'}
                    </span>
                    <div class="q-text">${i + 1}. ${item.question}</div>
                    <div class="ans-row" style="color: ${isCorrect ? 'var(--accent)' : 'var(--danger)'}">
                        <i data-lucide="${isCorrect ? 'check-circle' : 'x-circle'}" size="16"></i>
                        <span>Your: ${item.userAns || 'Skipped'}</span>
                    </div>
                    ${!isCorrect ? `
                    <div class="ans-row" style="color: var(--accent); margin-top: 5px;">
                        <i data-lucide="check-circle" size="16"></i>
                        <span>Correct: ${item.correctAns}</span>
                    </div>` : ''}
                `;
                list.appendChild(card);
            });
            lucide.createIcons();

            // TRIGGER THE FADE OUT
            setTimeout(() => {
                document.getElementById('analysis-loader').classList.add('fade-out');
            }, 800);
        };
    </script>
</body>
</html>
