<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f9ff">
    <title>AgriQ Pro | Mission Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff;
            --primary-glow: rgba(0, 132, 255, 0.1);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #002d4d;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent);
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
        }

        #analysis-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #analysis-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transition: 0.6s; }
        
        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        /* Leaderboard Icon Styling */
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .icon-btn:active { transform: scale(0.9); background: var(--primary-glow); }
        
        .profile-container { width: 40px; height: 40px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; }

        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; }

        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .stat-card { 
            background: #fff; border: 1.5px solid var(--border); 
            padding: 22px; border-radius: 28px; text-align: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .stat-val { font-family: 'JetBrains Mono'; font-size: 30px; font-weight: 900; display: block; color: var(--primary); }
        .stat-lbl { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; }

        .analysis-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            animation: slideUp 0.5s ease backwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { 
            position: absolute; top: 15px; right: 15px; font-size: 8px; 
            font-weight: 900; padding: 4px 10px; border-radius: 50px; 
        }
        .pass { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .fail { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .q-title { font-weight: 700; font-size: 15px; line-height: 1.5; margin-bottom: 15px; padding-right: 60px; color: var(--text-main); }
        
        .data-row { 
            display: flex; align-items: center; gap: 10px; font-size: 13px; 
            padding: 12px; background: var(--bg); border-radius: 14px; margin-top: 8px; 
        }
        .data-label { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--text-dim); min-width: 55px; font-weight: 800; }

        .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
        .btn-action { 
            padding: 18px; border-radius: 20px; border: none; font-weight: 900; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 10px; transition: 0.2s; font-size: 14px;
        }
        .btn-action.primary { background: var(--primary); color: #fff; box-shadow: 0 8px 20px var(--primary-glow); }
        .btn-action.outline { background: #fff; border: 1.5px solid var(--border); color: var(--text-main); }
    </style>
</head>
<body>

    <div id="analysis-loader">
        <div style="color:var(--primary);"><i data-lucide="bar-chart-3" size="64"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; font-weight: 800;">CALCULATING RESULTS...</p>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="profile-container" id="user-initial">U</div>
            <div style="font-weight: 900; font-size: 14px; letter-spacing: -0.5px;">AgriQ <span style="color:var(--primary);">ANALYSIS</span></div>
        </div>
        
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="leaderboard.html" class="icon-btn">
                <i data-lucide="trophy" size="20"></i>
            </a>
            <div id="user-tag" style="font-size: 10px; font-weight: 900; color: var(--primary); font-family: 'JetBrains Mono';">STUDENT</div>
        </div>
    </header>

    <main>
        <div class="stat-banner">
            <div class="stat-card" style="border-color: var(--primary);">
                <span class="stat-val" id="acc-val">0%</span>
                <span class="stat-lbl">Accuracy</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="score-val" style="color: var(--text-main);">0/0</span>
                <span class="stat-lbl">Final Score</span>
            </div>
        </div>

        <div id="review-container"></div>

        <div class="btn-group">
            <button class="btn-action primary" onclick="window.location.href='leaderboard.html'">
                <i data-lucide="award" size="20"></i> VIEW RANKINGS
            </button>
            <button class="btn-action outline" onclick="window.location.href='index.html'">
                <i data-lucide="home" size="20"></i> BACK TO DASHBOARD
            </button>
        </div>
    </main>

    <script>
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.location.href = "index.html"; 
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (!user) return window.location.href = 'index.html';
            db.ref(`students/${user.uid}`).once('value', snap => {
                const d = snap.val();
                if(d) {
                    document.getElementById('user-tag').innerText = d.name.toUpperCase();
                    document.getElementById('user-initial').innerText = d.name[0];
                }
            });
            loadAnalysis();
        });

        function loadAnalysis() {
            const data = JSON.parse(localStorage.getItem('agriq_last_result'));
            if (!data) return window.location.href = 'index.html';

            document.getElementById('acc-val').innerText = `${data.accuracy}%`;
            document.getElementById('score-val').innerText = `${data.score}/${data.total}`;

            const container = document.getElementById('review-container');
            data.details.forEach((item, i) => {
                const isCorrect = item.user === item.actual;
                const card = document.createElement('div');
                card.className = 'analysis-card';
                card.style.animationDelay = `${i * 0.05}s`;
                card.innerHTML = `
                    <span class="status-badge ${isCorrect ? 'pass' : 'fail'}">${isCorrect ? 'CORRECT' : 'WRONG'}</span>
                    <div class="q-title">${item.question}</div>
                    <div class="data-row">
                        <span class="data-label">YOURS</span>
                        <span style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'}; font-weight:800;">${item.user}</span>
                    </div>
                    ${!isCorrect ? `
                    <div class="data-row">
                        <span class="data-label">CORRECT</span>
                        <span style="color:var(--success); font-weight:800;">${item.actual}</span>
                    </div>` : ''}
                `;
                container.appendChild(card);
            });
            
            setTimeout(() => document.getElementById('analysis-loader').classList.add('fade-out'), 1000);
        }

        lucide.createIcons();
    </script>
</body>
</html>
