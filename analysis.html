<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AgriQ Pro | Mission Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b;
            --primary-glow: rgba(255, 59, 59, 0.4);
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --danger: #ff3b3b;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.elite-mode {
            --primary: #ffcc00;
            --primary-glow: rgba(255, 204, 0, 0.6);
            --bg: #050500;
            --surface: #0f0e0a;
            --text-main: #fffdf0;
            --border: #443300;
        }

        body.focused-mode {
            --primary: #00aaff;
            --primary-glow: rgba(0, 170, 255, 0.3);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --glass: rgba(0, 170, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            transition: 0.5s ease; 
        }

        #analysis-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #analysis-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .loader-status {
            font-family: 'JetBrains Mono'; font-size: 10px; color: var(--primary);
            margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px;
            background: var(--surface); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        
        .header-left { display: flex; align-items: center; gap: 12px; }

        .profile-container { position: relative; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
        
        #user-initial {
            width: 32px; height: 32px; background: var(--surface); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--primary); font-size: 14px;
            background-size: cover; background-position: center;
            position: relative; z-index: 2; border: 2px solid var(--bg);
        }

        .conqueror-frame {
            position: absolute; inset: 0; border-radius: 12px;
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #aa771c 100%);
            background-size: 400% 400%; animation: goldShine 3s linear infinite; z-index: 1;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .normal-frame { position: absolute; inset: 2px; border-radius: 10px; border: 1.5px solid var(--border); z-index: 1; }

        .conqueror-crown {
            position: absolute; top: -8px; right: -4px; z-index: 10;
            filter: drop-shadow(0 0 3px rgba(255, 204, 0, 0.8));
            color: #ffcc00; transform: rotate(15deg);
        }

        @keyframes goldShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .brand { font-weight: 900; font-size: 16px; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }

        .header-actions { display: flex; align-items: center; gap: 10px; }
        .icon-btn {
            background: var(--glass); border: 1px solid var(--border); color: var(--text-main);
            padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center;
        }

        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; }

        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--surface); border: 1.5px solid var(--border); 
            padding: 22px; border-radius: 28px; text-align: center; 
            transition: var(--transition);
        }
        .stat-val { font-family: 'JetBrains Mono'; font-size: 32px; font-weight: 900; display: block; color: var(--primary); }
        .stat-lbl { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }

        .analysis-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 28px; padding: 24px; margin-bottom: 16px;
            position: relative; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { 
            position: absolute; top: 20px; right: 20px; font-size: 9px; 
            font-weight: 900; padding: 5px 12px; border-radius: 50px; 
        }
        .pass { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }
        .fail { background: rgba(255, 59, 59, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .q-title { font-weight: 700; font-size: 15px; line-height: 1.5; margin-bottom: 18px; padding-right: 80px; }
        
        .data-row { 
            display: flex; align-items: center; gap: 12px; font-size: 13px; 
            padding: 14px; background: var(--glass); border-radius: 16px; margin-top: 10px; 
            border: 1px solid transparent;
        }
        .data-label { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--text-dim); min-width: 60px; font-weight: 800; }

        .btn-group { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
        .btn-action { 
            padding: 20px; border-radius: 22px; border: none; font-weight: 900; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 12px; transition: 0.2s; font-size: 14px;
        }
        .btn-action.primary { background: var(--primary); color: #fff; box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-action.outline { background: var(--glass); border: 1px solid var(--border); color: var(--text-main); }
        .btn-action:active { transform: scale(0.98); }

        footer { padding: 30px 24px; text-align: center; border-top: 1px solid var(--border); background: var(--surface); }
        .copy-text { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="analysis-loader">
        <div class="loader-icon" style="color:var(--primary);"><i data-lucide="award" size="64" fill="currentColor"></i></div>
        <p class="loader-status">Finalizing Mission Report...</p>
    </div>

    <header>
        <div class="header-left">
            <div class="profile-container" id="profile-container">
                <div id="rank-frame" class="normal-frame"></div>
                <div id="user-initial">U</div>
            </div>
            <div class="brand">AgriQ PRO <span>REPORT</span></div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="window.location.href='leaderboard.html'">
                <i data-lucide="trophy" size="18"></i>
            </button>
            <div id="user-tag" style="font-size: 10px; font-weight: 900; background: var(--border); padding: 6px 14px; border-radius: 10px; color: var(--primary); font-family: 'JetBrains Mono';">STUDENT</div>
        </div>
    </header>

    <main>
        <div class="stat-banner">
            <div class="stat-card" style="border-color: var(--primary); background: var(--glass);">
                <span class="stat-val" id="acc-val">0%</span>
                <span class="stat-lbl">Accuracy Rate</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="score-val" style="color: var(--text-main);">0/0</span>
                <span class="stat-lbl">Final Score</span>
            </div>
        </div>

        <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: 900;">
            <i data-lucide="terminal" size="16" style="color: var(--primary);"></i> Simulation Breakdown
        </h3>

        <div id="review-container"></div>

        <div class="btn-group">
            <button class="btn-action primary" onclick="window.location.href='leaderboard.html'">
                <i data-lucide="award" size="20"></i> VIEW GLOBAL RANKINGS
            </button>
            <button id="retry-btn" class="btn-action outline">
                <i data-lucide="rotate-ccw" size="20"></i> RE-RUN SIMULATION
            </button>
            <button class="btn-action outline" onclick="window.location.href='index.html'">
                <i data-lucide="layout-dashboard" size="20"></i> RETURN TO HUB
            </button>
        </div>
    </main>

    <footer>
        <div class="copy-text">© 2026 AGRIQ PRO TERMINAL. DATA SECURED.</div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let currentMod = "";

        auth.onAuthStateChanged(async user => {
            if (!user) return window.location.href = 'index.html';
            
            db.ref(`students/${user.uid}`).on('value', async snap => {
                const userData = snap.val();
                if(userData) {
                    document.getElementById('user-tag').innerText = userData.name.toUpperCase();
                    
                    const initialBox = document.getElementById('user-initial');
                    if (userData.profilePic) {
                        initialBox.style.backgroundImage = `url(${userData.profilePic})`;
                        initialBox.innerText = "";
                    } else {
                        initialBox.style.backgroundImage = "none";
                        initialBox.innerText = userData.name[0];
                    }

                    const lbSnap = await db.ref('leaderboard').once('value');
                    const aggregated = {};
                    lbSnap.forEach(c => {
                        const e = c.val();
                        if(!aggregated[e.uid]) aggregated[e.uid] = 0;
                        aggregated[e.uid] += (parseInt(e.score) || 0);
                    });
                    const lbArr = Object.entries(aggregated).sort((a,b) => b[1]-a[1]);
                    const myRank = lbArr.findIndex(x => x[0] === user.uid) + 1;

                    const rankFrame = document.getElementById('rank-frame');
                    const profContainer = document.getElementById('profile-container');
                    const existingCrown = document.getElementById('frame-crown');
                    if(existingCrown) existingCrown.remove();

                    if (myRank > 0 && myRank <= 3) {
                        document.body.classList.add('elite-mode');
                        rankFrame.className = 'conqueror-frame';
                        const crown = document.createElement('div');
                        crown.id = 'frame-crown';
                        crown.innerHTML = `<i data-lucide="crown" size="12" class="conqueror-crown"></i>`;
                        profContainer.appendChild(crown);
                    } else {
                        rankFrame.className = 'normal-frame';
                        if(userData.focusedMode) document.body.classList.add('focused-mode');
                    }
                    if(window.lucide) lucide.createIcons();
                }
            });

            loadStoredAnalysis(user.uid);
        });

        async function loadStoredAnalysis(uid) {
            const resultData = JSON.parse(localStorage.getItem('agriq_last_result'));
            
            if (!resultData) {
                document.getElementById('analysis-loader').classList.add('fade-out');
                return;
            }

            currentMod = resultData.module;
            document.getElementById('retry-btn').onclick = () => {
                window.location.href = `test.html?mod=${encodeURIComponent(currentMod)}`;
            };

            document.getElementById('acc-val').innerText = `${resultData.accuracy}%`;
            document.getElementById('score-val').innerText = `${resultData.score}/${resultData.total}`;

            const container = document.getElementById('review-container');
            container.innerHTML = ''; 

            resultData.details.forEach((item, index) => {
                const isCorrect = item.user === item.actual;
                const card = document.createElement('div');
                card.className = 'analysis-card';
                card.style.animationDelay = `${index * 0.08}s`;
                
                card.innerHTML = `
                    <span class="status-badge ${isCorrect ? 'pass' : 'fail'}">${isCorrect ? 'CORRECT' : 'WRONG'}</span>
                    <div class="q-title">${item.question}</div>
                    <div class="data-row" style="border-left: 3px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'}">
                        <span class="data-label">INPUT</span>
                        <span style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'}; font-weight:800;">${item.user}</span>
                    </div>
                    ${!isCorrect ? `
                    <div class="data-row" style="background:rgba(34,197,94,0.05); border-left: 3px solid var(--success)">
                        <span class="data-label">TARGET</span>
                        <span style="color:var(--success); font-weight:800;">${item.actual}</span>
                    </div>` : ''}
                `;
                container.appendChild(card);
            });

            try {
                // Ensure we use the exact timestamp sent from test.html for the database key
                const sessionKey = resultData.timestamp || Date.now();
                const studentSnap = await db.ref(`students/${uid}`).once('value');
                const sName = studentSnap.val()?.name || "STUDENT";

                // Save data to Firebase Leaderboard using consistent keys
                await db.ref(`leaderboard/${uid}_${sessionKey}`).set({
                    uid: uid,
                    name: sName,
                    score: resultData.score,
                    total: resultData.total,
                    accuracy: resultData.accuracy,
                    module: resultData.module,
                    timestamp: sessionKey,
                    date: resultData.date || new Date().toISOString()
                });

                // Update the student's personal test count
                await db.ref(`students/${uid}`).update({
                    testsTaken: firebase.database.ServerValue.increment(1)
                });
            } catch (error) {
                console.error("Sync Failed", error);
            }

            setTimeout(() => document.getElementById('analysis-loader').classList.add('fade-out'), 1200);
        }
    </script>
</body>
</html>
