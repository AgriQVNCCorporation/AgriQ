<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Deep Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* Black & White Theme Palette - Matching Index */
            --primary: #ffffff;
            --primary-glow: rgba(255, 255, 255, 0.2);
            --primary-soft: #1e1e1e;
            --bg: #000000;
            --surface: #111111;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --danger: #ff4444;
            --accent: #ffffff;
            --border: #27272a;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- Custom Alert Popup Styles --- */
        #custom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .alert-modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 28px;
            width: 100%; max-width: 350px; padding: 30px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: translateY(20px); opacity: 0;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .alert-modal.active { transform: translateY(0); opacity: 1; }
        .alert-icon { width: 64px; height: 64px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #000; }
        .alert-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; color: #fff; }
        .alert-msg { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 25px; }
        .alert-actions { display: flex; gap: 12px; }
        .alert-btn { flex: 1; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 14px; cursor: pointer; border: none; }
        .btn-sec { background: var(--primary-soft); color: #fff; border: 1px solid var(--border); }
        .btn-main { background: #fff; color: #000; }

        /* --- Loader --- */
        #analysis-loader {
            position: fixed; inset: 0; background: #000000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s; 
        }
        #analysis-loader.fade-out { opacity: 0; visibility: hidden; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-weight: 900; font-size: 22px; letter-spacing: -1px; color: #fff; }
        .brand span { color: var(--text-dim); }

        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; }

        .quote-box {
            background: var(--surface); border: 1px solid var(--border);
            color: white; padding: 25px; border-radius: 24px; margin-bottom: 25px;
            text-align: center; position: relative; overflow: hidden;
        }
        .quote-box i { position: absolute; opacity: 0.05; right: -10px; bottom: -10px; transform: scale(4); }
        .quote-text { font-style: italic; font-size: 14px; line-height: 1.6; font-weight: 500; position: relative; z-index: 1; color: var(--text-dim); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { 
            background: var(--surface); padding: 20px; border-radius: 20px; 
            text-align: center; border: 1px solid var(--border);
        }
        .stat-val { font-size: 24px; font-weight: 800; color: #fff; display: block; }
        .stat-lbl { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        .analysis-card {
            background: var(--surface); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--border);
            position: relative;
        }
        .status-tag { 
            position: absolute; top: 20px; right: 20px; font-size: 10px; 
            font-weight: 800; padding: 4px 8px; border-radius: 8px; text-transform: uppercase;
        }
        .tag-correct { background: #ffffff; color: #000000; }
        .tag-wrong { background: var(--danger); color: #ffffff; }

        .q-text { font-weight: 700; font-size: 15px; margin-bottom: 12px; line-height: 1.5; padding-right: 60px; color: #fff; }
        .ans-row { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; margin-top: 8px; }
        
        .btn-primary { 
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: #fff; color: #000; font-weight: 800;
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px;
        }
        .btn-secondary {
            width: 100%; padding: 18px; border-radius: 20px; border: 2px solid var(--border);
            background: transparent; color: #fff; font-weight: 800;
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 15px;
        }

        footer { padding: 40px 24px; text-align: center; color: var(--text-dim); font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="custom-overlay">
        <div class="alert-modal" id="alert-modal">
            <div class="alert-icon"><i data-lucide="bell" size="28"></i></div>
            <div class="alert-title" id="alert-title">Attention</div>
            <div class="alert-msg" id="alert-msg">Message goes here...</div>
            <div class="alert-actions" id="alert-actions">
                <button class="alert-btn btn-sec" id="alert-cancel">No</button>
                <button class="alert-btn btn-main" id="alert-ok">Yes</button>
            </div>
        </div>
    </div>

    <div id="analysis-loader">
        <div class="spinner"></div>
        <p style="font-weight: 700; color: var(--text-dim); margin-top: 15px;">Synthesizing Performance Data...</p>
    </div>

    <header>
        <div class="brand">Agri<span>Q</span> Analysis</div>
        <div id="user-display" style="font-size: 12px; font-weight: 800; color: var(--text-dim);">...</div>
    </header>

    <main>
        <div class="quote-box">
            <i data-lucide="quote"></i>
            <p class="quote-text" id="inspire-quote">"The master's eye fattens the horse."</p>
        </div>

        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-val" id="stat-accuracy">0%</span>
                <span class="stat-lbl">Accuracy</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="stat-score">0/0</span>
                <span class="stat-lbl">Score</span>
            </div>
        </div>

        <h3 style="font-weight: 800; margin-bottom: 15px; color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Review Report</h3>
        <div id="review-list"></div>

        <button class="btn-primary" onclick="handleNavigation('leaderboard.html', 'View Leaderboard?')">
            <i data-lucide="trophy"></i> Global Leaderboard
        </button>

        <button class="btn-secondary" onclick="handleNavigation('index.html', 'Start New Session?')">
            <i data-lucide="rotate-ccw"></i> Try Another Subject
        </button>
    </main>

    <footer>
        &copy; 2026 AGRIQ PRO • VNC CORP
    </footer>

    <script>
        function agriPopup(title, msg, onConfirm, isConfirm = false) {
            const overlay = document.getElementById('custom-overlay');
            const modal = document.getElementById('alert-modal');
            const okBtn = document.getElementById('alert-ok');
            const cancelBtn = document.getElementById('alert-cancel');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            overlay.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            cancelBtn.style.display = isConfirm ? 'block' : 'none';
            okBtn.onclick = () => {
                modal.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 300);
                if(onConfirm) onConfirm();
            };
            cancelBtn.onclick = () => {
                modal.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 300);
            };
        }

        function handleNavigation(url, title) {
            agriPopup(title, "Do you want to leave this analysis report?", () => {
                window.location.href = url;
            }, true);
        }

        const quotes = [
            "Agriculture is our wisest pursuit, contributing most to real wealth.",
            "The master's eye fattens the horse. Stay focused.",
            "Do not count the days, make the days count.",
            "Farming is a profession of hope. Keep growing."
        ];

        window.onload = () => {
            const results = JSON.parse(localStorage.getItem('agriq_last_result')) || null;
            const userName = localStorage.getItem('agriq_user') || "Aspirant";

            document.getElementById('user-display').innerText = userName.toUpperCase();
            document.getElementById('inspire-quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

            if (!results) {
                document.getElementById('review-list').innerHTML = "<p style='text-align:center; color: var(--text-dim);'>No recent test data found.</p>";
                document.getElementById('analysis-loader').classList.add('fade-out');
                return;
            }

            document.getElementById('stat-accuracy').innerText = results.accuracy + "%";
            document.getElementById('stat-score').innerText = results.score + "/" + results.total;

            const list = document.getElementById('review-list');
            results.details.forEach((item, i) => {
                const isCorrect = item.userAns === item.correctAns;
                const card = document.createElement('div');
                card.className = 'analysis-card';
                card.innerHTML = `
                    <span class="status-tag ${isCorrect ? 'tag-correct' : 'tag-wrong'}">
                        ${isCorrect ? 'Correct' : 'Incorrect'}
                    </span>
                    <div class="q-text">${i + 1}. ${item.question}</div>
                    <div class="ans-row" style="color: ${isCorrect ? '#fff' : 'var(--danger)'}">
                        <i data-lucide="${isCorrect ? 'check-circle' : 'x-circle'}" size="14"></i>
                        <span>Your: ${item.userAns || 'Skipped'}</span>
                    </div>
                    ${!isCorrect ? `
                    <div class="ans-row" style="color: #fff; opacity: 0.8; margin-top: 5px;">
                        <i data-lucide="check-circle" size="14"></i>
                        <span>Correct: ${item.correctAns}</span>
                    </div>` : ''}
                `;
                list.appendChild(card);
            });
            lucide.createIcons();

            setTimeout(() => {
                document.getElementById('analysis-loader').classList.add('fade-out');
            }, 800);
        };
    </script>
</body>
</html>
