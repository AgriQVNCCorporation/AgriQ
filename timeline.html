<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="theme-color" content="#f0f9ff">
    
    <title>AgriQ Pro | To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff; --primary-glow: rgba(0, 132, 255, 0.1);
            --bg: #f0f9ff; --surface: #ffffff;
            --text-main: #002d4d; --text-dim: #64748b; --border: #e2e8f0;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); margin: 0; color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
            overflow-x: hidden; min-height: 100vh;
        }

        /* Top Header */
        header { 
            padding: 20px 24px 10px; background: var(--bg);
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: env(safe-area-inset-top); z-index: 10;
        }
        .header-title { font-weight: 900; font-size: 24px; letter-spacing: -0.5px; }
        .header-title span { color: var(--primary); }
        .calendar-btn { cursor: pointer; color: var(--text-main); padding: 8px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: var(--transition); }
        .calendar-btn:active { transform: scale(0.95); }

        /* Weekly Strip */
        .week-strip {
            display: flex; gap: 15px; padding: 10px 24px 20px; overflow-x: auto; scrollbar-width: none;
            border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: calc(env(safe-area-inset-top) + 60px); z-index: 10;
        }
        .week-strip::-webkit-scrollbar { display: none; }
        .day-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 40px; cursor: pointer; transition: var(--transition);
        }
        .day-name { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .day-date { font-size: 16px; font-weight: 800; color: var(--text-main); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: var(--transition); }
        .day-item.active .day-name { color: var(--primary); }
        .day-item.active .day-date { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,132,255,0.3); }

        /* Main To-Do List Container */
        main { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; min-height: calc(100vh - 180px); }
        .todo-container { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; margin-bottom: 20px; }
        
        /* Empty State / Header */
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; margin-top: 10px;}
        .list-title { font-weight: 800; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        
        .empty-state {
            background: rgba(255,255,255,0.5); border: 1px dashed var(--border); border-radius: 16px;
            padding: 25px 15px; text-align: center; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        
        /* To-Do Card */
        .todo-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 15px; transition: var(--transition);
        }
        
        .todo-icon-wrapper {
            width: 44px; height: 44px; border-radius: 14px; background: var(--primary-glow); color: var(--primary);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        
        .todo-info { flex: 1; min-width: 0; cursor: pointer; }
        .todo-name { font-weight: 700; font-size: 15px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; transition: var(--transition);}
        .todo-time { font-size: 11px; color: var(--text-dim); font-weight: 600; font-family: 'JetBrains Mono'; display: flex; align-items: center; gap: 4px; }
        
        .todo-actions { display: flex; align-items: center; gap: 10px; }
        .btn-icon { color: var(--text-dim); background: none; border: none; padding: 6px; cursor: pointer; transition: var(--transition); border-radius: 8px; }
        .btn-icon:hover { color: var(--danger); background: #fee2e2; }
        
        .checkbox-ring { 
            width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 8px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: var(--transition); background: var(--bg); flex-shrink: 0; 
        }
        .checkbox-ring i { opacity: 0; transform: scale(0.5); transition: var(--transition); color: white;}
        
        /* Completed State */
        .todo-card.completed { opacity: 0.6; background: #f8fafc; }
        .todo-card.completed .todo-name { text-decoration: line-through; color: var(--text-dim); }
        .todo-card.completed .checkbox-ring { background: var(--success); border-color: var(--success); }
        .todo-card.completed .checkbox-ring i { opacity: 1; transform: scale(1); }

        /* Read Only / Past State */
        .todo-card.read-only { cursor: default; }
        .todo-card.read-only .btn-icon { display: none; }
        .todo-card.read-only .checkbox-ring { cursor: not-allowed; pointer-events: none; }
        .past-badge { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; background: var(--border); color: var(--text-dim); }

        /* POST CAROUSEL SECTION */
        .post-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 30px;}
        .section-title { font-weight: 900; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .carousel-container { overflow: hidden; width: 100%; border-radius: 24px; position: relative; }
        .carousel-track { display: flex; transition: transform 0.5s ease-in-out; align-items: flex-start; }
        .carousel-slide { min-width: 100%; flex-shrink: 0; padding-bottom: 10px; }
        .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); width: 100%; display: flex; flex-direction: column; max-height: 280px; margin: 0 2px; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-shrink: 0; }
        .post-avatar { width: 36px; height: 36px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        .post-meta h4 { margin: 0; font-size: 14px; font-weight: 800; }
        .post-meta span { font-size: 10px; color: var(--text-dim); font-weight: 600; }
        .post-content { font-size: 13px; color: var(--text-dim); line-height: 1.6; font-weight: 600; overflow-y: auto; overflow-x: hidden; padding-right: 5px; word-wrap: break-word; flex-grow: 1; }

        /* Floating Action Button */
        .fab {
            position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); right: 20px;
            width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,132,255,0.3);
            cursor: pointer; z-index: 99; transition: var(--transition);
        }
        .fab:active { transform: scale(0.9); }

        /* Footer & Nav */
        footer { text-align: center; padding: 30px 20px 10px; color: var(--text-dim); margin-top: auto; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 5px calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; transition: var(--transition); flex: 1;}
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }

        /* Modals & Bottom Sheets */
        .overlay { position: fixed; inset: 0; background: rgba(0, 45, 77, 0.5); backdrop-filter: blur(4px); z-index: 1000; display: none; opacity: 0; transition: opacity 0.3s; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0; background: var(--bg); border-radius: 32px 32px 0 0; 
            z-index: 1001; padding: 24px; padding-bottom: calc(24px + env(safe-area-inset-bottom));
            transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sheet-title { font-weight: 900; font-size: 18px; color: var(--text-main); display: flex; align-items: center; gap: 8px;}
        
        /* Category Grid */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .category-card { 
            background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; 
            padding: 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; 
            cursor: pointer; transition: var(--transition); color: var(--text-dim); font-weight: 700; font-size: 13px;
        }
        .category-card i { color: var(--primary); }
        .category-card.selected { background: var(--primary-glow); border-color: var(--primary); color: var(--primary); }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 25px; align-items: center; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 5px 15px;}
        .drawer-input { flex-grow: 1; background: transparent; border: none; font-size: 15px; font-weight: 700; color: var(--text-main); outline: none; padding: 12px 0; }
        .time-input { width: 100px; font-family: 'JetBrains Mono'; font-size: 14px; text-align: right; border: none; outline: none; background: transparent; color: var(--primary); font-weight: 800;}

        .btn-full { width: 100%; padding: 18px; background: var(--primary); color: white; font-weight: 900; border: none; border-radius: 16px; font-size: 16px; cursor: pointer; transition: var(--transition); }
        .btn-full:active { transform: scale(0.98); }

        /* Utilities */
        #toast { position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 14px 24px; border-radius: 50px; font-size: 13px; font-weight: 700; display: none; z-index: 10001; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-center { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); background: var(--surface); padding: 30px; border-radius: 28px; width: 90%; max-width: 340px; z-index: 1002; text-align: center; display: none; opacity: 0; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-center.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .modal-actions { display: flex; gap: 12px; margin-top: 25px; }
        .btn-modal { padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; flex: 1; transition: var(--transition); }
        .btn-cancel { background: #f1f5f9; color: var(--text-dim); }
        .btn-confirm { background: var(--danger); color: white; }

        /* Date Picker specific */
        .date-picker-modal { max-width: 320px; padding: 24px; }
        .dp-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 800; align-items: center;}
        .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .dp-day-label { font-size: 11px; color: var(--text-dim); font-weight: 800; margin-bottom: 10px; }
        .dp-date { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; border-radius: 50%; cursor: pointer; margin: auto; transition: var(--transition);}
        .dp-date:hover { background: var(--bg); }
        .dp-date.selected { background: var(--danger); color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
        .dp-date.today { border: 1.5px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div class="overlay" id="main-overlay" onclick="closeAllModals()"></div>

    <div class="bottom-sheet" id="task-drawer">
        <div class="sheet-header">
            <div class="sheet-title" id="drawer-title">Add <span>Task</span></div>
            <i data-lucide="x" size="24" color="var(--text-dim)" onclick="closeAllModals()" style="cursor:pointer;"></i>
        </div>
        
        <p style="font-weight: 800; font-size: 13px; margin-bottom: 12px; color: var(--text-dim);">SELECT CATEGORY</p>
        <div class="category-grid" id="category-container">
            <div class="category-card" onclick="selectCategory(this, 'Study', 'book-open')">
                <i data-lucide="book-open" size="28"></i> Study
            </div>
            <div class="category-card" onclick="selectCategory(this, 'Solve Test', 'file-text')">
                <i data-lucide="file-text" size="28"></i> Solve Test
            </div>
            <div class="category-card" onclick="selectCategory(this, 'Revision', 'refresh-cw')">
                <i data-lucide="refresh-cw" size="28"></i> Revision
            </div>
            <div class="category-card" onclick="selectCategory(this, 'Read Book', 'book')">
                <i data-lucide="book" size="28"></i> Read Book
            </div>
        </div>

        <div class="input-row">
            <input type="text" id="new-task-input" class="drawer-input" placeholder="Task description...">
            <input type="time" id="new-task-time" class="time-input" value="12:00">
        </div>
        
        <input type="hidden" id="editing-task-id" value="">
        <input type="hidden" id="selected-task-icon" value="check-circle">

        <button class="btn-full" onclick="saveTask()">Save Task</button>
    </div>

    <div class="modal-center" id="custom-alert">
        <h3 style="margin-top:0; font-weight:900; color:var(--text-main);">Delete Task</h3>
        <p style="color:var(--text-dim); font-size:14px; line-height:1.5; font-weight:600; margin-bottom: 0;">Are you sure you want to remove this task?</p>
        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="closeAllModals()">Cancel</button>
            <button class="btn-modal btn-confirm" id="alert-confirm">Delete</button>
        </div>
    </div>

    <div class="modal-center date-picker-modal" id="date-picker">
        <div style="text-align: left; margin-bottom: 15px; color: var(--text-dim); font-size: 12px; font-weight: 700;">Select Date</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div style="font-size: 24px; font-weight: 800;" id="picker-display-date">--</div>
            <i data-lucide="calendar" size="18" color="var(--primary)"></i>
        </div>
        
        <div class="dp-header">
            <div style="display:flex; align-items:center; gap:5px;" id="picker-month-year">Month Year</div>
            <div style="display:flex; gap:15px;">
                <i data-lucide="chevron-left" size="20" style="cursor:pointer; color:var(--text-dim);" onclick="changePickerMonth(-1)"></i>
                <i data-lucide="chevron-right" size="20" style="cursor:pointer; color:var(--text-dim);" onclick="changePickerMonth(1)"></i>
            </div>
        </div>

        <div class="dp-grid" id="picker-grid"></div>
        
        <div style="display: flex; justify-content: flex-end; gap: 20px; margin-top: 25px;">
            <span style="color: var(--text-dim); font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase;" onclick="closeAllModals()">Cancel</span>
            <span style="color: var(--primary); font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase;" onclick="applyPickerDate()">OK</span>
        </div>
    </div>

    <header>
        <div class="header-title" id="header-month">Month <span>Year</span></div>
        <div class="calendar-btn" onclick="openDatePicker()">
            <i data-lucide="calendar-days" size="20"></i>
        </div>
    </header>

    <div class="week-strip" id="week-strip-container"></div>

    <main>
        <div class="list-header">
            <div class="list-title"><i data-lucide="list-todo" size="20" color="var(--primary)"></i> Daily Goals</div>
            <div id="date-status-badge"></div>
        </div>

        <div class="todo-container" id="dynamic-tasks">
            </div>

        <div class="post-section">
            <div class="section-title"><i data-lucide="radio" size="18" color="var(--primary)"></i> Exam Updates</div>
            <div class="carousel-container">
                <div class="carousel-track" id="post-track">
                    <div style="width:100%; text-align:center; padding:20px; color:var(--text-dim); font-size:12px;">Loading updates...</div>
                </div>
            </div>
        </div>
        
        <footer>
            <div style="font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 800; letter-spacing: 1px;">© 2026 AGRIQ PRO V5.0</div>
        </footer>
    </main>

    <div class="fab" id="main-fab" onclick="openTaskDrawer()">
        <i data-lucide="plus" size="28"></i>
    </div>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item"><i data-lucide="layout-grid"></i>Dash</a>
        <a href="leaderboard.html" class="nav-item"><i data-lucide="bar-chart-3"></i>Rank</a>
        <a href="timeline.html" class="nav-item active"><i data-lucide="check-square"></i>To-Do</a>
        <a href="todoanalysis.html" class="nav-item"><i data-lucide="activity"></i>Analysis</a>
        <a href="profile.html" class="nav-item"><i data-lucide="user"></i>Profile</a>
    </nav>

    <script>
        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserUid = null;
        let today = new Date();
        let selectedDate = new Date(); 
        
        let pickerCurrentDate = new Date(); 
        let tempSelectedPickerDate = new Date();
        let currentTasks = [];

        // Formatting Helpers
        function getDbDateKey(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        function formatAmPm(timeStr) {
            if(!timeStr) return '';
            let [h, m] = timeStr.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${String(h).padStart(2, '0')}:${m} ${ampm}`;
        }
        function getMonthName(m) { const mos = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]; return mos[m]; }

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'login.html'; } 
            else { currentUserUid = user.uid; initApp(); }
        });

        function initApp() {
            renderHeader();
            renderWeekStrip();
            loadTasksForSelectedDate();
            loadPosts(); 
            
            // Background check for date changes (midnight rollover)
            setInterval(() => {
                const now = new Date();
                if (now.getDate() !== today.getDate() || now.getMonth() !== today.getMonth() || now.getFullYear() !== today.getFullYear()) {
                    today = now;
                    selectedDate = new Date(today); // Reset to new today
                    renderHeader();
                    renderWeekStrip();
                    loadTasksForSelectedDate();
                    showToast("New day started! List reset for today.");
                }
            }, 60000); 
        }

        // --- Post Carousel ---
        function loadPosts() {
            db.ref('posts').orderByChild('timestamp').limitToLast(5).on('value', snap => {
                const track = document.getElementById('post-track');
                track.innerHTML = '';
                if(!snap.exists()) {
                    track.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-dim); font-size:12px;">No updates.</div>`;
                    return;
                }
                const posts = [];
                snap.forEach(child => { posts.push(child.val()); });
                posts.sort((a,b) => b.timestamp - a.timestamp); 

                posts.forEach(post => {
                    const d = new Date(post.timestamp);
                    const timeString = d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    track.innerHTML += `
                        <div class="carousel-slide">
                            <div class="post-card">
                                <div class="post-header">
                                    <div class="post-avatar">${(post.author || 'A').charAt(0).toUpperCase()}</div>
                                    <div class="post-meta">
                                        <h4>${post.author || 'Admin'}</h4>
                                        <span>${timeString}</span>
                                    </div>
                                </div>
                                <div class="post-content" style="white-space: pre-wrap;">${post.content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                            </div>
                        </div>
                    `;
                });
                if (posts.length > 1) startCarousel(posts.length);
            });
        }

        let slideIndex = 0, slideInterval;
        function startCarousel(totalSlides) {
            clearInterval(slideInterval);
            slideIndex = 0;
            const track = document.getElementById('post-track');
            track.style.transform = `translateX(0%)`;
            slideInterval = setInterval(() => {
                slideIndex = (slideIndex + 1) % totalSlides;
                track.style.transform = `translateX(-${slideIndex * 100}%)`;
            }, 5000);
        }

        // --- UI Renders ---
        function renderHeader() {
            document.getElementById('header-month').innerHTML = `${getMonthName(selectedDate.getMonth())} <span>${selectedDate.getFullYear()}</span>`;
        }

        function renderWeekStrip() {
            const container = document.getElementById('week-strip-container');
            container.innerHTML = '';
            
            const dayOfWeek = selectedDate.getDay();
            const diff = selectedDate.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1); 
            const startOfWeek = new Date(selectedDate.setDate(diff));
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

            for (let i = 0; i < 7; i++) {
                let d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                
                const isSelected = d.toDateString() === selectedDate.toDateString();
                const isToday = d.toDateString() === today.toDateString();

                const dayEl = document.createElement('div');
                dayEl.className = `day-item ${isSelected ? 'active' : ''}`;
                dayEl.onclick = () => {
                    selectedDate = new Date(d);
                    renderHeader();
                    renderWeekStrip();
                    loadTasksForSelectedDate();
                };

                let dateStyle = isToday && !isSelected ? 'border: 1.5px solid var(--primary); color: var(--primary);' : '';

                dayEl.innerHTML = `
                    <span class="day-name">${days[i]}</span>
                    <span class="day-date" style="${dateStyle}">${d.getDate()}</span>
                    <div style="height: 4px; width: 4px; border-radius: 50%; background: ${isToday ? 'var(--danger)' : 'transparent'}; margin-top:2px;"></div>
                `;
                container.appendChild(dayEl);
            }
        }

        // --- Firebase Task Logic ---
        function loadTasksForSelectedDate() {
            const dateKey = getDbDateKey(selectedDate);
            db.ref(`students/${currentUserUid}/timeline/${dateKey}`).on('value', snap => {
                currentTasks = [];
                if(snap.exists()) {
                    snap.forEach(child => {
                        currentTasks.push({ id: child.key, ...child.val() });
                    });
                }
                currentTasks.sort((a, b) => a.time.localeCompare(b.time));
                renderTodos();
            });
        }

        function renderTodos() {
            const container = document.getElementById('dynamic-tasks');
            container.innerHTML = '';

            let tMidnight = new Date(today).setHours(0,0,0,0);
            let sMidnight = new Date(selectedDate).setHours(0,0,0,0);
            const isPastDate = sMidnight < tMidnight;

            // Handle UI state based on Date
            const fab = document.getElementById('main-fab');
            const badge = document.getElementById('date-status-badge');
            
            if (isPastDate) {
                fab.style.display = 'none';
                badge.innerHTML = '<span class="past-badge">READ ONLY (PAST)</span>';
            } else {
                fab.style.display = 'flex';
                badge.innerHTML = '';
            }

            if (currentTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="${isPastDate ? 'inbox' : 'clipboard-list'}" size="32"></i>
                        <div style="font-weight:700; font-size:14px;">${isPastDate ? 'No tasks logged for this day.' : 'Your list is empty for this day.'}</div>
                        ${!isPastDate ? '<div style="font-size:11px;">Tap + to add a new goal.</div>' : ''}
                    </div>`;
                lucide.createIcons();
                return;
            }

            currentTasks.forEach(task => {
                const isComplete = task.completed;
                const iconName = task.icon || 'check-circle'; // fallback
                
                // If past date, clicking elements shouldn't trigger edits/completion
                const cardClass = `todo-card ${isComplete ? 'completed' : ''} ${isPastDate ? 'read-only' : ''}`;
                
                // Build actions
                let actionHtml = '';
                if(isPastDate) {
                    // Show a static status for past
                    actionHtml = isComplete 
                        ? `<span style="font-size:10px; font-weight:800; color:var(--success);"><i data-lucide="check-circle" size="14"></i> DONE</span>`
                        : `<span style="font-size:10px; font-weight:800; color:var(--danger);"><i data-lucide="x-circle" size="14"></i> MISSED</span>`;
                } else {
                    actionHtml = `
                        <button class="btn-icon" onclick="event.stopPropagation(); promptDelete('${task.id}')"><i data-lucide="trash-2" size="18"></i></button>
                        <div class="checkbox-ring" onclick="event.stopPropagation(); toggleTaskCompletion('${task.id}', ${isComplete})">
                            <i data-lucide="check" size="14"></i>
                        </div>
                    `;
                }

                const clickAction = !isPastDate ? `onclick="openTaskDrawer('${task.id}')"` : '';

                const html = `
                    <div class="${cardClass}" ${clickAction}>
                        <div class="todo-icon-wrapper">
                            <i data-lucide="${iconName}" size="22"></i>
                        </div>
                        <div class="todo-info">
                            <div class="todo-name">${task.text}</div>
                            <div class="todo-time"><i data-lucide="clock" size="12"></i> ${formatAmPm(task.time)}</div>
                        </div>
                        <div class="todo-actions">
                            ${actionHtml}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
        }

        // --- Drawer Interactions ---
        function selectCategory(el, text, icon) {
            // UI Selection
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            
            // Set Hidden values and Input
            document.getElementById('new-task-input').value = text;
            document.getElementById('selected-task-icon').value = icon;
        }

        function openTaskDrawer(taskId = null) {
            let tMidnight = new Date(today).setHours(0,0,0,0);
            let sMidnight = new Date(selectedDate).setHours(0,0,0,0);
            if (sMidnight < tMidnight) { showToast("Cannot edit past dates."); return; }

            document.getElementById('main-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('main-overlay').style.opacity = '1', 10);
            document.getElementById('task-drawer').style.bottom = '0';

            const input = document.getElementById('new-task-input');
            const timeInput = document.getElementById('new-task-time');
            const idHidden = document.getElementById('editing-task-id');
            const iconHidden = document.getElementById('selected-task-icon');
            
            // Reset grid selection
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));

            if(taskId) {
                const task = currentTasks.find(t => t.id === taskId);
                input.value = task.text;
                timeInput.value = task.time;
                idHidden.value = taskId;
                iconHidden.value = task.icon || 'check-circle';
                document.querySelector('#drawer-title span').innerText = "Edit";
            } else {
                input.value = '';
                iconHidden.value = 'check-circle'; // default
                let d = new Date(); d.setHours(d.getHours()+1); d.setMinutes(0);
                timeInput.value = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                idHidden.value = '';
                document.querySelector('#drawer-title span').innerText = "Task";
            }
        }

        function saveTask() {
            const text = document.getElementById('new-task-input').value.trim();
            const time = document.getElementById('new-task-time').value;
            const icon = document.getElementById('selected-task-icon').value;
            const editId = document.getElementById('editing-task-id').value;

            if(!text || !time) { showToast("Please fill task and time."); return; }

            const dateKey = getDbDateKey(selectedDate);
            const refPath = `students/${currentUserUid}/timeline/${dateKey}`;
            const taskData = { text, time, icon, timestamp: Date.now() };

            if(editId) {
                const existing = currentTasks.find(t => t.id === editId);
                taskData.completed = existing ? existing.completed : false;
                db.ref(`${refPath}/${editId}`).update(taskData).then(() => {
                    showToast("Task Updated"); closeAllModals();
                });
            } else {
                taskData.completed = false;
                db.ref(refPath).push(taskData).then(() => {
                    showToast("Task Added"); closeAllModals();
                });
            }
        }

        function toggleTaskCompletion(taskId, currentStatus) {
            db.ref(`students/${currentUserUid}/timeline/${getDbDateKey(selectedDate)}/${taskId}`).update({ completed: !currentStatus });
        }

        let taskToDelete = null;
        function promptDelete(taskId) {
            taskToDelete = taskId;
            document.getElementById('main-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('main-overlay').style.opacity = '1', 10);
            document.getElementById('custom-alert').classList.add('show');
            
            document.getElementById('alert-confirm').onclick = () => {
                db.ref(`students/${currentUserUid}/timeline/${getDbDateKey(selectedDate)}/${taskToDelete}`).remove()
                .then(() => { showToast("Deleted"); closeAllModals(); });
            };
        }

        function closeAllModals() {
            const overlay = document.getElementById('main-overlay');
            overlay.style.opacity = '0';
            document.getElementById('task-drawer').style.bottom = '-100%';
            document.getElementById('custom-alert').classList.remove('show');
            document.getElementById('date-picker').classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // --- Date Picker Logic ---
        function openDatePicker() {
            pickerCurrentDate = new Date(selectedDate);
            tempSelectedPickerDate = new Date(selectedDate);
            renderPickerCalendar();
            
            document.getElementById('main-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('main-overlay').style.opacity = '1', 10);
            document.getElementById('date-picker').classList.add('show');
        }

        function changePickerMonth(dir) {
            pickerCurrentDate.setMonth(pickerCurrentDate.getMonth() + dir);
            renderPickerCalendar();
        }

        function renderPickerCalendar() {
            document.getElementById('picker-month-year').innerText = `${getMonthName(pickerCurrentDate.getMonth())} ${pickerCurrentDate.getFullYear()}`;
            document.getElementById('picker-display-date').innerText = `${tempSelectedPickerDate.getDate()} ${getMonthName(tempSelectedPickerDate.getMonth()).substring(0,3)} ${tempSelectedPickerDate.getFullYear()}`;

            const grid = document.getElementById('picker-grid');
            grid.innerHTML = '<div class="dp-day-label">S</div><div class="dp-day-label">M</div><div class="dp-day-label">T</div><div class="dp-day-label">W</div><div class="dp-day-label">T</div><div class="dp-day-label">F</div><div class="dp-day-label">S</div>';

            const year = pickerCurrentDate.getFullYear();
            const month = pickerCurrentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) { grid.innerHTML += `<div></div>`; }

            for(let i=1; i<=daysInMonth; i++) {
                let d = new Date(year, month, i);
                let isSelected = d.toDateString() === tempSelectedPickerDate.toDateString();
                let isToday = d.toDateString() === today.toDateString();
                
                let classes = "dp-date";
                if(isSelected) classes += " selected";
                if(isToday && !isSelected) classes += " today";

                let dayEl = document.createElement('div');
                dayEl.className = classes;
                dayEl.innerText = i;
                dayEl.onclick = () => {
                    tempSelectedPickerDate = new Date(year, month, i);
                    renderPickerCalendar();
                };
                grid.appendChild(dayEl);
            }
        }

        function applyPickerDate() {
            selectedDate = new Date(tempSelectedPickerDate);
            closeAllModals();
            renderHeader();
            renderWeekStrip();
            loadTasksForSelectedDate();
        }

    </script>
</body>
</html>
