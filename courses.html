<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>AgriQ Pro | Courses & Modules</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root {
            --primary: #0084ff; --bg: #f0f9ff; --surface: #ffffff;
            --text-main: #002d4d; --text-dim: #64748b; --border: #e2e8f0;
            --daily-color: #10b981; --coak-color: #8b5cf6; --warning: #f59e0b;
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        
        body { 
            background: var(--bg); color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            overflow-x: hidden; min-height: 100vh;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loader-brand { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; animation: pulse 1.5s infinite alternate; }
        .loader-brand span { color: var(--primary); font-family: 'JetBrains Mono'; }
        .loader-spinner { width: 40px; height: 40px; border: 4px solid rgba(0, 132, 255, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; } }

        /* --- HEADER --- */
        header { 
            padding: 20px 24px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); 
            position: sticky; top: env(safe-area-inset-top); z-index: 100;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .brand { font-weight: 900; font-size: 20px; letter-spacing: -1px; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; perspective: 1000px; }

        /* --- SEARCH BAR --- */
        .search-wrapper { position: relative; margin-bottom: 25px; transform-style: preserve-3d; }
        .search-input {
            width: 100%; padding: 18px 20px 18px 55px; border-radius: 20px; border: 2px solid transparent; 
            background: var(--surface); box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            font-weight: 700; font-size: 14px; color: var(--text-main); outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 10px 30px rgba(0, 132, 255, 0.1); }
        .search-input::placeholder { color: var(--text-dim); font-weight: 600; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-dim); transition: 0.3s; }
        .search-input:focus + .search-icon { color: var(--primary); }

        /* --- 3D SQUARE GRID --- */
        .section-title { font-weight: 900; font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .course-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; 
            perspective: 1200px; 
        }

        .course-card {
            background: var(--surface); border-radius: 28px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; aspect-ratio: 1; 
            position: relative; border: 1px solid var(--border);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            transition: var(--transition);
            transform-style: preserve-3d; cursor: pointer; overflow: hidden;
        }

        .course-card::before {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(255,255,255,0.8), transparent);
            opacity: 0; transition: 0.4s; z-index: 1; pointer-events: none;
        }
        .course-card:hover, .course-card:active {
            transform: translateY(-8px) rotateX(8deg) rotateY(-8deg) scale(1.02);
            box-shadow: 15px 20px 30px rgba(0,0,0,0.08), -5px -5px 15px rgba(255,255,255,1);
            border-color: rgba(0, 132, 255, 0.3); z-index: 10;
        }
        .course-card:hover::before { opacity: 1; }

        .bg-symbol { position: absolute; opacity: 0.04; transition: 0.5s; transform: translateZ(-10px); }
        .course-card:hover .bg-symbol { opacity: 0.1; transform: translateZ(0) scale(1.2) rotate(15deg); }

        .icon-box {
            width: 54px; height: 54px; border-radius: 18px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; transform: translateZ(30px); transition: var(--transition);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); z-index: 2;
        }
        .course-card:hover .icon-box { transform: translateZ(50px) scale(1.15) translateY(-5px); }

        .course-title { font-weight: 800; font-size: 13px; color: var(--text-main); transform: translateZ(20px); z-index: 2; transition: 0.3s;}
        .course-card:hover .course-title { color: var(--primary); }
        
        .badge {
            font-size: 9px; font-weight: 900; padding: 5px 10px; border-radius: 10px; 
            margin-top: 10px; transform: translateZ(15px); text-transform: uppercase; z-index: 2;
            display: flex; align-items: center; gap: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Themed Cards */
        .card-daily .icon-box { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; }
        .card-daily .badge { background: rgba(16, 185, 129, 0.1); color: var(--daily-color); border: 1px solid rgba(16, 185, 129, 0.2); }

        .card-coak .icon-box { background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%); color: white; }
        .card-coak .badge { background: rgba(139, 92, 246, 0.1); color: var(--coak-color); border: 1px solid rgba(139, 92, 246, 0.2); }

        .card-practice .icon-box { background: linear-gradient(135deg, #0084ff 0%, #00c6ff 100%); color: white; }
        .card-practice .badge { background: rgba(0, 132, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 132, 255, 0.2); }

        /* Dynamic Free/Owned Card */
        .card-dynamic-free .icon-box { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); color: white; }
        .card-dynamic-free .badge { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        
        .card-owned .icon-box { background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%); color: white; }
        .card-owned .badge { background: rgba(139, 92, 246, 0.1); color: var(--coak-color); border: 1px solid rgba(139, 92, 246, 0.2); }

        /* Locked Card Styling */
        .card-locked { background: #f8fafc; border-color: transparent; }
        .card-locked .icon-box { background: #e2e8f0; color: var(--text-dim); box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .card-locked .course-title { color: var(--text-dim); }
        .card-locked .badge { background: #e2e8f0; color: var(--text-dim); border: none; }
        .card-locked:hover { transform: translateY(-3px) rotateX(3deg) rotateY(-3deg); border-color: var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-locked:hover .course-title { color: var(--text-dim); }
        
        .lock-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.4); z-index: 5; border-radius: 28px; pointer-events: none; }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px); display: flex; justify-content: space-around; 
            padding: 15px 5px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100;
        }
        .nav-item { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; transition: var(--transition); flex: 1; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }

        /* Toast & Modals */
        #toast { 
            position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 14px 24px; border-radius: 50px;
            font-size: 13px; font-weight: 700; display: none; z-index: 10001; animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-brand">AGRI<span>Q</span></div>
        <div class="loader-spinner"></div>
    </div>

    <div id="checkout-overlay" style="position: fixed; inset: 0; background: rgba(0, 45, 77, 0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 24px;">
        <div style="background: white; padding: 30px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease;">
            <div style="width: 60px; height: 60px; background: rgba(139, 92, 246, 0.1); color: var(--coak-color); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <i data-lucide="shopping-cart" size="30"></i>
            </div>
            <h3 id="checkout-title" style="margin:0 0 10px; font-weight:900; font-size:18px;">Module Name</h3>
            <p style="color:var(--text-dim); font-size:13px; font-weight:600; margin-bottom: 20px;">Unlock full lifetime access to premium study materials and mock tests.</p>
            
            <div style="background: #f8fafc; border: 1px dashed var(--border); padding: 15px; border-radius: 16px; margin-bottom: 25px;">
                <span style="font-size: 11px; font-weight: 800; color: var(--text-dim); display: block; margin-bottom: 5px;">TOTAL AMOUNT</span>
                <span id="checkout-price" style="font-size: 28px; font-weight: 900; color: var(--text-main); font-family: 'JetBrains Mono';">₹0</span>
            </div>

            <div style="display:flex; gap:12px;">
                <button onclick="closeCheckout()" style="padding: 16px 20px; border-radius: 16px; border: none; background: #f1f5f9; color: var(--text-dim); font-weight: 800; cursor: pointer; flex: 1;">CANCEL</button>
                <button id="btn-pay" style="padding: 16px 20px; border-radius: 16px; border: none; background: var(--coak-color); color: white; font-weight: 900; cursor: pointer; flex: 1.5; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);">
                    PAY NOW
                </button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <header>
        <div class="header-left">
            <i data-lucide="layout-grid" size="24" style="color:var(--text-main);"></i>
            <div class="brand">AGRI<span>Q</span> PRO</div>
        </div>
        <div style="display:flex; gap:18px; align-items:center;">
            <i data-lucide="search" size="20" style="color:var(--text-main);"></i>
            <i data-lucide="bell" size="20" style="color:var(--text-dim)"></i>
        </div>
    </header>

    <main>
        <div class="search-wrapper">
            <input type="text" id="course-search" class="search-input" placeholder="Search modules, subjects...">
            <i data-lucide="search" size="20" class="search-icon"></i>
        </div>

        <div class="section-title"><i data-lucide="layers" size="20" color="var(--primary)"></i> Study Modules</div>

        <div class="course-grid" id="grid-container">
            <div class="course-card card-daily" onclick="window.location.href='daily.html'" data-title="Daily Test Unlock">
                <i data-lucide="zap" size="100" class="bg-symbol"></i>
                <div class="icon-box"><i data-lucide="zap" size="26"></i></div>
                <div class="course-title">Daily Test</div>
                <div class="badge"><i data-lucide="unlock" size="10"></i> Unlocked</div>
            </div>

            <div class="course-card card-coak" onclick="window.location.href='coakmonks.html'" data-title="COAK Module Unlock">
                <i data-lucide="book-open-check" size="100" class="bg-symbol"></i>
                <div class="icon-box"><i data-lucide="book-open-check" size="26"></i></div>
                <div class="course-title">COAK Module</div>
                <div class="badge"><i data-lucide="unlock" size="10"></i> Unlocked</div>
            </div>

            <div class="course-card card-practice" onclick="window.location.href='dashboard.html'" data-title="Daily Practice Unlock">
                <i data-lucide="target" size="100" class="bg-symbol"></i>
                <div class="icon-box"><i data-lucide="target" size="26"></i></div>
                <div class="course-title">Daily Practice</div>
                <div class="badge"><i data-lucide="unlock" size="10"></i> Unlocked</div>
            </div>
            
            </div>

        <div style="height: 40px;"></div> 
    </main>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item"><i data-lucide="layout-grid"></i>Dash</a>
        <a href="leaderboard.html" class="nav-item"><i data-lucide="bar-chart-3"></i>Rank</a>
        <a href="courses.html" class="nav-item active"><i data-lucide="library"></i>Courses</a>
        <a href="profile.html" class="nav-item"><i data-lucide="user"></i>Profile</a>
    </nav>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let myPurchases = [];
        let allStoreModules = [];

        window.addEventListener('load', () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    initDataListeners(user.uid);
                    setTimeout(() => {
                        document.getElementById('preloader').style.display = 'none';
                    }, 800);
                } else {
                    window.location.href = 'login.html';
                }
            });
        });

        function initDataListeners(uid) {
            // Listen for Purchases
            db.ref(`students/${uid}/purchases`).on('value', snap => {
                myPurchases = [];
                if (snap.exists()) {
                    snap.forEach(child => {
                        myPurchases.push(child.key);
                    });
                }
                renderGrid();
            });

            // Listen for Store Modules
            db.ref('store_modules').on('value', snap => {
                allStoreModules = [];
                if (snap.exists()) {
                    snap.forEach(child => {
                        allStoreModules.push({ key: child.key, ...child.val() });
                    });
                }
                allStoreModules.sort((a, b) => b.timestamp - a.timestamp);
                renderGrid();
            });
        }

        function renderGrid() {
            const grid = document.getElementById('grid-container');
            document.querySelectorAll('.dynamic-card').forEach(card => card.remove());

            allStoreModules.forEach(data => {
                const hasBought = myPurchases.includes(data.key);
                const isLocked = data.accessType === 'locked' && !hasBought;

                const card = document.createElement('div');
                card.className = `course-card dynamic-card ${isLocked ? 'card-locked' : (hasBought ? 'card-owned' : 'card-dynamic-free')}`;
                card.setAttribute('data-title', data.title);
                card.id = `card-${data.key}`; // Assign unique ID to every card

                if (isLocked) {
                    card.onclick = () => openCheckout(data.key, data.title, data.price);
                    card.innerHTML = `
                        <div class="lock-overlay"></div>
                        <i data-lucide="${data.icon}" size="100" class="bg-symbol"></i>
                        <div class="icon-box"><i data-lucide="lock" size="26"></i></div>
                        <div class="course-title">${data.title}</div>
                        <div class="badge"><i data-lucide="lock" size="10"></i> ₹${data.price}</div>
                    `;
                } else {
                    card.onclick = () => { window.location.href = `test.html?mod=${data.key}`; };
                    card.innerHTML = `
                        <i data-lucide="${data.icon}" size="100" class="bg-symbol"></i>
                        <div class="icon-box"><i data-lucide="${data.icon}" size="26"></i></div>
                        <div class="course-title">${data.title}</div>
                        <div class="badge"><i data-lucide="check-circle" size="10"></i> ${hasBought ? 'OWNED' : 'FREE'}</div>
                    `;
                }
                grid.appendChild(card);
                attach3DEffect(card);
            });
            lucide.createIcons();
        }

        function openCheckout(moduleKey, moduleTitle, modulePrice) {
            document.getElementById('checkout-title').innerText = moduleTitle;
            document.getElementById('checkout-price').innerText = "₹" + modulePrice;
            document.getElementById('checkout-overlay').style.display = 'flex';
            document.getElementById('btn-pay').onclick = () => processRealPayment(moduleKey, moduleTitle, modulePrice);
        }

        function closeCheckout() {
            document.getElementById('checkout-overlay').style.display = 'none';
        }

        function processRealPayment(moduleKey, moduleTitle, modulePrice) {
            const btn = document.getElementById('btn-pay');
            btn.innerHTML = `Processing...`;

            var options = {
                "key": "rzp_test_Sc8VUR3pXHh9Qp",
                "amount": modulePrice * 100,
                "currency": "INR",
                "name": "AgriQ Pro",
                "handler": function (response) {
                    // --- BEAUTIFUL CUSTOM TOAST NOTIFICATION ---
                    showToast("Payment Successful! Module Unlocked.");
                    
                    // 1. Manually add to local list so UI updates immediately
                    if (!myPurchases.includes(moduleKey)) {
                        myPurchases.push(moduleKey);
                    }
                    
                    // 2. Re-render the grid right now
                    renderGrid();
                    
                    // 3. Close modal
                    closeCheckout();

                    // 4. Update Database
                    const uid = auth.currentUser.uid;
                    db.ref(`students/${uid}/purchases/${moduleKey}`).set({
                        paymentId: response.razorpay_payment_id,
                        timestamp: Date.now()
                    }).catch(error => {
                        console.error("Database sync error:", error);
                    });
                },
                "theme": { "color": "#8b5cf6" }
            };
            var rzp1 = new Razorpay(options);
            
            rzp1.on('payment.failed', function (response){
                showToast("Payment Failed: " + response.error.description);
                btn.innerText = "PAY NOW";
            });
            
            rzp1.open();
            setTimeout(() => { btn.innerText = "PAY NOW"; }, 2000);
        }

        function attach3DEffect(card) {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; 
                const y = e.clientY - rect.top;  
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
            });
        }
        
        // --- UI Effects ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = `<i data-lucide="check-circle" size="14" style="margin-right:6px; vertical-align:middle;"></i> ${msg}`;
            lucide.createIcons();
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
        
        lucide.createIcons();
    </script>
</body>
</html>
