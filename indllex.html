<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AgriQ Pro | Terminal Login & Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b;
            --primary-glow: rgba(255, 59, 59, 0.4);
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --glass: rgba(255, 255, 255, 0.03);
            --danger: #ff3b3b;
            --boot-accent: #00aaff;
            --transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.focused-mode {
            --primary: #00aaff;
            --primary-glow: rgba(0, 170, 255, 0.3);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --glass: rgba(0, 170, 255, 0.05);
            --danger: #00aaff;
        }

        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden; 
            transition: background-color var(--transition), color var(--transition); 
        }

        #screen-auth, #screen-dash {
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        #app-loader {
            position: fixed; inset: 0; background: #000000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s; 
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; }

        .electric-icon { color: var(--boot-accent); animation: electricPulse 1.5s infinite ease-in-out; margin-bottom: 25px; }
        @keyframes electricPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--boot-accent)); opacity: 0.8; }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 25px var(--boot-accent)) brightness(1.5); opacity: 1; }
        }

        .loading-bar-container { width: 140px; height: 2px; background: #111; border-radius: 10px; overflow: hidden; position: relative; }
        .loading-bar-fill { position: absolute; width: 45%; height: 100%; background: var(--boot-accent); box-shadow: 0 0 15px var(--boot-accent); animation: scan 1.5s infinite ease-in-out; }
        @keyframes scan { 0% { left: -45%; } 100% { left: 100%; } }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; background: var(--surface); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-weight: 900; font-size: 22px; letter-spacing: -1.5px; text-transform: uppercase; cursor: pointer; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }
        
        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; }

        .auth-card { background: var(--surface); border-radius: 32px; padding: 30px; border: 1px solid var(--border); }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); z-index: 5; }
        
        input, select { 
            width: 100%; padding: 18px 18px 18px 52px; border-radius: 20px; border: 1.5px solid var(--border); 
            background: var(--glass); color: var(--text-main); font-weight: 600; transition: 0.3s; appearance: none;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 20px var(--primary-glow); }

        .btn-primary { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--primary); color: #fff; 
            font-weight: 900; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-social {
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.3s; background: var(--glass); color: var(--text-main);
        }

        .rank-card { 
            background: linear-gradient(135deg, var(--primary) 0%, #000 150%); 
            border: 1.5px solid var(--primary); padding: 25px; border-radius: 28px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center; color: #fff;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        
        .rank-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        .arena-grid, .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 18px; border-radius: 22px; text-align: center; }
        .stat-val { display: block; font-size: 22px; font-weight: 900; color: var(--primary); font-family: 'JetBrains Mono'; }
        .stat-label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .toggle-container {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; background: var(--glass); border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);
        }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        #main-footer {
            padding: 40px 24px; text-align: center; border-top: 1px solid var(--border);
            background: var(--surface); opacity: 0; transform: translateY(20px); transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #main-footer.visible { opacity: 1; transform: translateY(0); }
        .copyright { font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
        .copyright span { color: var(--primary); font-weight: 900; }

        .scroll-hint { margin-bottom: 15px; color: var(--text-dim); font-size: 10px; font-weight: 800; cursor: pointer; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-5px);} 60% {transform: translateY(-3px);} }

        .hidden { display: none !important; }

        #custom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .alert-modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 350px; padding: 30px; text-align: center; transform: scale(0.9); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .alert-modal.active { transform: scale(1); opacity: 1; border-color: var(--danger); }
        .alert-icon-box { width: 64px; height: 64px; background: var(--danger); border-radius: 22px; display: flex; align-items: center; justify-content: center; margin: 0 auto; margin-bottom: 20px; color: #fff; }
    </style>
</head>
<body id="top">

    <div id="custom-overlay">
        <div class="alert-modal" id="alert-modal">
            <div class="alert-icon-box" id="alert-icon-container"><i data-lucide="shield-alert" size="32"></i></div>
            <div class="alert-title" id="alert-title" style="font-weight:900; color:var(--text-main); margin-bottom:10px;">Attention</div>
            <div class="alert-msg" id="alert-msg" style="color:var(--text-dim); font-size:14px; margin-bottom:20px;"></div>
            <div id="alert-actions" style="display:flex; gap:10px;">
                <button class="btn-primary" id="alert-ok" style="padding:15px; flex:1;">UNDERSTOOD</button>
                <button class="btn-social hidden" id="alert-cancel" style="flex:1;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="app-loader">
        <div class="electric-icon"><i data-lucide="zap" size="64" stroke-width="3" fill="currentColor"></i></div>
        <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
        <p style="font-size:10px; font-family:'JetBrains Mono'; color:var(--boot-accent); margin-top:15px; letter-spacing:3px;">AgriQ V3.0 BOOTING</p>
    </div>

    <header>
        <div class="brand" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">AGRI<span>Q</span> PRO</div>
        <div style="display: flex; align-items: center; gap: 18px;">
            <button id="logout-btn" class="hidden" style="background:none; border:none; color:var(--text-dim); cursor:pointer; padding:5px; display:flex; align-items:center;" onclick="confirmLogout()" title="Terminate Session">
                <i data-lucide="log-out" size="20"></i>
            </button>
            <div class="admin-trigger" onclick="location.href='admin.html'" title="Admin Portal" style="cursor:pointer; color:var(--text-dim); position: relative; display: flex; align-items: center; gap: 6px;">
                <i data-lucide="lock-keyhole" size="18"></i>
                <span id="reg-count-badge" style="font-size: 10px; font-weight: 800; background: var(--border); padding: 2px 6px; border-radius: 8px; color: var(--primary);">0</span>
            </div>
        </div>
    </header>

    <main>
        <div id="screen-auth" class="auth-card">
            <h2 style="font-weight: 900; margin-top: 0;">Access Portal</h2>
            <form onsubmit="handleAuth(event)">
                <div class="input-group"><i data-lucide="mail"></i><input type="email" id="email" placeholder="Email" required></div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="password" placeholder="Password" required></div>
                <button type="submit" class="btn-primary" id="auth-btn">SIGN IN <i data-lucide="arrow-right"></i></button>
            </form>
            <div style="display:flex; align-items:center; gap:10px; margin:20px 0; color:var(--text-dim); font-size:10px; font-weight:800; text-transform:uppercase;">
                <hr style="flex:1; border:0; height:1px; background:var(--border);">Social Access<hr style="flex:1; border:0; height:1px; background:var(--border);">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-social" onclick="handleSocialLogin('google')" style="background:#fff; color:#000; border:none;"><img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Google</button>
                <button class="btn-social" onclick="handleSocialLogin('github')" style="background:#24292e; border:none; color:#fff;"><i data-lucide="github" size="18" fill="white"></i> GitHub</button>
            </div>
            <p style="text-align:center; font-size:12px; margin-top:20px; color:var(--text-dim);">
                Need access? <a href="javascript:void(0)" onclick="toggleAuthMode()" id="auth-toggle-text" style="color:var(--primary); text-decoration:none; font-weight:800;">Register Account</a>
            </p>
        </div>

        <div id="screen-dash" class="hidden">
            <div class="toggle-container">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i data-lucide="eye" size="18"></i>
                    <span style="font-weight:800; font-size:12px;">FOCUSED MODE</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="focus-toggle" onchange="toggleFocusedMode()">
                    <span class="slider"></span>
                </label>
            </div>

            <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
                <div id="user-initial" style="width:50px; height:50px; background:var(--primary); border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px; color:#fff;">U</div>
                <div>
                    <h2 id="user-display-name" style="margin:0; font-weight:900; font-size:18px;">STUDENT</h2>
                    <p id="user-email-label" style="margin:0; font-size:11px; color:var(--text-dim);"></p>
                </div>
            </div>

            <div class="rank-card" id="global-rank-card">
                <div>
                    <span class="stat-label" id="rank-header-label" style="color:rgba(255,255,255,0.8);">Live Leaderboard Position</span>
                    <div style="font-size:32px; font-weight:900;">#<span id="rank-val">--</span></div>
                    <span id="rank-sync-status" style="font-size:8px; text-transform:uppercase; letter-spacing:1px; opacity:0.6;">Syncing...</span>
                </div>
                <div id="rank-icon-container"><i data-lucide="refresh-cw" class="lucide-spin" size="40"></i></div>
            </div>

            <div class="arena-grid">
                <button class="btn-social" onclick="enterArena('battle')" style="background: var(--primary); color: #fff; border:none;">
                    <i data-lucide="swords" size="18"></i> BATTLE ARENA
                </button>
                <button class="btn-social" onclick="showLeaderboard()">
                    <i data-lucide="trophy" size="18"></i> LEADERBOARD
                </button>
            </div>

            <div class="input-group" style="margin-bottom:20px;">
                <i data-lucide="layers"></i>
                <select id="module-selector">
                    <option value="">LOADING MODULES...</option>
                </select>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span class="stat-val" id="tests-taken">0</span><span class="stat-label">Total Solved</span></div>
                <div class="stat-card"><span class="stat-val" id="avg-accuracy">0%</span><span class="stat-label">Accuracy Rate</span></div>
            </div>

            <button class="btn-primary" onclick="startTerminalTest()" style="padding:22px; font-size:16px; margin-bottom:30px;">
                <i data-lucide="play-circle"></i> START TEST 
            </button>

            <div class="scroll-hint" onclick="document.getElementById('main-footer').scrollIntoView()">
                <i data-lucide="chevron-down" size="14"></i> VIEW CREDENTIALS
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="copyright">© 2026 <span>AgriQ Pro</span>. VNC Corp.</div>
        <div style="font-size: 8px; color: var(--text-dim); margin-top: 8px; letter-spacing: 3px; font-weight: 800;"> VNC CORP SECURE V3.0</div>
        <div style="margin-top: 15px; color: var(--primary); opacity: 0.5;">
             <i data-lucide="fingerprint" size="24"></i>
        </div>
    </footer>

    <script>
        const observerOptions = { threshold: 0.1 };
        const footerObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, observerOptions);
        footerObserver.observe(document.getElementById('main-footer'));

        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let isLoginMode = true;

        function toggleFocusedMode() {
            const isFocused = document.body.classList.toggle('focused-mode');
            const user = auth.currentUser;
            if (user) db.ref(`students/${user.uid}`).update({ focusedMode: isFocused });
        }

        function agriAlert(title, msg, isConfirm = false, onConfirm = null) {
            const overlay = document.getElementById('custom-overlay');
            const modal = document.getElementById('alert-modal');
            const cancelBtn = document.getElementById('alert-cancel');
            const okBtn = document.getElementById('alert-ok');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            if(isConfirm) {
                cancelBtn.classList.remove('hidden');
                okBtn.innerText = "PROCEED";
                okBtn.onclick = () => { closeAlert(); if(onConfirm) onConfirm(); };
            } else {
                cancelBtn.classList.add('hidden');
                okBtn.innerText = "UNDERSTOOD";
                okBtn.onclick = closeAlert;
            }
            overlay.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); lucide.createIcons(); }, 10);
            cancelBtn.onclick = closeAlert;
            function closeAlert() { modal.classList.remove('active'); setTimeout(() => overlay.style.display = 'none', 300); }
        }

        function confirmLogout() {
            agriAlert("TERMINATE SESSION?", "Are you sure you want to disconnect?", true, () => {
                auth.signOut().then(() => window.location.reload());
            });
        }

        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('app-loader');
            if (user) { syncUserRecord(user); showDashboard(user); } 
            else { showAuth(); }
            setTimeout(() => loader.classList.add('fade-out'), 2200);
        });

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                if (isLoginMode) await auth.signInWithEmailAndPassword(email, password); 
                else await auth.createUserWithEmailAndPassword(email, password);
            } catch (err) { agriAlert("Access Error", err.message); }
        }

        async function handleSocialLogin(p) {
            const provider = p === 'google' ? new firebase.auth.GoogleAuthProvider() : new firebase.auth.GithubAuthProvider();
            try { await auth.signInWithRedirect(provider); } catch (err) { agriAlert("Provider Error", err.message); }
        }

        async function syncUserRecord(user) {
            const userRef = db.ref(`students/${user.uid}`);
            const snap = await userRef.once('value');
            if (!snap.exists()) {
                await userRef.set({ 
                    uid: user.uid,
                    name: (user.displayName || user.email.split('@')[0]).toUpperCase(),
                    email: user.email, 
                    testsTaken: 0, 
                    avgAccuracy: 0, 
                    lastActive: Date.now(), 
                    focusedMode: true,
                    registeredAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }

        async function showDashboard(user) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-dash').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            const displayName = (user.displayName || user.email.split('@')[0]).toUpperCase();
            document.getElementById('user-display-name').innerText = displayName;
            document.getElementById('user-email-label').innerText = user.email;
            document.getElementById('user-initial').innerText = displayName[0];

            db.ref(`students/${user.uid}`).on('value', snap => {
                if(!snap.exists()) {
                    document.getElementById('tests-taken').innerText = "0";
                    document.getElementById('avg-accuracy').innerText = "0%";
                    return;
                }
                const data = snap.val() || {};
                document.getElementById('tests-taken').innerText = data.testsTaken || 0;
                document.getElementById('avg-accuracy').innerText = (data.avgAccuracy || 0) + '%';
                if (data.focusedMode !== false) {
                    document.body.classList.add('focused-mode');
                    document.getElementById('focus-toggle').checked = true;
                }
                // Recalculate rank whenever user stats change
                calculateRanking(user.uid);
            });
            loadModules();
            lucide.createIcons();
        }

        async function loadModules() {
            const select = document.getElementById('module-selector');
            db.ref('questions').on('value', snap => {
                select.innerHTML = '<option value="">SELECT LIVE MODULE</option>';
                const allModules = snap.val() || {};
                Object.keys(allModules).forEach(k => {
                    if (allModules[k].enabled !== false) {
                        const opt = document.createElement('option');
                        opt.value = k;
                        opt.innerText = k.toUpperCase().replace(/_/g, ' ');
                        select.appendChild(opt);
                    }
                });
            });
        }

        /**
         * GLOBAL RANKING LOGIC (Synced with Leaderboard.html)
         */
        async function calculateRanking(currentUserId) {
            const syncStatus = document.getElementById('rank-sync-status');
            const rankDisplay = document.getElementById('rank-val');
            const card = document.getElementById('global-rank-card');
            const label = document.getElementById('rank-header-label');
            const iconBox = document.getElementById('rank-icon-container');

            if(syncStatus) syncStatus.innerText = "Syncing rank...";

            db.ref('students').once('value', snap => {
                if(!snap.exists()) return;
                
                let students = [];
                snap.forEach(c => {
                    const s = c.val();
                    // FILTER: Only rank users who have actually taken a test
                    if (s && (s.testsTaken > 0 || s.avgAccuracy > 0)) {
                        students.push({ id: c.key, ...s });
                    }
                });
                
                // Update Admin badge count (total registered)
                const badge = document.getElementById('reg-count-badge');
                if(badge) badge.innerText = snap.numChildren();

                // LEADERBOARD SORTING: Accuracy (Primary) -> Tests Taken (Tie-breaker)
                students.sort((a,b) => {
                    if ((b.avgAccuracy || 0) !== (a.avgAccuracy || 0)) {
                        return (b.avgAccuracy || 0) - (a.avgAccuracy || 0);
                    }
                    return (b.testsTaken || 0) - (a.testsTaken || 0);
                });
                
                const rankIndex = students.findIndex(s => s.id === currentUserId);
                const rank = rankIndex === -1 ? null : rankIndex + 1;
                
                rankDisplay.innerText = rank || "N/A";
                if(syncStatus) syncStatus.innerText = rank ? "Live Standing Secured" : "Unranked: Solve tests to rank";

                // --- PREMIUM THEMES ---
                // Default
                card.style.background = "linear-gradient(135deg, var(--primary) 0%, #000 150%)";
                card.style.borderColor = "var(--border)";
                card.style.color = "#fff";
                label.style.color = "rgba(255,255,255,0.8)";
                iconBox.innerHTML = '<i data-lucide="shield-check" size="40"></i>';

                if (rank === 1) {
                    card.style.background = "linear-gradient(135deg, #FFD700 0%, #B8860B 100%)";
                    card.style.borderColor = "#FFDF00"; card.style.color = "#000";
                    label.style.color = "rgba(0,0,0,0.7)"; 
                    iconBox.innerHTML = '<i data-lucide="crown" size="40"></i>';
                } 
                else if (rank === 2) {
                    card.style.background = "linear-gradient(135deg, #E0E0E0 0%, #707070 100%)";
                    card.style.borderColor = "#F0F0F0"; card.style.color = "#000";
                    label.style.color = "rgba(0,0,0,0.7)"; 
                    iconBox.innerHTML = '<i data-lucide="medal" size="40"></i>';
                }
                else if (rank === 3) {
                    card.style.background = "linear-gradient(135deg, #CD7F32 0%, #3E2723 100%)";
                    card.style.borderColor = "#FF8A65"; card.style.color = "#fff";
                    iconBox.innerHTML = '<i data-lucide="award" size="40"></i>';
                }
                else if (rank > 3 && rank <= 10) {
                    card.style.background = "linear-gradient(135deg, #1a1a1a 0%, #000 100%)";
                    card.style.borderColor = "var(--primary)";
                    iconBox.innerHTML = '<i data-lucide="trending-up" size="40"></i>';
                }

                lucide.createIcons();
            });
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerHTML = isLoginMode ? 'SIGN IN <i data-lucide="arrow-right"></i>' : 'CREATE ACCOUNT <i data-lucide="user-plus"></i>';
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? 'Register Account' : 'Back to Login';
            lucide.createIcons();
        }

        function enterArena() { agriAlert("Arena", "Launching soon."); }
        function showLeaderboard() { window.location.href = "leaderboard.html"; }
        function startTerminalTest() {
            const mod = document.getElementById('module-selector').value;
            if(!mod) return agriAlert("Select Module", "Select an active module to initiate sequence.");
            window.location.href = `test.html?mod=${mod}`;
        }

        function showAuth() {
            document.getElementById('screen-auth').classList.remove('hidden');
            document.getElementById('screen-dash').classList.add('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            lucide.createIcons();
        }
        lucide.createIcons();
    </script>
</body>
</html>
