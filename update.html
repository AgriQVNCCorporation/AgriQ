<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>AgriQ Pro | Exam Updates</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff; 
            --primary-light: #e0f2fe;
            --bg: #f0f9ff; 
            --surface: #ffffff;
            --text-main: #002d4d; 
            --text-dim: #64748b; 
            --border: #e2e8f0;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); margin: 0; color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            padding: 20px 24px; background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(15px); position: sticky; top: env(safe-area-inset-top); z-index: 100;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--primary-light); padding: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); color: var(--primary); }
        .back-btn:active { transform: scale(0.9); }
        .brand { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; }

        .page-header { margin-bottom: 25px; margin-top: 10px; }
        .page-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: var(--text-main); }
        .page-subtitle { font-size: 13px; color: var(--text-dim); font-weight: 600; line-height: 1.5; }

        /* UPDATE CARDS */
        .update-card {
            background: var(--surface); border-radius: 28px; padding: 20px;
            margin-bottom: 25px; border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            animation: fadeIn 0.4s ease;
        }

        .update-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px;
        }

        .author-info { display: flex; align-items: center; gap: 12px; }
        .author-avatar {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary) 0%, #00c6ff 100%);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 18px;
        }
        .author-name { font-size: 15px; font-weight: 800; color: var(--text-main); margin: 0 0 2px 0; }
        .post-time { font-size: 11px; color: var(--text-dim); font-weight: 600; margin: 0; }
        
        .tag {
            background: #fef2f2; color: #ef4444; padding: 6px 12px; border-radius: 12px;
            font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 4px;
        }

        .update-title { font-size: 18px; font-weight: 900; color: var(--text-main); margin: 0 0 10px 0; line-height: 1.3; }
        .update-text { font-size: 13px; color: var(--text-dim); font-weight: 600; line-height: 1.6; margin: 0 0 15px 0; white-space: pre-wrap; }

        /* IMAGE CONTAINER */
        .image-container {
            width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 15px;
            background: #f8fafc; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        
        .update-image {
            width: 100%; height: auto; display: block; object-fit: cover;
        }

        .image-placeholder {
            padding: 40px 20px; text-align: center; color: var(--text-dim); width: 100%;
        }

        /* Action Buttons */
        .action-row {
            display: flex; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 15px;
        }
        
        .btn-action {
            flex: 1; padding: 14px; border-radius: 16px; border: none; font-weight: 800;
            font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: var(--transition); background: #f8fafc; color: var(--text-main);
        }
        .btn-action:active { transform: scale(0.96); }
        .btn-primary-action { background: var(--primary-light); color: var(--primary); }

        /* Toast */
        #toast { 
            position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 14px 24px; border-radius: 50px;
            font-size: 13px; font-weight: 700; display: none; z-index: 10001; 
            animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .loader { text-align: center; color: var(--text-dim); font-size: 14px; font-weight: 600; padding: 40px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <header>
        <div class="header-left">
            <div class="back-btn" onclick="window.location.href='index.html'">
                <i data-lucide="chevron-left" size="22"></i>
            </div>
            <div class="brand">Announcements</div>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1 class="page-title">Latest Updates 📢</h1>
            <p class="page-subtitle">Stay informed with the newest study schedules, exam notifications, and platform features.</p>
        </div>

        <div id="updates-container">
            <div class="loader">Authenticating...</div>
        </div>

    </main>

    <script>
        // 1. Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth(); // We need auth now!

        lucide.createIcons();

        // 2. Wait for user to be logged in before fetching updates
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('updates-container').innerHTML = '<div class="loader">Loading updates...</div>';
                loadUpdates();
            } else {
                // If not logged in, send them back to login page
                window.location.href = 'login.html'; 
            }
        });

        // 3. Fetch and Render Updates from Firebase
        function loadUpdates() {
            db.ref('updates').orderByChild('timestamp').on('value', snap => {
                const container = document.getElementById('updates-container');
                container.innerHTML = '';
                
                if (!snap.exists()) {
                    container.innerHTML = '<div class="loader">No recent updates available.</div>';
                    return;
                }

                const updates = [];
                snap.forEach(child => { updates.push({ key: child.key, ...child.val() }); });
                
                // Sort newest first
                updates.sort((a, b) => b.timestamp - a.timestamp);

                updates.forEach(data => {
                    const d = new Date(data.timestamp);
                    const timeString = d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' at ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Conditionally render image section if URL exists
                    let imageSection = '';
                    if (data.image && data.image.trim() !== "") {
                        imageSection = `
                            <div class="image-container">
                                <img src="${data.image}" alt="Update Image" class="update-image" id="img-${data.key}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                <div class="image-placeholder" style="display: none; flex-direction: column; align-items: center;">
                                    <i data-lucide="image-off" size="32" style="margin-bottom: 10px; opacity: 0.5;"></i>
                                    <div>Image currently unavailable.</div>
                                </div>
                            </div>
                            <div class="action-row">
                                <button class="btn-action" onclick="shareUpdate('${data.title.replace(/'/g, "\\'")}')">
                                    <i data-lucide="share-2" size="16"></i> Share
                                </button>
                                <button class="btn-action btn-primary-action" onclick="downloadImage('img-${data.key}')">
                                    <i data-lucide="download" size="16"></i> Save Image
                                </button>
                            </div>
                        `;
                    } else {
                        // If no image, just add the share button
                        imageSection = `
                            <div class="action-row">
                                <button class="btn-action" onclick="shareUpdate('${data.title.replace(/'/g, "\\'")}')">
                                    <i data-lucide="share-2" size="16"></i> Share
                                </button>
                            </div>
                        `;
                    }

                    // Replace \n with <br> for proper paragraph spacing from the textarea
                    const formattedContent = data.content.replace(/\n/g, '<br>');

                    const cardHTML = `
                        <div class="update-card">
                            <div class="update-header">
                                <div class="author-info">
                                    <div class="author-avatar"><i data-lucide="zap" size="20"></i></div>
                                    <div>
                                        <h4 class="author-name">${data.author || 'AgriQ Admin'}</h4>
                                        <p class="post-time">${timeString}</p>
                                    </div>
                                </div>
                                <div class="tag"><i data-lucide="bell-ring" size="12"></i> ${data.tag || 'Update'}</div>
                            </div>

                            <h3 class="update-title">${data.title}</h3>
                            <p class="update-text">${formattedContent}</p>

                            ${imageSection}
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
                
                lucide.createIcons(); // re-render icons for new elements
            }, (error) => {
                console.error("Firebase Read Error:", error);
                document.getElementById('updates-container').innerHTML = '<div class="loader">Error loading updates.</div>';
            });
        }

        // Utility Functions
        function shareUpdate(title) {
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: `Check out this update on AgriQ Pro: ${title}`,
                    url: window.location.href
                }).catch(console.error);
            } else {
                showToast("Link copied to clipboard! Share it with friends.");
            }
        }

        function downloadImage(imgId) {
            const imgElement = document.getElementById(imgId);
            if (!imgElement) return;
            
            const imgSrc = imgElement.src;

            // Create a temporary link to trigger download
            const link = document.createElement('a');
            link.href = imgSrc;
            link.download = 'AgriQ_Update.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast("Downloading image...");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; 
            t.style.display = 'block';
            setTimeout(() => {
                t.style.animation = 'none';
                t.style.opacity = '0';
                setTimeout(() => {
                    t.style.display = 'none';
                    t.style.opacity = '1';
                    t.style.animation = 'slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
