<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Mission Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            /* Sky Blue & White Glass Palette */
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.2);
            --bg: #f0f9ff;
            --surface: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.4);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* --- Animations --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- Custom Alert Popup --- */
        #custom-overlay {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .alert-modal {
            background: rgba(255, 255, 255, 0.9); border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 350px; padding: 30px; text-align: center;
            box-shadow: var(--card-shadow); transform: scale(0.9); opacity: 0;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .alert-modal.active { transform: scale(1); opacity: 1; border-color: var(--primary); }
        .alert-btn { flex: 1; padding: 16px; border-radius: 18px; font-weight: 800; cursor: pointer; border: none; }
        .btn-sec { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-main { background: var(--primary); color: #fff; }

        /* --- Loader --- */
        #analysis-loader {
            position: fixed; inset: 0; background: #e0f2fe; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.6s ease; 
        }
        #analysis-loader.fade-out { opacity: 0; visibility: hidden; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0,0,0,0.05); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-weight: 900; font-size: 20px; letter-spacing: -1px; color: #0f172a; text-transform: uppercase; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }

        main { padding: 24px; max-width: 500px; margin: 0 auto; }

        .quote-box {
            background: rgba(255, 255, 255, 0.5); border: 1px solid var(--border);
            padding: 25px; border-radius: 28px; margin-bottom: 30px;
            text-align: center; position: relative; overflow: hidden;
            animation: slideUp 0.6s ease;
            box-shadow: var(--card-shadow);
        }
        .quote-text { font-style: italic; font-size: 14px; line-height: 1.6; font-weight: 600; color: var(--text-dim); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-item { 
            background: var(--surface); backdrop-filter: blur(10px); padding: 22px; border-radius: 24px; 
            text-align: center; border: 1px solid var(--border);
            transition: 0.3s;
            box-shadow: var(--card-shadow);
        }
        .stat-val { font-family: 'JetBrains Mono'; font-size: 28px; font-weight: 800; color: #1e293b; display: block; }
        .stat-lbl { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
        
        .stat-item.highlight { border-color: var(--primary); background: #fff; }
        .stat-item.highlight .stat-val { color: var(--primary); }

        .analysis-card {
            background: var(--surface); backdrop-filter: blur(16px); border-radius: 24px; padding: 24px;
            margin-bottom: 15px; border: 1px solid var(--border);
            position: relative; animation: slideUp 0.5s ease backwards;
            box-shadow: var(--card-shadow);
        }
        
        .status-tag { 
            position: absolute; top: 24px; right: 24px; font-size: 9px; 
            font-weight: 900; padding: 4px 10px; border-radius: 50px; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tag-correct { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .tag-wrong { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .q-text { font-weight: 700; font-size: 16px; margin-bottom: 18px; line-height: 1.6; padding-right: 80px; color: #1e293b; }
        .ans-row { display: flex; align-items: flex-start; gap: 12px; font-size: 14px; font-weight: 600; margin-top: 10px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.4); }
        
        .btn-primary { 
            width: 100%; padding: 20px; border-radius: 24px; border: none;
            background: #0f172a; color: #fff; font-weight: 900;
            font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 15px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-secondary {
            width: 100%; padding: 20px; border-radius: 24px; border: 1.5px solid var(--border);
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); color: #1e293b; font-weight: 800;
            font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 12px; transition: 0.3s;
        }
        .btn-secondary:hover { background: #fff; }

        footer { padding: 40px 24px; text-align: center; color: var(--text-dim); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="custom-overlay">
        <div class="alert-modal" id="alert-modal">
            <h2 id="alert-title" style="margin:0 0 10px; font-size: 20px; color: #1e293b;">Navigation</h2>
            <p id="alert-msg" style="color: var(--text-dim); font-size: 14px; margin-bottom: 25px;">Message goes here...</p>
            <div class="alert-actions" style="display: flex; gap: 12px;">
                <button class="alert-btn btn-sec" id="alert-cancel">CANCEL</button>
                <button class="alert-btn btn-main" id="alert-ok">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="analysis-loader">
        <div class="spinner"></div>
        <p style="font-weight: 800; color: var(--primary); margin-top: 20px; font-size: 10px; letter-spacing: 5px;">GENERATING ANALYTICS</p>
    </div>

    <header>
        <div class="brand">AGRI<span>Q</span> REPORT</div>
        <div id="user-display" style="font-size: 10px; font-weight: 900; color: var(--primary); background: #fff; padding: 5px 12px; border-radius: 50px; border: 1px solid var(--border); box-shadow: 0 4px 8px rgba(0,0,0,0.05);">...</div>
    </header>

    <main>
        <div class="quote-box">
            <p class="quote-text" id="inspire-quote">"Loading agricultural wisdom..."</p>
        </div>

        <div class="stat-grid">
            <div class="stat-item highlight">
                <span class="stat-val" id="stat-accuracy">0%</span>
                <span class="stat-lbl">Accuracy 🎯</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="stat-score">0/0</span>
                <span class="stat-lbl">Points 📊</span>
            </div>
        </div>

        <h3 style="font-weight: 900; margin-bottom: 20px; color: #1e293b; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="list-checks" size="16" color="#0ea5e9"></i> Detailed Review
        </h3>
        
        <div id="review-list"></div>

        <button class="btn-primary" onclick="handleNavigation('coolleaderboard.html', 'RANKINGS')">
            VIEW GLOBAL LEADERBOARD <i data-lucide="arrow-right" size="18"></i>
        </button>

        <button class="btn-secondary" onclick="handleNavigation('index.html', 'NEW MISSION')">
            <i data-lucide="refresh-cw" size="18"></i> RETRY OR CHANGE SUBJECT
        </button>
    </main>

    <footer>&copy; 2026 AGRIQ TERMINAL • VNC CORP</footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function agriPopup(title, msg, onConfirm, isConfirm = false) {
            const overlay = document.getElementById('custom-overlay');
            const modal = document.getElementById('alert-modal');
            const okBtn = document.getElementById('alert-ok');
            const cancelBtn = document.getElementById('alert-cancel');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            overlay.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            cancelBtn.style.display = isConfirm ? 'block' : 'none';
            okBtn.onclick = () => {
                modal.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 300);
                if(onConfirm) onConfirm();
            };
            cancelBtn.onclick = () => {
                modal.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 300);
            };
        }

        function handleNavigation(url, type) {
            agriPopup("TERMINATE REPORT", `Proceed to ${type}? Current analysis will be saved locally.`, () => {
                window.location.href = url;
            }, true);
        }

        const quotes = [
            "Agriculture is the most healthful, most useful and most noble employment of man.",
            "The goal of farming is not the growing of crops, but the cultivation of human beings.",
            "Seeds of knowledge grow into harvests of success.",
            "Precision in study leads to precision in the field."
        ];

        window.onload = async () => {
            const results = JSON.parse(localStorage.getItem('agriq_last_result')) || null;
            const userName = localStorage.getItem('agriq_user') || "Aspirant";
            const myUID = localStorage.getItem('agriq_uid');

            document.getElementById('user-display').innerText = userName.toUpperCase();
            document.getElementById('inspire-quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

            if (!results) {
                document.getElementById('review-list').innerHTML = "<div class='analysis-card' style='text-align:center'>No mission data found.</div>";
                document.getElementById('analysis-loader').classList.add('fade-out');
                return;
            }

            try {
                await database.ref('leaderboard').push({
                    uid: myUID,
                    name: userName,
                    score: results.accuracy, 
                    raw: results.score,
                    total: results.total,
                    timestamp: Date.now()
                });
            } catch(e) { console.error("Sync Error", e); }

            document.getElementById('stat-accuracy').innerText = results.accuracy + "%";
            document.getElementById('stat-score').innerText = results.score + "/" + results.total;

            const list = document.getElementById('review-list');
            results.details.forEach((item, i) => {
                const isCorrect = item.userAns === item.correctAns;
                const card = document.createElement('div');
                card.className = 'analysis-card';
                card.style.animationDelay = (i * 0.1) + 's';
                card.innerHTML = `
                    <span class="status-tag ${isCorrect ? 'tag-correct' : 'tag-wrong'}">
                        ${isCorrect ? '✓ REACHED' : '✗ FAILED'}
                    </span>
                    <div class="q-text"><span style="color:var(--primary); font-family:'JetBrains Mono'; margin-right:8px;">#${i + 1}</span>${item.question}</div>
                    
                    <div class="ans-row" style="border-left: 3px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'}">
                        <div style="flex:1">
                            <small style="display:block; font-size:9px; color:var(--text-dim); margin-bottom:4px;">YOUR RESPONSE</small>
                            <span style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'}">${item.userAns ? item.userAns : 'NO RESPONSE'}</span>
                        </div>
                    </div>

                    ${!isCorrect ? `
                    <div class="ans-row" style="border-left: 3px solid var(--success); margin-top:8px; background: rgba(16, 185, 129, 0.05);">
                        <div style="flex:1">
                            <small style="display:block; font-size:9px; color:var(--text-dim); margin-bottom:4px;">CORRECT PROTOCOL</small>
                            <span style="color:var(--success)">${item.correctAns}</span>
                        </div>
                    </div>` : ''}
                `;
                list.appendChild(card);
            });

            lucide.createIcons();

            setTimeout(() => {
                document.getElementById('analysis-loader').classList.add('fade-out');
            }, 1000);
        };
    </script>
</body>
</html>
