<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Leaderboard Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff;
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #002d4d;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent);
            margin: 0; color: var(--text-main); min-height: 100vh;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }

        .brand { font-weight: 900; font-size: 16px; }
        .brand span { color: var(--primary); }

        main { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; padding-bottom: 120px; }

        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 100%; padding: 14px 20px; border-radius: 18px; border: 1.5px solid var(--border);
            background: #fff; outline: none; font-weight: 600; font-size: 14px;
        }

        .lead-card {
            background: #fff; border-radius: 24px; padding: 16px 20px; border: 1.5px solid var(--border);
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }

        .user-info { display: flex; flex-direction: column; gap: 2px; }
        .user-name { font-weight: 800; font-size: 14px; color: var(--text-main); }
        .user-meta { font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .score-display {
            font-family: 'JetBrains Mono'; font-weight: 800; font-size: 14px;
            color: var(--primary); background: var(--bg); padding: 6px 12px; border-radius: 10px;
        }

        .actions { display: flex; gap: 8px; }
        .btn-icon {
            width: 38px; height: 38px; border-radius: 12px; border: 1.5px solid var(--border);
            background: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-edit { color: var(--primary); }
        .btn-delete { color: var(--danger); }

        .bottom-nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border);
            height: 75px; border-radius: 35px; display: flex; align-items: center;
            width: 92%; max-width: 450px; justify-content: space-around; z-index: 1000;
        }
        .nav-item { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 800; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <div class="brand">AgriQ<span>Analytics</span></div>
        <div id="record-count" style="font-size: 9px; font-weight: 800; background: var(--primary); color: #fff; padding: 4px 10px; border-radius: 20px;">0 RECORDS</div>
    </header>

    <main>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search student or module..." oninput="filterResults()">
        </div>
        <div id="leaderboard-container">
            <div class="empty-state">Syncing with database...</div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.href='admin.html'"><i data-lucide="terminal" size="22"></i>CONSOLE</button>
        <button class="nav-item active"><i data-lucide="bar-chart-3" size="22"></i>ANALYTICS</button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allRecords = [];
        let studentMap = {};

        firebase.auth().onAuthStateChanged(user => {
            if (user && user.email === 'vishalchalse007@gmail.com') {
                loadInitialData();
            } else {
                window.location.href = "index.html"; 
            }
        });

        async function loadInitialData() {
            // 1. Load Student Names into memory first
            const studentsSnap = await db.ref('students').once('value');
            studentMap = studentsSnap.val() || {};

            // 2. Listen to Leaderboard
            db.ref('leaderboard').on('value', (snap) => {
                allRecords = [];
                if (snap.exists()) {
                    snap.forEach(child => {
                        const data = child.val();
                        const sData = studentMap[data.uid] || { name: "Unknown Student" };
                        allRecords.push({
                            id: child.key,
                            ...data,
                            studentName: sData.name
                        });
                    });
                    allRecords.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                }
                document.getElementById('record-count').innerText = `${allRecords.length} RECORDS`;
                renderUI(allRecords);
            });
        }

        function renderUI(data) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `<div class="empty-state">No records found.</div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "lead-card";
                card.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">${item.studentName.toUpperCase()}</span>
                        <span class="user-meta">${item.module ? item.module.replace(/_/g, ' ') : 'N/A'}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="score-display">${item.score}/${item.total}</div>
                        <div class="actions">
                            <button class="btn-icon btn-edit" onclick="editScore('${item.id}', ${item.score}, ${item.total})">
                                <i data-lucide="edit-3" size="16"></i>
                            </button>
                            <button class="btn-icon btn-delete" onclick="deleteRecord('${item.id}')">
                                <i data-lucide="trash-2" size="16"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function filterResults() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allRecords.filter(r => 
                r.studentName.toLowerCase().includes(term) || 
                (r.module && r.module.toLowerCase().includes(term))
            );
            renderUI(filtered);
        }

        function editScore(id, currentScore, total) {
            const newScore = prompt(`Update score (Max: ${total}):`, currentScore);
            if (newScore !== null && !isNaN(newScore)) {
                const val = parseInt(newScore);
                if (val >= 0 && val <= total) {
                    db.ref(`leaderboard/${id}`).update({ 
                        score: val,
                        accuracy: Math.round((val / total) * 100)
                    });
                }
            }
        }

        function deleteRecord(id) {
            if (confirm("Delete this result forever?")) {
                db.ref(`leaderboard/${id}`).remove();
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
