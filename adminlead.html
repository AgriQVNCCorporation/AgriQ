<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Admin Leaderboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #8b5cf6; 
            --primary-dark: #6d28d9;
            --primary-light: #ede9fe;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --bot-color: #10b981;
            --bot-light: #d1fae5;
            --bg: #faf5ff; 
            --surface: rgba(255, 255, 255, 0.9);
            --text-main: #1e1b4b; 
            --text-dim: #6b7280; 
            --border: rgba(139, 92, 246, 0.2);
            --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); margin: 0; color: var(--text-main); 
            padding-top: env(safe-area-inset-top); min-height: 100vh;
        }

        /* HEADER */
        header { 
            padding: 16px 24px; background: rgba(250, 245, 255, 0.85); 
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .brand { font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .back-btn { background: white; padding: 10px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }

        main { padding: 24px 20px; max-width: 800px; margin: 0 auto; }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 5px; }
        .tab {
            padding: 12px 20px; background: white; border: 1px solid var(--border);
            border-radius: 14px; font-weight: 800; font-size: 13px; color: var(--text-dim);
            cursor: pointer; transition: var(--transition); white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.25); }
        .tab.bot-tab { border-color: var(--bot-color); color: var(--bot-color); }
        .tab.bot-tab.active { background: var(--bot-color); color: white; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25); }

        /* DATA TABLE */
        .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow-x: auto; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--primary-light); color: var(--primary-dark); font-weight: 800; font-size: 12px; text-transform: uppercase; padding: 16px; text-align: left; letter-spacing: 0.5px; }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: var(--bg); }

        .uid-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); background: var(--bg); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; }
        .score-tag { font-family: 'JetBrains Mono'; font-size: 14px; color: var(--primary-dark); font-weight: 800; }
        .module-tag { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px; background: #e0e7ff; color: #3730a3; display: inline-block; }
        
        .bot-badge { background: var(--bot-light); color: var(--bot-color); font-size: 9px; padding: 3px 6px; border-radius: 6px; font-weight: 900; letter-spacing: 0.5px; margin-left: 6px; vertical-align: middle; }

        .actions { display: flex; gap: 8px; }
        .btn-icon { width: 36px; height: 36px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .btn-edit { background: var(--primary-light); color: var(--primary-dark); }
        .btn-edit:hover { background: var(--primary); color: white; }
        .btn-delete { background: var(--danger-light); color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* BOT CREATION PANEL */
        .bot-panel { background: white; border-radius: 20px; border: 1px solid var(--bot-color); padding: 24px; display: none; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1); }
        .bot-panel h2 { margin: 0 0 5px 0; color: var(--bot-color); font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .bot-panel p { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; font-weight: 600; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid var(--border); font-size: 15px; font-weight: 700; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--bot-color); box-shadow: 0 0 0 4px var(--bot-light); }
        
        .btn-deploy { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--bot-color); color: white; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-deploy:active { transform: scale(0.98); }

        /* MODAL */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(30, 27, 75, 0.6); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal { background: white; padding: 30px; border-radius: 28px; width: 100%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: scaleIn 0.3s ease; }
        .modal h3 { margin: 0 0 10px 0; font-weight: 900; }
        .modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; font-weight: 600; }
        .modal input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid var(--border); font-size: 16px; font-weight: 800; font-family: 'JetBrains Mono'; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .modal input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
        .modal-actions { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background: var(--bg); color: var(--text-dim); }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-confirm.danger { background: var(--danger); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: white; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 700; display: none; z-index: 10001; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .loader { text-align: center; padding: 40px; color: var(--primary); display: flex; flex-direction: column; align-items: center; gap: 10px; font-weight: 800; font-size: 12px; }
        .loader i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast">Operation successful</div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title">Edit Record</h3>
            <p id="m-desc">Update the XP or Score for this user.</p>
            <input type="number" id="m-input" placeholder="Enter new score">
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-modal btn-confirm" id="m-confirm">Save Changes</button>
            </div>
        </div>
    </div>

    <header>
        <div class="brand">
            <div class="back-btn" onclick="window.history.back()">
                <i data-lucide="chevron-left" size="20"></i>
            </div>
            <i data-lucide="shield-alert" size="22" color="var(--primary)"></i> Rank Manager
        </div>
    </header>

    <main>
        <div class="tabs">
            <div class="tab active" id="tab-coak" onclick="switchTab('coak')"><i data-lucide="swords" size="14"></i> COAK Monks</div>
            <div class="tab" id="tab-global" onclick="switchTab('global')"><i data-lucide="globe" size="14"></i> Global Logs</div>
            <div class="tab" id="tab-daily" onclick="switchTab('daily')"><i data-lucide="zap" size="14"></i> Daily Logs</div>
            <div class="tab bot-tab" id="tab-bots" onclick="switchTab('bots')"><i data-lucide="bot" size="14"></i> Deploy Bots</div>
        </div>

        <div class="table-container" id="table-view">
            <div id="loader" class="loader"><i data-lucide="loader-2" size="32"></i> SYNCING DATA...</div>
            <table id="data-table" style="display: none;">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="bot-panel" id="bot-view">
            <h2><i data-lucide="bot" size="24"></i> Bot Deployment Engine</h2>
            <p>Create artificial users to drive leaderboard competition. Bots will appear in the Global Logs.</p>
            
            <div class="input-group">
                <label>Bot Display Name</label>
                <input type="text" id="bot-name" placeholder="e.g. AgriMaster99, TopTopper, etc.">
            </div>
            
            <div class="input-group">
                <label>Initial Score (XP)</label>
                <input type="number" id="bot-score" placeholder="e.g. 4500">
            </div>

            <button class="btn-deploy" onclick="deployBot()">
                <i data-lucide="rocket" size="18"></i> Inject Bot to Leaderboard
            </button>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        lucide.createIcons();

        let currentTab = 'coak';
        let usersMap = {}; 
        let leaderboardData = [];
        let studentsData = [];

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = 'login.html';
            else initData();
        });

        function initData() {
            // Fetch Students
            db.ref('students').on('value', snap => {
                usersMap = {};
                studentsData = [];
                snap.forEach(child => {
                    const data = child.val();
                    usersMap[child.key] = data.name || 'Unknown';
                    if(data.coakXP !== undefined) {
                        studentsData.push({ uid: child.key, name: data.name, xp: data.coakXP });
                    }
                });
                studentsData.sort((a, b) => b.xp - a.xp);
                if(currentTab === 'coak') renderTable();
            });

            // Fetch Leaderboard
            db.ref('leaderboard').on('value', snap => {
                leaderboardData = [];
                snap.forEach(child => {
                    const d = child.val();
                    leaderboardData.push({
                        key: child.key,
                        uid: d.uid,
                        score: d.score || 0,
                        module: d.module || 'UNKNOWN',
                        date: d.timestamp || d.date || Date.now(),
                        isBot: d.isBot || false,
                        botName: d.botName || ''
                    });
                });
                leaderboardData.sort((a, b) => b.date - a.date); 
                if(currentTab === 'global' || currentTab === 'daily') renderTable();
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            
            // UI Updates
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');

            if (tabId === 'bots') {
                document.getElementById('table-view').style.display = 'none';
                document.getElementById('bot-view').style.display = 'block';
            } else {
                document.getElementById('bot-view').style.display = 'none';
                document.getElementById('table-view').style.display = 'block';
                renderTable();
            }
        }

        function renderTable() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('data-table').style.display = 'table';
            
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (currentTab === 'coak') {
                thead.innerHTML = `<tr><th>User Details</th><th>Total COAK XP</th><th>Actions</th></tr>`;
                
                studentsData.forEach(s => {
                    if(s.xp <= 0) return;
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <div style="font-weight: 800; color: var(--text-main); margin-bottom: 4px;">${s.name || 'Unknown'}</div>
                                <div class="uid-tag">${s.uid}</div>
                            </td>
                            <td><span class="score-tag">${s.xp} XP</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn-icon btn-edit" onclick="openEditModal('coak', '${s.uid}', ${s.xp}, '${s.name}')" title="Edit XP">
                                        <i data-lucide="pencil" size="16"></i>
                                    </button>
                                    <button class="btn-icon btn-delete" onclick="openDeleteModal('coak', '${s.uid}', '${s.name}')" title="Reset XP">
                                        <i data-lucide="trash-2" size="16"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } else {
                thead.innerHTML = `<tr><th>User & Module</th><th>Score Record</th><th>Actions</th></tr>`;
                const isDaily = currentTab === 'daily';
                
                const filtered = leaderboardData.filter(d => 
                    isDaily ? d.module === 'DAILY_DRILL' : d.module !== 'DAILY_DRILL'
                );

                filtered.forEach(d => {
                    // Logic to handle bot names vs real user names
                    let userName = d.isBot ? d.botName : (usersMap[d.uid] || 'Unknown User');
                    let botBadge = d.isBot ? `<span class="bot-badge">BOT</span>` : '';
                    let uidDisplay = d.isBot ? 'SYSTEM_GENERATED' : `${d.key.substring(1, 8)}...`;

                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <div style="font-weight: 800; color: var(--text-main); margin-bottom: 4px;">
                                    ${userName} ${botBadge}
                                </div>
                                <div class="module-tag">${d.module.replace(/_/g, ' ')}</div>
                                <div class="uid-tag">${uidDisplay}</div>
                            </td>
                            <td><span class="score-tag">${d.score} XP</span></td>
                            <td>
                                <div class="actions">
                                    <button class="btn-icon btn-edit" onclick="openEditModal('leaderboard', '${d.key}', ${d.score}, '${userName}')">
                                        <i data-lucide="pencil" size="16"></i>
                                    </button>
                                    <button class="btn-icon btn-delete" onclick="openDeleteModal('leaderboard', '${d.key}', '${userName}')">
                                        <i data-lucide="trash-2" size="16"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
            lucide.createIcons();
        }

        // --- BOT DEPLOYMENT LOGIC ---
        function deployBot() {
            const name = document.getElementById('bot-name').value.trim();
            const score = parseInt(document.getElementById('bot-score').value);

            if (!name) return showToast("Please enter a bot name.");
            if (isNaN(score) || score < 0) return showToast("Please enter a valid score.");

            // Create a fake unique ID for the bot
            const botUid = "bot_" + Math.random().toString(36).substr(2, 9);

            // Push directly to leaderboard
            db.ref('leaderboard').push({
                uid: botUid,
                score: score,
                accuracy: Math.floor(Math.random() * (100 - 85 + 1) + 85), // Random acc between 85-100%
                module: "GLOBAL_RANKING",
                timestamp: Date.now(),
                isBot: true,
                botName: name
            }).then(() => {
                showToast(`Bot '${name}' deployed with ${score} XP!`);
                document.getElementById('bot-name').value = '';
                document.getElementById('bot-score').value = '';
                switchTab('global'); // Auto-switch to see the bot
            }).catch(err => {
                showToast("Error deploying bot: " + err.message);
            });
        }

        // --- MODAL LOGIC ---
        let actionType = '';
        let targetId = '';

        function openEditModal(type, id, currentVal, name) {
            actionType = type;
            targetId = id;
            
            document.getElementById('m-title').innerText = "Edit Score";
            document.getElementById('m-desc').innerHTML = `Modifying record for <b>${name}</b>`;
            
            const input = document.getElementById('m-input');
            input.style.display = 'block';
            input.value = currentVal;
            
            const btn = document.getElementById('m-confirm');
            btn.innerText = "Save Changes";
            btn.className = "btn-modal btn-confirm";
            btn.onclick = executeEdit;
            
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function openDeleteModal(type, id, name) {
            actionType = type;
            targetId = id;
            
            document.getElementById('m-title').innerText = type === 'coak' ? "Reset XP" : "Delete Record";
            document.getElementById('m-desc').innerHTML = type === 'coak' 
                ? `Are you sure you want to reset <b>${name}'s</b> COAK XP to 0?`
                : `Are you sure you want to delete this record for <b>${name}</b>?`;
            
            document.getElementById('m-input').style.display = 'none';
            
            const btn = document.getElementById('m-confirm');
            btn.innerText = "Confirm Delete";
            btn.className = "btn-modal btn-confirm danger";
            btn.onclick = executeDelete;
            
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function executeEdit() {
            const newVal = parseInt(document.getElementById('m-input').value) || 0;
            
            if (actionType === 'coak') {
                db.ref(`students/${targetId}`).update({ coakXP: newVal })
                  .then(() => showToast("COAK XP Updated Successfully"));
            } else if (actionType === 'leaderboard') {
                db.ref(`leaderboard/${targetId}`).update({ score: newVal })
                  .then(() => showToast("Record Updated Successfully"));
            }
            closeModal();
        }

        function executeDelete() {
            if (actionType === 'coak') {
                db.ref(`students/${targetId}`).update({ coakXP: 0 })
                  .then(() => showToast("User XP Reset to 0"));
            } else if (actionType === 'leaderboard') {
                db.ref(`leaderboard/${targetId}`).remove()
                  .then(() => showToast("Record Deleted"));
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
