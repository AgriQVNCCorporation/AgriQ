<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Admin Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --primary: #ff3b3b; 
            --boot-accent: #00aaff;
            --bg: #000; 
            --surface: #0a0a0a; 
            --card-bg: #111; 
            --text-main: #fff; 
            --text-dim: #a1a1aa; 
            --border: #222; 
            --success: #00ff88; 
            --gold: #ffda44; 
            --silver: #e2e2e2; 
            --bronze: #cd7f32; 
            --transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* FOCUSED MODE OVERRIDES */
        body.focus-active { 
            --primary: #00d2ff; 
            --bg: #f0f9ff;
            --surface: #ffffff;
            --card-bg: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); min-height: 100vh; padding-bottom: 100px; transition: background 0.5s, color 0.5s; }

        /* --- ELECTRIC PRELOADER --- */
        #admin-loader {
            position: fixed; inset: 0; background: #000000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #admin-loader.fade-out { opacity: 0; visibility: hidden; }
        .electric-icon { color: var(--boot-accent); animation: electricPulse 1.5s infinite ease-in-out; margin-bottom: 25px; }
        @keyframes electricPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--boot-accent)); opacity: 0.8; }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 25px var(--boot-accent)) brightness(1.5); opacity: 1; }
        }
        .loading-bar-container { width: 140px; height: 2px; background: #111; border-radius: 10px; overflow: hidden; position: relative; }
        .loading-bar-fill { position: absolute; width: 45%; height: 100%; background: var(--boot-accent); box-shadow: 0 0 15px var(--boot-accent); animation: scan 1.5s infinite ease-in-out; }
        @keyframes scan { 0% { left: -45%; } 100% { left: 100%; } }

        /* Custom Alert Modal */
        #admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10001; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--card-bg); border: 1px solid var(--border); width: 100%; max-width: 350px; border-radius: 28px; padding: 30px; text-align: center; }
        #admin-modal.active { display: flex; }

        header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid var(--border); }
        .brand { font-weight: 900; font-size: 16px; }
        .brand span { color: var(--primary); }

        main { max-width: 600px; margin: 0 auto; padding: 20px; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 25px; background: var(--surface); padding: 5px; border-radius: 16px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: none; color: var(--text-dim); font-weight: 800; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin: 20px 0 30px; }
        .podium-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 5px; text-align: center; flex: 1; transition: background 0.5s; }
        .podium-1 { height: 140px; border-color: var(--gold); }
        .podium-2 { height: 115px; border-color: var(--silver); }
        .podium-3 { height: 100px; border-color: var(--bronze); }
        .p-name { font-weight: 800; font-size: 10px; color: var(--text-main); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-score { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 14px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 20px; transition: background 0.5s, border 0.5s; }
        h2 { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: rgba(120,120,120,0.03); border-radius: 18px; margin-bottom: 8px; border: 1px solid var(--border); }
        .u-name { font-weight: 800; font-size: 13px; text-transform: uppercase; }
        .u-meta { font-size: 9px; color: var(--text-dim); }

        .action-btns { display: flex; gap: 6px; }
        .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn.delete:hover { background: var(--primary); color: white; }
        
        .btn-wipe { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 12px; cursor: pointer; width: 100%; margin-top: 10px; }
        .view-pane { display: none; }
        .view-pane.active { display: block; }
        .timer-info { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--gold); text-align: center; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="admin-loader">
        <div class="electric-icon"><i data-lucide="zap" size="64" stroke-width="3" fill="currentColor"></i></div>
        <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
        <p style="font-size:10px; font-family:'JetBrains Mono'; color:var(--boot-accent); margin-top:15px; letter-spacing:3px;">LEADER_SYNC_ACTIVE</p>
    </div>

    <div id="admin-modal"><div class="modal-card"><h3 id="modal-title">Confirm</h3><p id="modal-msg"></p><div style="display:flex; gap:10px;"><button class="btn-wipe" id="modal-confirm">CONFIRM</button><button class="tab-btn" onclick="closeModal()">CANCEL</button></div></div></div>
    
    <header>
        <div class="brand">ADMIN<span>COMMAND</span></div>
        <button class="tab-btn" onclick="location.href='admin.html'" style="width:auto; padding:8px 15px; border:1px solid var(--border)">BACK</button>
    </header>

    <main id="leader-content" style="display: none;">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('leaderboard', this)">RANKINGS</button>
            <button class="tab-btn" onclick="switchTab('arena', this)">ARENA</button>
        </div>

        <section id="pane-leaderboard" class="view-pane active">
            <div class="podium" id="podium-leaderboard"></div>
            <div class="card">
                <h2><i data-lucide="trash-2"></i> Danger Zone</h2>
                <button class="btn-wipe" onclick="confirmWipe('leaderboard')">WIPE ALL RANKINGS</button>
                <div class="timer-info" id="wipe-timer-l">AUTO-RESET: SYNCING...</div>
            </div>
            <div class="card">
                <h2><i data-lucide="award"></i> Database Records</h2>
                <div id="list-leaderboard"></div>
            </div>
        </section>

        <section id="pane-arena" class="view-pane">
            <div class="podium" id="podium-arena"></div>
            <div class="card">
                <h2><i data-lucide="zap"></i> Battle Control</h2>
                <button class="btn-wipe" onclick="confirmWipe('arena')">CLEAR ARENA</button>
            </div>
            <div class="card">
                <h2><i data-lucide="swords"></i> Current Contenders</h2>
                <div id="list-arena"></div>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let userRegistry = {};

        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('admin-loader');
            if (user && user.email === 'vishalchalse007@gmail.com') {
                document.getElementById('leader-content').style.display = 'block';
                
                // Fetch Focus Mode from Admin's Account
                db.ref(`students/${user.uid}`).on('value', snap => {
                    const userData = snap.val() || {};
                    const isFocus = userData.focusedMode !== false;
                    applyTheme(isFocus);
                });

                // Fetch student names for mapping
                db.ref('students').on('value', snap => {
                    userRegistry = snap.val() || {};
                    initSync();
                });
                
                startAutoWipeCheck();
            } else {
                window.location.href = "index.html"; 
            }
            setTimeout(() => loader.classList.add('fade-out'), 2000);
            lucide.createIcons();
        });

        function applyTheme(isActive) {
            if(isActive) document.body.classList.add('focus-active');
            else document.body.classList.remove('focus-active');
            lucide.createIcons();
        }

        function initSync() {
            // Live Rankings Sync
            db.ref('leaderboard').on('value', snap => {
                const data = [];
                snap.forEach(c => {
                    const entry = c.val();
                    const realName = (userRegistry[entry.uid]?.name) || entry.name || "Unknown User";
                    data.push({id: c.key, ...entry, displayName: realName});
                });
                renderUI(data.sort((a,b) => b.score - a.score), 'leaderboard');
            });

            // Live Arena Sync
            db.ref('arena').on('value', snap => {
                const data = [];
                snap.forEach(c => {
                    const entry = c.val();
                    const realName = (userRegistry[entry.uid]?.name) || entry.name || "Unknown User";
                    data.push({id: c.key, ...entry, displayName: realName});
                });
                renderUI(data.sort((a,b) => b.score - a.score), 'arena');
            });
        }

        function renderUI(data, type) {
            const podium = document.getElementById(`podium-${type}`);
            podium.innerHTML = `
                <div class="podium-item podium-2">🥈 <span class="p-name">${data[1]?.displayName || '---'}</span><span class="p-score" style="color:var(--silver)">${data[1]?.score || 0}</span></div>
                <div class="podium-item podium-1">🥇 <span class="p-name">${data[0]?.displayName || '---'}</span><span class="p-score" style="color:var(--gold)">${data[0]?.score || 0}</span></div>
                <div class="podium-item podium-3">🥉 <span class="p-name">${data[2]?.displayName || '---'}</span><span class="p-score" style="color:var(--bronze)">${data[2]?.score || 0}</span></div>
            `;

            const list = document.getElementById(`list-${type}`);
            list.innerHTML = "";
            data.forEach(u => {
                const div = document.createElement('div');
                div.className = "data-row";
                div.innerHTML = `
                    <div class="user-details">
                        <div class="u-name">${u.displayName}</div>
                        <div class="u-meta">${u.score} PTS • ${u.module || 'EXAM'}</div>
                    </div>
                    <div class="action-btns">
                        <button class="icon-btn" onclick="editScore('${type}', '${u.id}', ${u.score})"><i data-lucide="edit-3" size="14"></i></button>
                        <button class="icon-btn delete" onclick="deleteEntry('${type}', '${u.id}')"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function switchTab(t, b) { 
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('pane-'+t).classList.add('active'); b.classList.add('active');
            lucide.createIcons();
        }

        function editScore(path, id, current) {
            const val = prompt("Enter new score:", current);
            if (val !== null) db.ref(`${path}/${id}`).update({ score: parseInt(val) });
        }

        function deleteEntry(path, id) {
            showModal("Delete?", "Remove this entry?", () => db.ref(`${path}/${id}`).remove());
        }

        function confirmWipe(path) {
            showModal("WIPE ALL?", `Clear ${path}?`, () => db.ref(path).remove());
        }

        function showModal(t, m, c) { 
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-msg').innerText = m;
            document.getElementById('modal-confirm').onclick = () => { c(); closeModal(); };
            document.getElementById('admin-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('admin-modal').classList.remove('active'); }

        function startAutoWipeCheck() {
            setInterval(() => {
                const now = new Date();
                if (now.getHours() === 23 && now.getMinutes() === 0) { db.ref('leaderboard').remove(); db.ref('arena').remove(); }
                const resetTime = new Date().setHours(23,0,0,0);
                const diff = resetTime - now;
                const h = Math.floor(diff/3600000); 
                const m = Math.floor((diff%3600000)/60000);
                document.getElementById('wipe-timer-l').innerText = `SYSTEM RESET IN: ${h > 0 ? h+'H ' : ''}${m}M`;
            }, 30000);
        }

        lucide.createIcons();
    </script>
</body>
</html>
