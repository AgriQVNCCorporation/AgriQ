<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login | AgriQ Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff;
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #002d4d;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent);
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .auth-card { 
            background: var(--surface); width: 100%; max-width: 400px; padding: 40px 30px; 
            border-radius: 32px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        .brand { font-weight: 900; font-size: 24px; letter-spacing: -1px; margin-bottom: 30px; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }

        /* Countdown Style */
        .timer-box { 
            background: #f8fafc; border: 1px solid var(--border); padding: 15px; 
            border-radius: 20px; margin-bottom: 30px; 
        }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .t-unit { background: white; padding: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .t-num { display: block; font-family: 'JetBrains Mono'; font-weight: 800; color: var(--primary); font-size: 18px; }
        .t-lbl { font-size: 8px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        
        input { 
            width: 100%; padding: 16px 16px 16px 52px; border-radius: 16px; border: 1.5px solid var(--border); 
            background: #fff; font-weight: 600; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 132, 255, 0.1); }

        .btn-primary { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--primary); color: #fff; 
            font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 132, 255, 0.2); transition: 0.2s; margin-top: 10px;
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-google {
            width: 100%; padding: 14px; border-radius: 16px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-weight: 700; cursor: pointer; background: #fff; margin-top: 15px; font-size: 14px;
        }

        #toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 13px; font-weight: 600; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="toast">Message here</div>

    <div class="auth-card">
        <div class="brand">AGRI<span>Q</span> PRO</div>

        <div class="timer-box">
            <span style="font-size: 10px; font-weight: 800; color: var(--text-dim);">MCAER PG CET 2026 COUNTDOWN</span>
            <div class="timer-grid">
                <div class="t-unit"><span id="d" class="t-num">00</span><span class="t-lbl">Days</span></div>
                <div class="t-unit"><span id="h" class="t-num">00</span><span class="t-lbl">Hrs</span></div>
                <div class="t-unit"><span id="m" class="t-num">00</span><span class="t-lbl">Min</span></div>
                <div class="t-unit" style="background:var(--primary)"><span id="s" class="t-num" style="color:white">00</span><span class="t-lbl" style="color:rgba(255,255,255,0.7)">Sec</span></div>
            </div>
        </div>

        <h2 id="auth-title" style="margin: 0 0 20px; font-weight: 800;">Welcome Back</h2>
        
        <form onsubmit="handleAuth(event)">
            <div class="input-group"><i data-lucide="mail"></i><input type="email" id="email" placeholder="Email Address" required></div>
            <div class="input-group"><i data-lucide="lock"></i><input type="password" id="password" placeholder="Password" required></div>
            <button type="submit" class="btn-primary" id="submit-btn">SIGN IN <i data-lucide="arrow-right"></i></button>
        </form>

        <button class="btn-google" onclick="googleLogin()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Continue with Google
        </button>

        <p style="margin-top: 25px; font-size: 13px; color: var(--text-dim);">
            <span id="toggle-text">Don't have an account?</span> 
            <a href="#" onclick="toggleMode()" id="toggle-link" style="color: var(--primary); font-weight: 800; text-decoration: none;">Register</a>
        </p>
    </div>

    <script>
        // --- Firebase Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let isLogin = true;

        lucide.createIcons();

        // --- Auth Logic ---
        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            try {
                if(isLogin) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
                window.location.href = 'index.html'; // Redirect to dashboard
            } catch (err) {
                showToast(err.message);
            }
        }

        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                window.location.href = 'index.html';
            } catch (err) {
                showToast(err.message);
            }
        }

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById('submit-btn').innerHTML = isLogin ? 'SIGN IN <i data-lucide="arrow-right"></i>' : 'REGISTER <i data-lucide="user-plus"></i>';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-link').innerText = isLogin ? "Register" : "Login";
            lucide.createIcons();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // --- Countdown Timer ---
        function startTimer() {
            const target = new Date("June 20, 2026 00:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                document.getElementById('d').innerText = Math.floor(diff / (86400000)).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }, 1000);
        }
        startTimer();

        // Redirect if already logged in
        auth.onAuthStateChanged(user => { if(user) window.location.href = 'index.html'; });
    </script>
</body>
</html>
