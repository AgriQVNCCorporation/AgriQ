<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Profile | AgriQ Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff; --bg: #f0f9ff; --surface: #ffffff;
            --text-main: #002d4d; --text-dim: #64748b; --border: #e2e8f0;
            
            /* Premium Gamification Colors */
            --color-gold: #fbbf24;     
            --color-diamond: #a855f7;  
            --color-legend: #ef4444;   
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); margin: 0; color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            overflow-x: hidden;
        }

        /* Header */
        header { 
            padding: 20px 24px; background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(15px); position: sticky; top: env(safe-area-inset-top); z-index: 100;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 900; font-size: 20px; letter-spacing: -1px; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* --- NEW GAMIFIED PROFILE PALLET --- */
        .profile-pallet {
            background: var(--surface); padding: 35px 20px 25px; border-radius: 32px;
            text-align: center; border: 1px solid var(--border); margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); position: relative;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s ease; overflow: hidden;
        }
        
        .admin-tag { 
            display: none; position: absolute; top: 15px; background: #8b5cf6; color: white;
            padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4); z-index: 10;
        }

        /* Avatar & Frame Engine */
        .frame-container {
            position: relative; width: 140px; height: 140px; 
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; transition: filter 0.5s;
        }
        
        .avatar-initial {
            width: 88px; height: 88px; background: linear-gradient(135deg, var(--primary), #00c6ff);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 36px; font-weight: 900; font-family: 'JetBrains Mono';
            z-index: 1; position: relative; box-shadow: inset 0 0 10px rgba(255,255,255,0.4);
            border: 2px solid var(--border); overflow: hidden;
        }
        
        .user-photo { width: 100%; height: 100%; object-fit: cover; display: none; }

        .upload-btn {
            position: absolute; bottom: -5px; right: 20px; background: white; border: 1px solid var(--border);
            border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; box-shadow: 0 5px 10px rgba(0,0,0,0.1); color: var(--primary);
        }

        /* SVG Frames Layering */
        .svg-frame { position: absolute; z-index: 2; pointer-events: none; opacity: 0; transition: all 0.5s ease; transform: scale(0.8); }
        .tier-gold .frame-g { opacity: 1; transform: scale(1.05); }
        .tier-diamond .frame-d { opacity: 1; transform: scale(1.1); }
        .tier-legend .frame-l { opacity: 1; transform: scale(1.35); } 

        .aura-layer {
            position: absolute; top: 10%; left: 10%; width: 80%; height: 80%;
            border-radius: 50%; z-index: 0; opacity: 0; filter: blur(25px);
            transition: all 0.5s ease;
        }

        /* User Info Box */
        .tier-badge { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; padding: 6px 14px; border-radius: 20px; margin-bottom: 8px; background: #f1f5f9; color: var(--text-dim); transition: all 0.5s; }
        .user-name { font-weight: 900; font-size: 22px; text-transform: uppercase; letter-spacing: -0.5px; margin: 0 0 5px 0; transition: color 0.5s; }
        .user-email { color: var(--text-dim); font-size: 13px; font-weight: 600; margin: 0 0 15px 0; }

        /* XP Progress Bar Embedded */
        .xp-container { width: 100%; background: #f8fafc; padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px;}
        .xp-text { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        .xp-text span.val { color: var(--text-main); font-family: 'JetBrains Mono'; font-size: 12px;}
        .progress-track { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; border-radius: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s; }

        /* --- ROADMAP MODULE (Visual Frames Only) --- */
        .roadmap-container { width: 100%; padding: 15px; background: #f8fafc; border-radius: 16px; border: 1px solid var(--border); }
        .roadmap-title { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: left; }
        .roadmap-flex { display: flex; justify-content: space-between; position: relative; padding: 5px 10px; }
        
        .road-node { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; filter: grayscale(1) opacity(0.3); }
        .road-node svg { width: 130%; height: 130%; position: absolute; pointer-events: none; }
        
        /* Node Activations */
        .tier-gold .node-g { filter: grayscale(0) opacity(1); filter: drop-shadow(0 0 10px rgba(251,191,36,0.5)); }
        
        .tier-diamond .node-g, .tier-legend .node-g { filter: grayscale(0) opacity(1); filter: drop-shadow(0 0 5px rgba(251,191,36,0.3)); }
        .tier-diamond .node-d { filter: grayscale(0) opacity(1); filter: drop-shadow(0 0 10px rgba(168,85,247,0.5)); }
        
        .tier-legend .node-d { filter: grayscale(0) opacity(1); filter: drop-shadow(0 0 5px rgba(168,85,247,0.3)); }
        .tier-legend .node-l { filter: grayscale(0) opacity(1); filter: drop-shadow(0 0 15px rgba(239,68,68,0.8)); transform: scale(1.1); }


        /* --- TIER SPECIFIC STYLES FOR LIGHT THEME --- */
        .tier-base .progress-fill { background: #94a3b8; }
        .tier-base .avatar-initial { background: linear-gradient(135deg, #64748b, #94a3b8); }

        /* Gold */
        .tier-gold .aura-layer { background: var(--color-gold); opacity: 0.25; }
        .tier-gold .tier-badge { color: #d97706; background: #fef3c7; }
        .tier-gold .progress-fill { background: linear-gradient(90deg, #d97706, #fde047); }
        .tier-gold .avatar-initial { border-color: #fbbf24; }
        .tier-gold.profile-pallet { border-color: rgba(251, 191, 36, 0.5); box-shadow: 0 10px 30px rgba(251, 191, 36, 0.1); }

        /* Diamond */
        .tier-diamond .aura-layer { background: var(--color-diamond); opacity: 0.2; }
        .tier-diamond .tier-badge { color: #d946ef; background: #fae8ff; border: 1px solid rgba(217, 70, 239, 0.3); }
        .tier-diamond .progress-fill { background: linear-gradient(90deg, #7e22ce, #d946ef); }
        .tier-diamond .avatar-initial { border-color: #a855f7; }
        .tier-diamond.profile-pallet { border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 10px 40px rgba(168, 85, 247, 0.1); }

        /* Legend */
        .tier-legend .aura-layer { background: var(--color-legend); opacity: 0.15; animation: pulse-aura 2s infinite alternate; }
        .tier-legend .tier-badge { color: white; background: var(--color-legend); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
        .tier-legend .progress-fill { background: linear-gradient(90deg, #991b1b, #ef4444); }
        .tier-legend .avatar-initial { border-color: #ef4444; }
        .tier-legend.profile-pallet { border-color: rgba(239,68,68,0.4); background: linear-gradient(180deg, #ffffff 0%, #fff1f2 100%); box-shadow: 0 10px 40px rgba(239, 68, 68, 0.15); }
        .tier-legend .user-name { color: #b91c1c; }
        .tier-legend .frame-container { animation: legend-pulse 1.5s infinite alternate; }

        @keyframes legend-pulse { from { filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3)); transform: scale(1); } to { filter: drop-shadow(0 0 25px rgba(239, 68, 68, 0.6)); transform: scale(1.02); } }
        @keyframes pulse-aura { from { filter: blur(20px); opacity: 0.15; } to { filter: blur(30px); opacity: 0.25; } }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 24px; text-align: center; }
        .stat-val { display: block; font-size: 24px; font-weight: 900; color: var(--primary); font-family: 'JetBrains Mono'; }
        .stat-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 5px; display: block; }

        /* Action Menu */
        .menu-card { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        .menu-item { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: var(--transition); }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: #f8fafc; }
        .menu-left { display: flex; align-items: center; gap: 12px; }

        /* Logout Button */
        .btn-logout { width: 100%; padding: 20px; border-radius: 20px; border: none; background: #fff1f2; color: #e11d48; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); border: 1px solid #ffe4e6; }
        .btn-logout:active { transform: scale(0.98); }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 10px calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { color: var(--text-dim); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; transition: var(--transition); }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }

        /* Custom Modal & Toast */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 45, 77, 0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
        .modal { background: white; padding: 30px; border-radius: 32px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-btn { padding: 16px 24px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; flex: 1; transition: var(--transition); }
        .modal-input { width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid var(--border); margin-top: 15px; font-weight: 700; outline: none; text-align: center; text-transform: uppercase; }
        .modal-input:focus { border-color: var(--primary); }

        #toast { position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 14px 24px; border-radius: 50px; font-size: 13px; font-weight: 700; display: none; z-index: 10001; animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); white-space: nowrap; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="margin-top:0; font-weight:900;">Title</h3>
            <div id="m-body">
                <p id="m-text" style="color:var(--text-dim); font-size:14px; line-height:1.5; font-weight:600;">Message</p>
            </div>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button class="modal-btn" style="background:#f1f5f9; color:var(--text-dim);" onclick="closeModal()" id="m-cancel">Cancel</button>
                <button class="modal-btn" style="background:var(--primary); color:white" id="m-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <header>
        <div class="brand">PROFILE</div>
        <i data-lucide="settings" size="22" style="color:var(--text-dim); cursor:pointer;" onclick="showToast('Settings coming soon!')"></i>
    </header>

    <main>
        
        <div class="profile-pallet tier-base" id="profile-widget">
            <div class="admin-tag" id="admin-badge"><i data-lucide="shield-alert" size="12" style="display:inline; margin-right:4px;"></i> ADMIN</div>
            
            <div class="frame-container">
                <div class="aura-layer"></div>
                
                <div class="avatar-initial" id="avatar-container">
                    <span id="user-initial">U</span>
                    <img id="user-photo" class="user-photo" alt="Profile">
                </div>

                <input type="file" id="photo-upload" accept="image/*" style="display: none;" onchange="handlePhotoUpload(event)">
                
                <div class="upload-btn" id="upload-btn" onclick="document.getElementById('photo-upload').click()">
                    <i data-lucide="camera" size="16"></i>
                </div>

                <svg class="svg-frame frame-g" viewBox="0 0 140 140" width="100%" height="100%">
                    <defs>
                        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#bf953f" />
                            <stop offset="25%" stop-color="#fcf6ba" />
                            <stop offset="50%" stop-color="#b38728" />
                            <stop offset="75%" stop-color="#fbf5b7" />
                            <stop offset="100%" stop-color="#aa771c" />
                        </linearGradient>
                    </defs>
                    <rect x="15" y="15" width="110" height="110" rx="28" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
                    <rect x="22" y="22" width="96" height="96" rx="22" fill="none" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
                    <path d="M 10 40 L 10 10 L 40 10" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="miter"/>
                    <path d="M 130 40 L 130 10 L 100 10" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="miter"/>
                    <path d="M 10 100 L 10 130 L 40 130" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="miter"/>
                    <path d="M 130 100 L 130 130 L 100 130" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="miter"/>
                </svg>

                <svg class="svg-frame frame-d" viewBox="0 0 140 140" width="100%" height="100%">
                    <defs>
                        <linearGradient id="diaGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#7e22ce" />
                            <stop offset="50%" stop-color="#d946ef" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <polygon points="70,5 135,35 135,105 70,135 5,105 5,35" fill="none" stroke="url(#diaGrad)" stroke-width="3" opacity="0.6"/>
                    <rect x="18" y="18" width="104" height="104" rx="26" fill="none" stroke="url(#diaGrad)" stroke-width="5"/>
                    <rect x="25" y="25" width="90" height="90" rx="20" fill="none" stroke="#fdf4ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
                    <polygon points="70,-5 80,8 70,20 60,8" fill="#d946ef" stroke="#fff" stroke-width="1"/>
                    <polygon points="70,120 80,132 70,145 60,132" fill="#06b6d4" stroke="#fff" stroke-width="1"/>
                    <polygon points="-5,70 8,80 20,70 8,60" fill="#a855f7" />
                    <polygon points="120,70 132,80 145,70 132,60" fill="#a855f7" />
                </svg>

                <svg class="svg-frame frame-l" viewBox="0 0 200 200" width="100%" height="100%">
                    <defs>
                        <linearGradient id="legGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fca5a5" />
                            <stop offset="50%" stop-color="#dc2626" />
                            <stop offset="100%" stop-color="#7f1d1d" />
                        </linearGradient>
                    </defs>
                    <rect x="52" y="52" width="96" height="96" rx="28" fill="none" stroke="url(#legGrad)" stroke-width="5"/>
                    <rect x="58" y="58" width="84" height="84" rx="22" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
                    <path d="M 40 40 L 100 5 L 160 40 L 130 55 L 100 40 L 70 55 Z" fill="url(#legGrad)" stroke="#fff" stroke-width="1"/>
                    <polygon points="100,15 110,30 100,45 90,30" fill="#fff" filter="drop-shadow(0px 0px 5px #fff)"/>
                    <path d="M 45 70 L 10 40 L 25 90 L 0 100 L 30 120 L 45 90 Z" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
                    <path d="M 155 70 L 190 40 L 175 90 L 200 100 L 170 120 L 155 90 Z" fill="#991b1b" stroke="#ef4444" stroke-width="1.5"/>
                    <path d="M 55 145 L 100 185 L 145 145 L 100 155 Z" fill="url(#legGrad)" stroke="#fca5a5" stroke-width="1.5"/>
                </svg>

            </div>

            <div class="tier-badge" id="tier-text">Initiate Rank</div>
            <h2 class="user-name" id="user-name">Loading...</h2>
            <p class="user-email" id="user-email">email@example.com</p>

            <div class="xp-container">
                <div class="xp-text">
                    <span id="rank-dest">Next: Gold Tier</span>
                    <span class="val"><span id="current-xp">0</span> / <span id="target-xp">1000</span> XP</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="xp-bar"></div>
                </div>
            </div>

            <div class="roadmap-container">
                <div class="roadmap-title">Road to Elite</div>
                <div class="roadmap-flex">
                    
                    <div class="road-node node-g">
                        <svg viewBox="0 0 140 140"><rect x="15" y="15" width="110" height="110" rx="28" fill="none" stroke="url(#goldGrad)" stroke-width="6"/><path d="M 10 40 L 10 10 L 40 10" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/><path d="M 130 40 L 130 10 L 100 10" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/><path d="M 10 100 L 10 130 L 40 130" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/><path d="M 130 100 L 130 130 L 100 130" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/></svg>
                    </div>
                    
                    <div class="road-node node-d">
                        <svg viewBox="0 0 140 140"><polygon points="70,5 135,35 135,105 70,135 5,105 5,35" fill="none" stroke="url(#diaGrad)" stroke-width="5"/><rect x="18" y="18" width="104" height="104" rx="26" fill="none" stroke="url(#diaGrad)" stroke-width="8"/></svg>
                    </div>
                    
                    <div class="road-node node-l">
                        <svg viewBox="0 0 200 200" style="transform: scale(1.3);"><rect x="52" y="52" width="96" height="96" rx="28" fill="none" stroke="url(#legGrad)" stroke-width="8"/><path d="M 40 40 L 100 5 L 160 40 L 130 55 L 100 40 L 70 55 Z" fill="url(#legGrad)" stroke="#fff" stroke-width="2"/><polygon points="100,15 110,30 100,45 90,30" fill="#fff" /><path d="M 45 70 L 10 40 L 25 90 L 0 100 L 30 120 L 45 90 Z" fill="#991b1b" stroke="#ef4444" stroke-width="2"/><path d="M 155 70 L 190 40 L 175 90 L 200 100 L 170 120 L 155 90 Z" fill="#991b1b" stroke="#ef4444" stroke-width="2"/></svg>
                    </div>

                </div>
            </div>

        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="tests-val">0</span>
                <span class="stat-label">Tests Solved</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="acc-val">0%</span>
                <span class="stat-label">Avg Accuracy</span>
            </div>
        </div>

        <div class="menu-card">
            <div class="menu-item" id="admin-panel-btn" style="display: none;" onclick="window.location.href='admin.html'">
                <div class="menu-left">
                    <i data-lucide="shield" size="20" color="#8b5cf6"></i> Admin Control Panel
                </div>
                <i data-lucide="chevron-right" size="16" color="var(--text-dim)"></i>
            </div>

            <div class="menu-item" onclick="requestNameChange()">
                <div class="menu-left">
                    <i data-lucide="user-square" size="20" color="var(--primary)"></i> Edit Display Name
                </div>
                <i data-lucide="chevron-right" size="16" color="var(--text-dim)"></i>
            </div>
            <div class="menu-item" onclick="showToast('Verification successful. Account is secure.', 'shield-check')">
                <div class="menu-left">
                    <i data-lucide="shield-check" size="20" color="#10b981"></i> Account Status
                </div>
                <span style="font-size:11px; color:#10b981; background:#ecfdf5; padding:4px 8px; border-radius:10px;">VERIFIED PRO</span>
            </div>
        </div>

        <button class="btn-logout" onclick="confirmLogout()">
            <i data-lucide="log-out" size="20"></i> LOGOUT SESSION
        </button>
    </main>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item"><i data-lucide="layout-grid"></i>Dashboard</a>
        <a href="leaderboard.html" class="nav-item"><i data-lucide="bar-chart-3"></i>Rank</a>
        <a href="courses.html" class="nav-item"><i data-lucide="library"></i>Courses</a>
        <a href="profile.html" class="nav-item active"><i data-lucide="user"></i>Profile</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();
        lucide.createIcons();

        // TIER SYSTEM LOGIC
        const tiers = [
            { id: "tier-base", name: "Initiate", threshold: 0, next: 1000 },
            { id: "tier-gold", name: "Gold Tier", threshold: 1000, next: 5000 },
            { id: "tier-diamond", name: "Diamond", threshold: 5000, next: 10000 },
            { id: "tier-legend", name: "Mythic Legend", threshold: 10000, next: 10000 }
        ];

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-initial').innerText = (user.displayName || user.email)[0].toUpperCase();
                
                if (user.email === 'vishalchalse007@gmail.com') {
                    document.getElementById('admin-panel-btn').style.display = 'flex';
                    document.getElementById('admin-badge').style.display = 'flex';
                }
                
                fetchProfileData(user.uid);
            }
        });

        function fetchProfileData(uid) {
            // Fetch Name & Photo
            db.ref(`students/${uid}`).on('value', snap => {
                const data = snap.val();
                if (data) {
                    document.getElementById('user-name').innerText = data.name || "STUDENT";
                    document.getElementById('user-initial').innerText = (data.name || "S")[0].toUpperCase();
                    
                    // Handle Profile Photo UI
                    if (data.photoURL) {
                        document.getElementById('user-photo').src = data.photoURL;
                        document.getElementById('user-photo').style.display = 'block';
                        document.getElementById('user-initial').style.display = 'none';
                        document.getElementById('upload-btn').style.display = 'none'; // Hide button forever
                    } else {
                        document.getElementById('upload-btn').style.display = 'flex'; // Show button if no photo
                    }
                }
            });

            // FETCH XP FROM LEADERBOARD
            db.ref('leaderboard').on('value', snap => {
                let totalPoints = 0;
                let userTotalAcc = 0;
                let userTests = 0;

                snap.forEach(child => {
                    const entry = child.val();
                    if (entry.uid === uid) {
                        totalPoints += (parseInt(entry.score) || 0);
                        userTotalAcc += (parseFloat(entry.accuracy) || 0);
                        userTests++;
                    }
                });

                document.getElementById('tests-val').innerText = userTests;
                document.getElementById('acc-val').innerText = userTests > 0 ? Math.round(userTotalAcc / userTests) + "%" : "0%";
                
                applyTierSystem(totalPoints);
            });
        }

        // ONE-TIME PHOTO UPLOAD FUNCTION
        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file size (Max 2MB) to save storage
            if (file.size > 2 * 1024 * 1024) {
                return showToast("Image too large. Max 2MB allowed.");
            }

            showToast("Uploading secure image...");
            const uid = auth.currentUser.uid;
            const uploadTask = storage.ref(`avatars/${uid}`).put(file);

            uploadTask.on('state_changed', null, 
                (error) => { showToast("Upload failed: " + error.message); }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                        // Save URL to Database
                        db.ref(`students/${uid}`).update({ photoURL: downloadURL }).then(() => {
                            showToast("Profile Photo Locked!");
                        });
                    });
                }
            );
        }

        function applyTierSystem(userXP) {
            let activeTier = tiers[0];
            
            for (let i = 0; i < tiers.length; i++) {
                if (userXP >= tiers[i].threshold) {
                    activeTier = tiers[i];
                }
            }

            const widget = document.getElementById('profile-widget');
            widget.className = `profile-pallet ${activeTier.id}`;
            document.getElementById('tier-text').innerText = activeTier.name;
            document.getElementById('current-xp').innerText = userXP.toLocaleString();

            if (activeTier.id === "tier-legend") {
                document.getElementById('target-xp').innerText = "MAX";
                document.getElementById('rank-dest').innerText = "Top Rank Reached";
                document.getElementById('xp-bar').style.width = "100%";
            } else {
                document.getElementById('target-xp').innerText = activeTier.next.toLocaleString();
                const nextTierIndex = tiers.findIndex(t => t.id === activeTier.id) + 1;
                document.getElementById('rank-dest').innerText = `Next: ${tiers[nextTierIndex].name}`;
                
                const xpInCurrentTier = userXP - activeTier.threshold;
                const totalXpRequiredForNext = activeTier.next - activeTier.threshold;
                const percentage = (xpInCurrentTier / totalXpRequiredForNext) * 100;
                
                document.getElementById('xp-bar').style.width = `${Math.min(percentage, 100)}%`;
            }
        }

        function requestNameChange() {
            document.getElementById('m-title').innerText = "EDIT PROFILE";
            document.getElementById('m-body').innerHTML = `
                <p style="color:var(--text-dim); font-size:13px; margin:0 0 10px; font-weight:600;">Update your global display name.</p>
                <input type="text" id="name-input" class="modal-input" placeholder="ENTER NEW NAME">
            `;
            document.getElementById('m-cancel').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'flex';
            
            document.getElementById('m-confirm').onclick = () => {
                const newName = document.getElementById('name-input').value.trim().toUpperCase();
                if(newName.length < 3) return showToast("Name must be at least 3 characters!");
                
                db.ref(`students/${auth.currentUser.uid}`).update({ name: newName })
                    .then(() => {
                        showToast("Profile Updated!");
                        closeModal();
                    }).catch(err => showToast(err.message));
            };
        }

        function confirmLogout() {
            document.getElementById('m-title').innerText = "END SESSION";
            document.getElementById('m-body').innerHTML = `<p style="color:var(--text-dim); font-size:14px; line-height:1.5; font-weight:600;">Are you sure you want to log out of AgriQ Pro?</p>`;
            
            const confirmBtn = document.getElementById('m-confirm');
            confirmBtn.style.background = '#e11d48'; 
            confirmBtn.innerText = 'Logout';
            
            document.getElementById('modal-overlay').style.display = 'flex';
            
            confirmBtn.onclick = () => {
                auth.signOut().then(() => {
                    window.location.href = 'login.html';
                });
            };
        }

        function closeModal() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
            document.getElementById('m-confirm').style.background = 'var(--primary)';
            document.getElementById('m-confirm').innerText = 'Confirm';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = msg; 
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
