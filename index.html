
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | System Offline</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #ffb300; /* Warning Amber */
            --bg: #000000;
            --surface: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* --- GLOWING OFFLINE ICON --- */
        .status-container {
            position: relative;
            margin-bottom: 40px;
        }
        .offline-icon { 
            color: var(--primary); 
            animation: drift 4s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(255, 179, 0, 0.3));
        }
        @keyframes drift {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-15px) scale(1.05); opacity: 1; filter: drop-shadow(0 0 40px rgba(255, 179, 0, 0.6)); }
        }

        /* --- CONTENT CARD --- */
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 32px; 
            padding: 40px 32px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .brand { 
            font-weight: 900; 
            font-size: 14px; 
            letter-spacing: 4px; 
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }

        h1 { 
            font-size: 28px; 
            font-weight: 800; 
            margin: 0 0 16px 0; 
            letter-spacing: -1px;
        }

        .message {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* --- TIME BADGE --- */
        .time-badge {
            background: rgba(255, 179, 0, 0.1);
            border: 1px solid rgba(255, 179, 0, 0.2);
            padding: 16px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
            font-weight: 700;
            font-family: 'JetBrains Mono';
            font-size: 16px;
        }

        .pulse-ring {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(255, 179, 0, 0.7);
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 179, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 179, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 179, 0, 0); }
        }

        footer {
            position: absolute;
            bottom: 40px;
            font-size: 10px;
            font-weight: 800;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="offline-icon"><i data-lucide="database-zap" size="80"></i></div>
    </div>

    <div class="card">
        <div class="brand">AgriQ<span>PRO</span></div>
        <h1>Database Offline</h1>
        <p class="message">System is currently undergoing scheduled maintenance and data synchronization. Please return during active hours.</p>
        
        <div class="time-badge">
            <div class="pulse-ring"></div>
            6:00 PM - 10:30 PM
        </div>
    </div>

    <footer>STAY SHARP. STUDY HARD.</footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
