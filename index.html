<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AgriQ Pro | Terminal Login & Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            /* Cool Blue Theme Base */
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.4);
            --bg: #020617; /* Very Deep Navy */
            --surface: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1e293b;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            --rank-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        /* Top 3 Rank - Deep Space Cyan/Indigo Mode */
        body.elite-mode {
            --primary: #22d3ee;
            --primary-glow: rgba(34, 211, 238, 0.6);
            --bg: #010409;
            --surface: #0d1117;
            --text-main: #e6edf3;
            --border: #30363d;
            --rank-gradient: linear-gradient(135deg, #0891b2, #0e7490, #1e40af, #3b82f6);
            background-size: 400% 400%;
            animation: nebulaFlow 10s ease infinite;
        }

        @keyframes nebulaFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body.focused-mode {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --glass: rgba(59, 130, 246, 0.05);
            --rank-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            transition: 0.5s ease; 
        }

        header, main, footer { opacity: 0; visibility: hidden; transition: opacity 0.4s ease; }
        .app-ready header, .app-ready main, .app-ready footer { opacity: 1; visibility: visible; }

        #app-loader {
            position: fixed; inset: 0; background: #020617; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--surface); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000;
        }

        .brand { font-weight: 900; font-size: 20px; letter-spacing: -1px; text-transform: uppercase; }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; transition: 0.3s; }
        
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .icon-btn { cursor: pointer; color: var(--text-dim); transition: var(--transition); display: flex; align-items: center; text-decoration: none; }
        .icon-btn:hover { color: var(--primary); transform: translateY(-1px); }

        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; padding-bottom: 100px; }

        .auth-card { background: var(--surface); border-radius: 32px; padding: 30px; border: 1px solid var(--border); }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); z-index: 5; }
        
        input, select { 
            width: 100%; padding: 16px 16px 16px 52px; border-radius: 18px; border: 1.5px solid var(--border); 
            background: var(--glass); color: var(--text-main); font-weight: 600; transition: 0.2s; outline: none;
            appearance: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .btn-primary { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--primary); color: #000; 
            font-weight: 900; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; border: 1px solid var(--border); opacity: 0.7; }

        .btn-social {
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 800; cursor: pointer; background: #fff; color: #000; transition: 0.2s;
            margin-top: 15px;
        }

        .rank-card { 
            background: var(--rank-gradient); 
            border: 1.5px solid var(--border); padding: 22px; border-radius: 28px; margin-bottom: 18px;
            display: flex; justify-content: space-between; align-items: center; color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .profile-container { position: relative; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
        
        #user-initial {
            width: 58px; height: 58px; background: var(--surface); border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; 
            color: var(--primary); font-size: 24px; background-size: cover; background-position: center;
            cursor: pointer; position: relative; z-index: 2; border: 2px solid var(--bg); 
        }
        #user-initial.no-click { cursor: default; }

        .conqueror-frame {
            position: absolute; inset: 0; border-radius: 20px;
            background: linear-gradient(135deg, #22d3ee, #3b82f6, #0ea5e9, #67e8f9);
            background-size: 400% 400%; animation: blueShine 3s linear infinite; z-index: 1;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .normal-frame { position: absolute; inset: 4px; border-radius: 18px; border: 2px solid var(--border); z-index: 1; }

        .conqueror-crown {
            position: absolute; top: -14px; right: -5px; z-index: 10;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.8));
            color: var(--primary); transform: rotate(15deg);
        }

        @keyframes blueShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .progression-bar {
            background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 12px; margin-bottom: 18px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center;
        }
        .prog-stat { display: flex; flex-direction: column; align-items: center; }
        .prog-stat i { color: var(--primary); margin-bottom: 4px; }
        .prog-label { font-size: 8px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        .prog-val { font-size: 13px; font-weight: 900; color: var(--text-main); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 16px; border-radius: 20px; text-align: center; transition: 0.5s; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }

        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px; background: rgba(0, 210, 255, 0.1); color: var(--primary); display: inline-block; margin-bottom: 8px; border: 1px solid rgba(0, 210, 255, 0.2); }

        .toggle-container { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--glass); border-radius: 20px; margin-bottom: 18px; border: 1px solid var(--border); }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #1e293b; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        #custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 24px; backdrop-filter: blur(10px); }
        .modal-content { background: var(--surface); border: 2px solid var(--border); width: 100%; max-width: 350px; border-radius: 28px; padding: 30px; text-align: center; transform: scale(0.9); transition: 0.3s; }
        #custom-modal.active .modal-content { transform: scale(1); border-color: var(--primary); }
        
        #toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10001; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface); border: 1px solid var(--border); padding: 12px 20px;
            border-radius: 16px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); transform: translateY(100px);
            opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto; border-left: 4px solid var(--primary);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast i { color: var(--primary); }
        .toast-msg { font-size: 12px; font-weight: 700; color: var(--text-main); }

        footer { padding: 30px 24px; text-align: center; border-top: 1px solid var(--border); margin-top: 20px; background: var(--surface); }
        .copy-text { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-loader">
        <div id="loader-icon" style="color:var(--primary);"><i data-lucide="zap" size="64" fill="currentColor"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800;">System Booting...</p>
    </div>

    <div id="toast-container"></div>
    <input type="file" id="profile-upload" accept="image/*" class="hidden" onchange="uploadProfilePic(this)">

    <div id="custom-modal">
        <div class="modal-content">
            <div id="modal-title" style="font-weight:900; text-transform:uppercase; margin-bottom:10px;">Alert</div>
            <div id="modal-text" style="font-size:13px; color:var(--text-dim); margin-bottom:25px;">Message</div>
            <div class="modal-actions" style="display:flex; gap:12px;">
                <button class="modal-btn" id="modal-cancel-btn" style="flex:1; padding:14px; border-radius:14px; border:none; background:var(--border); color:var(--text-dim); font-weight:800; cursor:pointer;">CANCEL</button>
                <button class="modal-btn" id="modal-confirm-btn" style="flex:1; padding:14px; border-radius:14px; border:none; background:var(--primary); color:#000; font-weight:900; cursor:pointer;">CONFIRM</button>
            </div>
        </div>
    </div>

    <header id="main-header">
        <div class="brand">AGRI<span>Q</span> PRO</div>
        <div class="header-actions">
            <a href="leaderboard.html" class="icon-btn"><i data-lucide="trophy" size="20"></i></a>
            <i data-lucide="log-out" id="logout-btn" class="icon-btn hidden" onclick="confirmLogout()"></i>
        </div>
    </header>

    <main>
        <div id="screen-auth" class="auth-card hidden">
            <h2 style="font-weight: 900; margin-top: 0; font-size: 24px;">Access Portal</h2>
            <form onsubmit="handleAuth(event)">
                <div class="input-group"><i data-lucide="mail"></i><input type="email" id="email" placeholder="Email" required></div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="password" placeholder="Password" required></div>
                <button type="submit" class="btn-primary" id="auth-btn">SIGN IN <i data-lucide="arrow-right"></i></button>
            </form>
            <button class="btn-social" onclick="handleSocialLogin()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="16"> Google Account
            </button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">
                <a href="javascript:void(0)" onclick="toggleAuthMode()" id="auth-toggle-text" style="color:var(--primary); text-decoration:none; font-weight:800;">Register New Account</a>
            </p>
        </div>

        <div id="screen-dash" class="hidden">
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                <div class="profile-container" id="profile-container">
                    <div id="rank-frame" class="normal-frame"></div>
                    <div id="user-initial" onclick="handleProfileClick()">U</div>
                </div>
                <div>
                    <div id="elite-status-label" class="status-badge">STANDARD ACCOUNT</div>
                    <div class="name-wrapper"><h2 id="user-display-name" style="margin:0; font-weight:900; font-size:18px;">STUDENT</h2></div>
                </div>
            </div>

            <div class="rank-card">
                <div style="flex: 1;">
                    <span style="font-size: 8px; font-weight: 800; opacity: 0.8;">GLOBAL STANDING</span>
                    <div style="display: flex; align-items: baseline; gap: 8px;">
                        <span style="font-size: 42px; font-weight: 900; line-height: 1;">#<span id="rank-val">--</span></span>
                        <span id="total-points-display" style="font-size: 15px; font-weight: 900; color: var(--primary);">0 PTS</span>
                    </div>
                </div>
                <i data-lucide="award" size="40"></i>
            </div>

            <div class="progression-bar">
                <div class="prog-stat"><i data-lucide="zap" size="14"></i><span class="prog-label">Streak</span><span class="prog-val" id="streak-val">1 Day</span></div>
                <div class="prog-stat" style="border-left:1px solid var(--border); border-right:1px solid var(--border);"><i data-lucide="trending-up" size="14"></i><span class="prog-label">Level</span><span class="prog-val" id="level-val">Lvl 1</span></div>
                <div class="prog-stat"><i data-lucide="star" size="14"></i><span class="prog-label">Popularity</span><span class="prog-val" id="pop-val">Rookie</span></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span class="stat-val" id="tests-taken">0</span><span class="stat-label">SOLVED</span></div>
                <div class="stat-card"><span class="stat-val" id="avg-accuracy">0%</span><span class="stat-label">ACCURACY</span></div>
            </div>

            <div class="input-group">
                <i data-lucide="layers"></i>
                <select id="module-selector"><option value="">SELECT SUBJECTS</option></select>
            </div>

            <button class="btn-primary" id="start-btn" onclick="startTest()" style="padding:20px; font-size:15px; margin-bottom: 18px;"><i data-lucide="play" fill="currentColor"></i> START TEST</button>
            
            <div class="toggle-container">
                <span style="font-weight:800; font-size:11px;">FOCUS MODE</span>
                <label class="switch"><input type="checkbox" id="focus-toggle" onchange="toggleFocusedMode()"><span class="slider"></span></label>
            </div>
        </div>
    </main>

    <footer><div class="copy-text">© 2026 AGRIQ PRO TERMINAL.</div></footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let isLoginMode = true;
        let isPhotoSet = false;

        function showModal(title, text, type = 'confirm', onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            const cb = document.getElementById('modal-cancel-btn');
            if(type === 'alert') cb.classList.add('hidden'); else cb.classList.remove('hidden');
            document.getElementById('modal-confirm-btn').onclick = () => { 
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300); 
                if(onConfirm) onConfirm(); 
            };
            cb.onclick = () => { modal.classList.remove('active'); setTimeout(() => modal.style.display = 'none', 300); };
        }

        function showToast(message, icon = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="${icon}" size="18"></i><span class="toast-msg">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        auth.onAuthStateChanged(async (user) => {
            const screenAuth = document.getElementById('screen-auth');
            const screenDash = document.getElementById('screen-dash');
            if (user) {
                screenAuth.classList.add('hidden');
                await syncUser(user);
                setupDash(user);
                screenDash.classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            } else {
                screenDash.classList.add('hidden');
                screenAuth.classList.remove('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
            }
            document.body.classList.add('app-ready');
            setTimeout(() => { document.getElementById('app-loader').classList.add('fade-out'); lucide.createIcons(); }, 800);
        });

        async function syncUser(user) {
            const ref = db.ref(`students/${user.uid}`);
            try {
                const snap = await ref.once('value');
                if (!snap.exists()) {
                    await ref.set({
                        uid: user.uid,
                        name: (user.displayName || user.email.split('@')[0]).toUpperCase(),
                        email: user.email,
                        focusedMode: false,
                        streak: 1, lastActive: Date.now(), testsTaken: 0, avgAccuracy: 0
                    });
                }
            } catch (e) {
                console.error("Sync Error:", e);
                showToast("Profile Sync Error", "alert-triangle");
            }
        }

        function setupDash(user) {
            db.ref(`students/${user.uid}`).on('value', snap => {
                const d = snap.val();
                if(!d) return;
                document.getElementById('user-display-name').innerText = d.name;
                const initialBox = document.getElementById('user-initial');
                isPhotoSet = d.photoLocked || !!d.profilePic;
                if (d.profilePic) {
                    initialBox.style.backgroundImage = `url(${d.profilePic})`;
                    initialBox.innerText = "";
                } else {
                    initialBox.innerText = d.name[0];
                }
                document.getElementById('focus-toggle').checked = d.focusedMode;
                document.body.classList.toggle('focused-mode', d.focusedMode);
                calculateStats(user.uid);
            });

            db.ref('subjects').on('value', snap => {
                const sel = document.getElementById('module-selector');
                sel.innerHTML = '<option value="">SELECT MODULE</option>';
                snap.forEach(node => {
                    if (node.val().enabled) {
                        const opt = document.createElement('option');
                        opt.value = node.key; opt.innerText = node.key.toUpperCase().replace(/_/g, ' ');
                        sel.appendChild(opt);
                    }
                });
            });
        }

        function calculateStats(uid) {
            db.ref('leaderboard').on('value', snap => {
                const aggregated = {};
                let userTotalAcc = 0, userCount = 0;
                snap.forEach(child => {
                    const entry = child.val();
                    if (!aggregated[entry.uid]) aggregated[entry.uid] = { score: 0 };
                    aggregated[entry.uid].score += (parseInt(entry.score) || 0);
                    if(entry.uid === uid) { userTotalAcc += (parseFloat(entry.accuracy) || 0); userCount++; }
                });
                const lbArray = Object.entries(aggregated).sort((a, b) => b[1].score - a[1].score);
                const myRank = lbArray.findIndex(x => x[0] === uid) + 1;
                document.getElementById('rank-val').innerText = myRank > 0 ? myRank : "--";
                document.getElementById('total-points-display').innerText = (aggregated[uid]?.score || 0) + " PTS";
                document.getElementById('avg-accuracy').innerText = (userCount > 0 ? Math.round(userTotalAcc / userCount) : 0) + "%";
                document.getElementById('tests-taken').innerText = userCount;

                const rankFrame = document.getElementById('rank-frame');
                const statusBadge = document.getElementById('elite-status-label');
                if (myRank > 0 && myRank <= 3) {
                    document.body.classList.add('elite-mode');
                    rankFrame.className = 'conqueror-frame';
                    statusBadge.innerText = "CONQUEROR ACCOUNT";
                } else {
                    document.body.classList.remove('elite-mode');
                    rankFrame.className = 'normal-frame';
                    statusBadge.innerText = "STANDARD ACCOUNT";
                }
            });
        }

        async function startTest() {
            const m = document.getElementById('module-selector').value;
            if(!m) return showModal("ERROR", "Select a module.", "alert");
            window.location.href = `test.html?mod=${encodeURIComponent(m)}`;
        }

        function toggleFocusedMode() { 
            const state = document.getElementById('focus-toggle').checked;
            db.ref(`students/${auth.currentUser.uid}`).update({ focusedMode: state }); 
        }
        
        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value, pass = document.getElementById('password').value;
            try { 
                if (isLoginMode) await auth.signInWithEmailAndPassword(email, pass); 
                else await auth.createUserWithEmailAndPassword(email, pass); 
            } catch (err) { showModal("AUTH ERROR", err.message, "alert"); }
        }

        async function handleSocialLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (err) { await auth.signInWithRedirect(provider); }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerText = isLoginMode ? "SIGN IN" : "CREATE ACCOUNT";
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Register New Account" : "Back to Login";
        }

        function confirmLogout() { 
            showModal("LOGOUT", "Terminate session?", "confirm", () => auth.signOut().then(() => location.reload()));
        }

        function handleProfileClick() {
            if (!isPhotoSet) document.getElementById('profile-upload').click();
        }

        function uploadProfilePic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    db.ref(`students/${auth.currentUser.uid}`).update({ profilePic: e.target.result, photoLocked: true });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
