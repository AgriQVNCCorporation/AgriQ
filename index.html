<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f9ff">
    <title>AgriQ Pro | Sky Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #0084ff;
            --primary-glow: rgba(0, 132, 255, 0.2);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #002d4d;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            --rank-gradient: linear-gradient(135deg, #0084ff 0%, #00c6ff 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #e0f2fe, transparent), radial-gradient(circle at bottom left, #e0f2fe, transparent);
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            transition: 0.5s ease; 
        }

        header, main, footer { opacity: 0; visibility: hidden; transition: opacity 0.4s ease; }
        .app-ready header, .app-ready main, .app-ready footer { opacity: 1; visibility: visible; }

        #app-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000;
        }

        .brand { font-weight: 900; font-size: 20px; letter-spacing: -1px; text-transform: uppercase; color: var(--text-main); }
        .brand span { color: var(--primary); font-family: 'JetBrains Mono'; }
        
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .icon-btn { cursor: pointer; color: var(--text-dim); transition: var(--transition); display: flex; align-items: center; text-decoration: none; }
        .icon-btn:hover { color: var(--primary); transform: translateY(-1px); }

        main { padding: 24px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; padding-bottom: 100px; }

        .auth-card { background: var(--surface); border-radius: 32px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); z-index: 5; }
        
        input, select { 
            width: 100%; padding: 16px 16px 16px 52px; border-radius: 18px; border: 1.5px solid var(--border); 
            background: var(--surface); color: var(--text-main); font-weight: 600; transition: 0.2s; outline: none;
            appearance: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
/* Elite Rank Framing */
.profile-container.rank-1 { --tier-color: #fbbf24; --glow: rgba(251, 191, 36, 0.5); }
.profile-container.rank-2 { --tier-color: #94a3b8; --glow: rgba(148, 163, 184, 0.4); }
.profile-container.rank-3 { --tier-color: #cd7f32; --glow: rgba(205, 127, 50, 0.4); }

.profile-container.top-ranker::before {
    content: ''; position: absolute; inset: -4px;
    background: var(--tier-color); border-radius: 24px;
    z-index: 0; animation: frameGlow 2s infinite alternate;
}

@keyframes frameGlow {
    from { box-shadow: 0 0 10px var(--glow); opacity: 0.6; }
    to { box-shadow: 0 0 25px var(--glow); opacity: 1; }
}

/* Floating Crown Animation */
.rank-crown {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    z-index: 10; font-size: 22px; pointer-events: none;
    animation: crownFloat 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}

@keyframes crownFloat {
    0%, 100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
    50% { transform: translateX(-50%) translateY(-6px) rotate(5deg); }
}

/* Elite Status Badge with Shimmer */
.elite-badge {
    background: linear-gradient(90deg, #0f172a, #1e293b, #0f172a);
    background-size: 200% auto;
    color: #fbbf24; border: 1px solid #fbbf24;
    font-size: 9px; font-weight: 900; padding: 4px 12px;
    border-radius: 50px; display: inline-flex; align-items: center; gap: 5px;
    margin-bottom: 8px; animation: shimmer 3s linear infinite;
    box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
}

@keyframes shimmer {
    to { background-position: 200% center; }
}

.name-wrapper { display: flex; align-items: center; gap: 8px; }

        .btn-primary { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--primary); color: #fff; 
            font-weight: 900; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px var(--primary-glow);
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-social {
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 800; cursor: pointer; background: #fff; color: #000; transition: 0.2s;
            margin-top: 15px;
        }

        .rank-card { 
            background: var(--rank-gradient); 
            border: none; padding: 22px; border-radius: 28px; margin-bottom: 18px;
            display: flex; justify-content: space-between; align-items: center; color: #fff;
            box-shadow: 0 15px 30px rgba(0, 132, 255, 0.3);
        }

        .profile-container { position: relative; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
        
        #user-initial {
            width: 62px; height: 62px; background: var(--surface); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; 
            color: var(--primary); font-size: 24px; background-size: cover; background-position: center;
            cursor: pointer; position: relative; z-index: 2; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .progression-bar {
            background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 12px; margin-bottom: 18px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center;
        }
        .prog-stat { display: flex; flex-direction: column; align-items: center; }
        .prog-stat i { color: var(--primary); margin-bottom: 4px; }
        .prog-label { font-size: 8px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        .prog-val { font-size: 13px; font-weight: 900; color: var(--text-main); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 20px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }

        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px; background: #e0f2fe; color: var(--primary); display: inline-block; margin-bottom: 8px; }

        #info-drawer {
            position: fixed; bottom: -100%; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 24px; border-top-left-radius: 32px; border-top-right-radius: 32px;
            transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.05);
        }
        #info-drawer.open { bottom: 0; }
        .drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }

        #custom-modal { position: fixed; inset: 0; background: rgba(0, 45, 77, 0.4); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 24px; backdrop-filter: blur(8px); }
        .modal-content { background: var(--surface); width: 100%; max-width: 350px; border-radius: 28px; padding: 30px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        
        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10001; width: 90%; max-width: 400px; }
        .toast { background: var(--surface); border: 1px solid var(--border); padding: 12px 20px; border-radius: 16px; display: flex; align-items: center; gap: 12px; border-left: 4px solid var(--primary); }

        footer { padding: 30px 24px; text-align: center; border-top: 1px solid var(--border); margin-top: 20px; background: var(--surface); }
        .copy-text { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; font-weight: 800; }
        .hidden { display: none !important; }
        /* Rank-specific Colors */
.profile-container.rank-1 { --tier: #fbbf24; } /* Gold */
.profile-container.rank-2 { --tier: #94a3b8; } /* Silver */
.profile-container.rank-3 { --tier: #cd7f32; } /* Bronze */

/* The Animated Glow Frame */
.top-ranker::before {
    content: ''; 
    position: absolute; 
    inset: -5px; 
    background: var(--tier); 
    border-radius: 24px; 
    z-index: 0; 
    animation: frameGlow 2s infinite alternate;
}

@keyframes frameGlow {
    from { box-shadow: 0 0 5px var(--tier); opacity: 0.4; }
    to { box-shadow: 0 0 20px var(--tier); opacity: 0.9; }
}

/* Floating Crown */
.rank-crown {
    position: absolute; 
    top: -20px; 
    left: 50%; 
    transform: translateX(-50%);
    z-index: 10; 
    font-size: 24px; 
    pointer-events: none;
    animation: crownFloat 2s ease-in-out infinite;
}

@keyframes crownFloat {
    0%, 100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
    50% { transform: translateX(-50%) translateY(-8px) rotate(5deg); }
}

    </style>
</head>
<body>

    <div id="app-loader">
        <div id="loader-icon" style="color:var(--primary);"><i data-lucide="cloud" size="64" fill="currentColor"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800;">Syncing Atmosphere...</p>
    </div>

    <div id="toast-container"></div>
    <input type="file" id="profile-upload" accept="image/*" class="hidden" onchange="uploadProfilePic(this)">

    <div id="custom-modal">
        <div class="modal-content">
            <div id="modal-title" style="font-weight:900; text-transform:uppercase; margin-bottom:10px;">Alert</div>
            <div id="modal-text" style="font-size:13px; color:var(--text-dim); margin-bottom:25px;">Message</div>
            <div class="modal-actions" style="display:flex; gap:12px;">
                <button class="modal-btn" id="modal-cancel-btn" style="flex:1; padding:14px; border-radius:14px; border:none; background:var(--bg); color:var(--text-dim); font-weight:800; cursor:pointer;">CANCEL</button>
                <button class="modal-btn" id="modal-confirm-btn" style="flex:1; padding:14px; border-radius:14px; border:none; background:var(--primary); color:white; font-weight:900; cursor:pointer;">CONFIRM</button>
            </div>
        </div>
    </div>

    <header id="main-header">
        <div class="brand">AGRI<span>Q</span> PRO</div>
        <div class="header-actions">
            <i data-lucide="info" class="icon-btn" onclick="document.getElementById('info-drawer').classList.add('open')"></i>
            <a href="admin.html" class="icon-btn"><i data-lucide="shield-check" size="20"></i></a>
            <a href="leaderboard.html" class="icon-btn"><i data-lucide="trophy" size="20"></i></a>
            <i data-lucide="log-out" id="logout-btn" class="icon-btn hidden" onclick="confirmLogout()"></i>
        </div>
    </header>

    <main>
        <div id="screen-auth" class="auth-card hidden">
            <h2 style="font-weight: 900; margin-top: 0; font-size: 24px;">Welcome Back</h2>
            <form onsubmit="handleAuth(event)">
                <div class="input-group"><i data-lucide="mail"></i><input type="email" id="email" placeholder="Email" required></div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="password" placeholder="Password" required></div>
                <button type="submit" class="btn-primary" id="auth-btn">SIGN IN <i data-lucide="arrow-right"></i></button>
            </form>
            <button class="btn-social" onclick="handleSocialLogin()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="16"> Google Account
            </button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">
                <a href="javascript:void(0)" onclick="toggleAuthMode()" id="auth-toggle-text" style="color:var(--primary); text-decoration:none; font-weight:800;">Register New Account</a>
            </p>
        </div>

        <div id="screen-dash" class="hidden">
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                <div class="profile-container">
                    <div id="user-initial" onclick="handleProfileClick()">U</div>
                    
                </div>
                <div>
                    <div class="status-badge">STUDENT ACCOUNT</div>
                    <div class="name-wrapper">
                        <h2 id="user-display-name" style="margin:0; font-weight:900; font-size:18px;">STUDENT</h2>
                        <i data-lucide="edit-3" id="name-edit-icon" size="14" class="edit-name-btn" onclick="editProfileName()"></i>
                    </div>
                </div>
            </div>

            <div class="rank-card">
                <div style="flex: 1;">
                    <span style="font-size: 8px; font-weight: 800; opacity: 0.9;">GLOBAL STANDING</span>
                    <div style="display: flex; align-items: baseline; gap: 8px;">
                        <span style="font-size: 42px; font-weight: 900; line-height: 1;">#<span id="rank-val">--</span></span>
                        <span id="total-points-display" style="font-size: 15px; font-weight: 900; color: #fff; opacity: 0.9;">0 PTS</span>
                    </div>
                </div>
                <i data-lucide="award" size="40"></i>
            </div>

            <div class="progression-bar">
                <div class="prog-stat"><i data-lucide="zap" size="14"></i><span class="prog-label">Streak</span><span class="prog-val" id="streak-val">1 Day</span></div>
                <div class="prog-stat" style="border-left:1px solid var(--border); border-right:1px solid var(--border);"><i data-lucide="trending-up" size="14"></i><span class="prog-label">Level</span><span class="prog-val" id="level-val">Lvl 1</span></div>
                <div class="prog-stat"><i data-lucide="user" size="14"></i><span class="prog-label">Status</span><span class="prog-val" id="pop-val">Active</span></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span class="stat-val" id="tests-taken">0</span><span class="stat-label">SOLVED</span></div>
                <div class="stat-card"><span class="stat-val" id="avg-accuracy">0%</span><span class="stat-label">ACCURACY</span></div>
            </div>

            <div class="input-group">
                <i data-lucide="layers"></i>
                <select id="module-selector"><option value="">SELECT SUBJECTS</option></select>
            </div>

            <button class="btn-primary" id="start-btn" onclick="startTest()" style="padding:20px; font-size:15px;"><i data-lucide="play" fill="currentColor"></i> START MODULE</button>
        </div>
    </main>

    <footer><div class="copy-text">© 2026 AGRIQ PRO SKY.</div></footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let isLoginMode = true;
        let isPhotoSet = false;

        function showModal(title, text, type = 'confirm', onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            modal.style.display = 'flex';
            const cb = document.getElementById('modal-cancel-btn');
            if(type === 'alert') cb.classList.add('hidden'); else cb.classList.remove('hidden');
            document.getElementById('modal-confirm-btn').onclick = () => { modal.style.display = 'none'; if(onConfirm) onConfirm(); };
            cb.onclick = () => { modal.style.display = 'none'; };
        }

        function showToast(message, icon = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="${icon}" size="18"></i><span style="font-size:12px; font-weight:700;">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 3000);
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('screen-auth').classList.add('hidden');
                await syncUser(user);
                setupDash(user);
                document.getElementById('screen-dash').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            } else {
                document.getElementById('screen-dash').classList.add('hidden');
                document.getElementById('screen-auth').classList.remove('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
            }
            document.body.classList.add('app-ready');
            setTimeout(() => { 
                document.getElementById('app-loader').classList.add('fade-out'); 
                lucide.createIcons(); 
            }, 800);
        });

        async function syncUser(user) {
            const ref = db.ref(`students/${user.uid}`);
            const snap = await ref.once('value');
            if (!snap.exists()) {
                await ref.set({
                    uid: user.uid,
                    name: (user.displayName || user.email.split('@')[0]).toUpperCase(),
                    email: user.email,
                    streak: 1,
                    lastActive: Date.now(),
                    testsTaken: 0,
                    avgAccuracy: 0
                });
            }
        }

        function setupDash(user) {
            db.ref(`students/${user.uid}`).on('value', snap => {
                const d = snap.val();
                if(!d) return;
                document.getElementById('user-display-name').innerText = d.name;
                document.getElementById('streak-val').innerText = `${d.streak || 1} Days`;
                if (d.profilePic) {
                    document.getElementById('user-initial').innerText = "";
                    document.getElementById('user-initial').style.backgroundImage = `url(${d.profilePic})`;
                    isPhotoSet = true;
                }
                calculateStats(user.uid);
            });

            db.ref('subjects').on('value', snap => {
                const sel = document.getElementById('module-selector');
                sel.innerHTML = '<option value="">SELECT MODULE</option>';
                snap.forEach(node => {
                    if (node.val().enabled) {
                        const opt = document.createElement('option');
                        opt.value = node.key; opt.innerText = node.key.toUpperCase().replace(/_/g, ' ');
                        sel.appendChild(opt);
                    }
                });
            });
        }

        function calculateStats(uid) {
            db.ref('leaderboard').on('value', (snap) => {
                const aggregated = {};
                let userTotalAcc = 0, userCount = 0;
                snap.forEach(child => {
                    const entry = child.val();
                    if (!aggregated[entry.uid]) aggregated[entry.uid] = { score: 0 };
                    aggregated[entry.uid].score += (parseInt(entry.score) || 0);
                    if(entry.uid === uid) { userTotalAcc += (parseFloat(entry.accuracy) || 0); userCount++; }
                });
                const lbArray = Object.entries(aggregated).sort((a, b) => b[1].score - a[1].score);
                const myRank = lbArray.findIndex(x => x[0] === uid) + 1;
                document.getElementById('rank-val').innerText = myRank > 0 ? myRank : "--";
                document.getElementById('total-points-display').innerText = (aggregated[uid]?.score || 0) + " PTS";
                document.getElementById('avg-accuracy').innerText = (userCount > 0 ? Math.round(userTotalAcc / userCount) : 0) + "%";
                document.getElementById('tests-taken').innerText = userCount;
            });
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value, pass = document.getElementById('password').value;
            try { 
                if (isLoginMode) await auth.signInWithEmailAndPassword(email, pass); 
                else await auth.createUserWithEmailAndPassword(email, pass); 
            } catch (err) { showModal("AUTH ERROR", err.message, "alert"); }
        }

        async function handleSocialLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (err) { console.error(err); }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerText = isLoginMode ? "SIGN IN" : "CREATE ACCOUNT";
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Register New Account" : "Back to Login";
        }

        function confirmLogout() { 
            showModal("LOGOUT", "End your current session?", "confirm", () => {
                auth.signOut().then(() => window.location.reload());
            });
        }

        function handleProfileClick() {
            if (!isPhotoSet) document.getElementById('profile-upload').click();
        }

        function uploadProfilePic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    db.ref(`students/${auth.currentUser.uid}`).update({ profilePic: e.target.result });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startTest() {
            const m = document.getElementById('module-selector').value;
            if(!m) return showModal("ERROR", "Please select a subject module.", "alert");
            window.location.href = `test.html?mod=${encodeURIComponent(m)}`;
        }
    </script>
</body>
</html>
