<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Admin Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b; 
            --boot-accent: #00aaff;
            --bg: #000000;
            --surface: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --success: #00ff88;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            padding-bottom: 100px; 
            display: none; 
        }

        #admin-loader {
            position: fixed; inset: 0; background: #000000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #admin-loader.fade-out { opacity: 0; visibility: hidden; transition: 0.8s; }
        
        .electric-icon { color: var(--boot-accent); animation: electricPulse 1.5s infinite; }
        @keyframes electricPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 15px var(--boot-accent)); }
        }

        header { 
            padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--surface); backdrop-filter: blur(20px); z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 900; font-size: 18px; }
        .brand span { color: var(--primary); }

        main { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 20px; }
        h2 { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(120,120,120,0.05); border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        input, textarea { width: 100%; background: rgba(120,120,120,0.05); border: 1px solid var(--border); border-radius: 18px; padding: 16px; color: var(--text-main); outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn-primary { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 10px 16px; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; }

        .data-pill { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: rgba(120,120,120,0.03); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border); }
        
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); height: 70px; border-radius: 35px; display: flex; align-items: center; width: 92%; max-width: 450px; justify-content: space-around; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        
        .legacy-box { background: #050505; border: 1px solid #333; padding: 10px; border-radius: 12px; font-family: 'JetBrains Mono'; font-size: 10px; color: #777; overflow-x: auto; white-space: pre; margin-top: 10px; max-height: 120px; }
    </style>
</head>
<body>

    <div id="admin-loader">
        <div class="electric-icon"><i data-lucide="zap" size="48"></i></div>
        <p style="font-size:10px; font-family:'JetBrains Mono'; color:var(--boot-accent); margin-top:15px; letter-spacing:2px;">SYNCING_TERMINAL</p>
    </div>

    <div id="command-center">
        <header>
            <div class="brand">AGRIQ<span>ADMIN</span></div>
            <button class="btn-outline" onclick="firebase.auth().signOut()">LOGOUT</button>
        </header>

        <main>
            <div class="card" id="editor-card">
                <h2 id="editor-title"><i data-lucide="upload"></i> Deploy Module</h2>
                <input type="text" id="sub-name" placeholder="Module Name (e.g. agronomy_quiz_01)">
                <input type="number" id="time-limit" placeholder="Time Limit (seconds)" value="20">
                <textarea id="json-input" rows="6" placeholder='Paste JSON array here...'></textarea>
                <button class="btn-primary" onclick="uploadData()" id="push-btn">PUSH TO LIVE</button>
            </div>

            <div class="card">
                <h2><i data-lucide="layers"></i> Live Modules</h2>
                <div id="module-list"></div>
            </div>

            <div class="card" style="opacity: 0.7;">
                <h2 style="color: #666;"><i data-lucide="archive"></i> Legacy Backup</h2>
                <p style="font-size: 10px; color: var(--text-dim); margin-top: -10px;">Migrate old data to the new structure.</p>
                <div id="legacy-backup-container"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active"><i data-lucide="cpu" size="20"></i>CONSOLE</button>
            <button class="nav-item" onclick="location.href='adminlead.html'"><i data-lucide="trophy" size="20"></i>LEADER</button>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().onAuthStateChanged(user => {
            if (user && user.email === 'vishalchalse007@gmail.com') {
                document.body.style.display = 'block';
                initAdmin();
                setTimeout(() => document.getElementById('admin-loader').classList.add('fade-out'), 1000);
            } else {
                window.location.href = "index.html"; 
            }
        });

        function initAdmin() {
            db.ref('subjects').on('value', snap => {
                const container = document.getElementById('module-list');
                container.innerHTML = "";

                snap.forEach(module => {
                    const modKey = module.key;
                    const modData = module.val();
                    const currentTime = modData.config ? modData.config.timeLimit : 20;
                    
                    const pill = document.createElement('div');
                    pill.className = "data-pill";
                    pill.innerHTML = `
                        <div style="font-size:12px; font-weight:700;">
                           ${modKey.toUpperCase().replace(/_/g, ' ')}
                           <div style="font-size:9px; color:var(--text-dim); font-weight:400; margin-top:4px;">${currentTime}s Limit</div>
                        </div>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button class="btn-outline" onclick="deleteModule('${modKey}')">DEL</button>
                            <label class="switch">
                                <input type="checkbox" ${modData.enabled ? 'checked' : ''} onchange="toggleModule('${modKey}', this.checked)">
                                <span class="slider"></span>
                            </label>
                            <button class="btn-outline" style="border-color: var(--boot-accent); color: var(--boot-accent);" onclick="editTime('${modKey}', ${currentTime})">TIME</button>
                        </div>
                    `;
                    container.appendChild(pill);
                });
            });

            db.ref('questions').on('value', snap => {
                const legacyContainer = document.getElementById('legacy-backup-container');
                legacyContainer.innerHTML = "";
                snap.forEach(child => {
                    const div = document.createElement('div');
                    div.style.marginBottom = "15px";
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:10px; font-weight:800; color:var(--primary);">${child.key}</span>
                            <button class="btn-outline" onclick="copyLegacy('${child.key}')">MIGRATE</button>
                        </div>
                        <div class="legacy-box" id="raw-${child.key}">${JSON.stringify(child.val().questions || child.val())}</div>
                    `;
                    legacyContainer.appendChild(div);
                });
            });
        }

        function editTime(key, currentTime) {
            const newTime = prompt(`Set new time limit (seconds) for ${key}:`, currentTime);
            if (newTime !== null && !isNaN(newTime)) {
                db.ref(`subjects/${key}/config`).update({ timeLimit: parseInt(newTime) });
            }
        }

        function copyLegacy(key) {
            const data = document.getElementById(`raw-${key}`).innerText;
            document.getElementById('json-input').value = data;
            document.getElementById('sub-name').value = key;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function uploadData() {
            const name = document.getElementById('sub-name').value.trim().toLowerCase().replace(/\s+/g, '_');
            const json = document.getElementById('json-input').value;
            const time = parseInt(document.getElementById('time-limit').value) || 20;

            if(!name || !json) return alert("Fill all fields!");

            try {
                const questions = JSON.parse(json);
                db.ref(`subjects/${name}`).set({
                    questions: questions,
                    enabled: true,
                    config: { timeLimit: time }
                }).then(() => {
                    alert("Module Deployed!");
                    document.getElementById('json-input').value = "";
                    document.getElementById('sub-name').value = "";
                });
            } catch(e) { alert("Invalid JSON format!"); }
        }

        function toggleModule(key, state) {
            db.ref(`subjects/${key}`).update({ enabled: state });
        }

        function deleteModule(key) {
            if(confirm("Delete this module forever?")) {
                db.ref(`subjects/${key}`).remove();
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
