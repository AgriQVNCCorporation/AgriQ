<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Admin Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b; 
            --boot-accent: #00aaff;
            --bg: #000000;
            --surface: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --success: #00ff88;
            --transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* FOCUSED MODE OVERRIDES */
        body.focus-active { 
            --primary: #00d2ff; 
            --bg: #f0f9ff;
            --surface: #ffffff;
            --card-bg: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); min-height: 100vh; padding-bottom: 100px; transition: background 0.5s, color 0.5s; }

        /* --- ELECTRIC PRELOADER --- */
        #admin-loader {
            position: fixed; inset: 0; background: #000000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #admin-loader.fade-out { opacity: 0; visibility: hidden; }
        .electric-icon { color: var(--boot-accent); animation: electricPulse 1.5s infinite ease-in-out; margin-bottom: 25px; }
        @keyframes electricPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--boot-accent)); opacity: 0.8; }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 25px var(--boot-accent)) brightness(1.5); opacity: 1; }
        }
        .loading-bar-container { width: 140px; height: 2px; background: #111; border-radius: 10px; overflow: hidden; position: relative; }
        .loading-bar-fill { position: absolute; width: 45%; height: 100%; background: var(--boot-accent); box-shadow: 0 0 15px var(--boot-accent); animation: scan 1.5s infinite ease-in-out; }
        @keyframes scan { 0% { left: -45%; } 100% { left: 100%; } }

        /* Custom Alert */
        #custom-alert {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 10001; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card { 
            background: var(--card-bg); border: 1px solid var(--border); width: 100%; max-width: 320px; 
            border-radius: 24px; padding: 24px; text-align: center; transform: scale(0.9); transition: 0.3s;
        }
        #custom-alert.active { display: flex; }
        #custom-alert.active .modal-card { transform: scale(1); }
        .modal-title { font-family: 'JetBrains Mono'; font-size: 10px; letter-spacing: 2px; color: var(--primary); margin-bottom: 12px; font-weight: 800; }
        .modal-msg { font-size: 14px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }

        header { 
            padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--surface); backdrop-filter: blur(20px); z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 900; font-size: 18px; }
        .brand span { color: var(--primary); transition: color 0.5s; }

        main { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 20px; transition: border 0.5s, background 0.5s; }
        h2 { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; transition: color 0.5s; }

        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(120,120,120,0.05); border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        input, textarea { width: 100%; background: rgba(120,120,120,0.05); border: 1px solid var(--border); border-radius: 18px; padding: 16px; color: var(--text-main); outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn-primary { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; }

        .data-pill { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: rgba(120,120,120,0.03); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--border); }
        .pulse-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); height: 70px; border-radius: 35px; display: flex; align-items: center; width: 92%; max-width: 450px; padding: 0 20px; justify-content: space-around; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 800; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div class="modal-card">
            <div class="modal-title" id="m-title">SYSTEM_NOTICE</div>
            <div class="modal-msg" id="m-msg">Action message goes here.</div>
            <div id="m-actions" style="display:flex; gap:10px;">
                <button class="btn-primary" id="m-confirm">CONFIRM</button>
                <button class="btn-outline" style="width:100%" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="admin-loader">
        <div class="electric-icon"><i data-lucide="zap" size="64" stroke-width="3" fill="currentColor"></i></div>
        <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
        <p style="font-size:10px; font-family:'JetBrains Mono'; color:var(--boot-accent); margin-top:15px; letter-spacing:3px;">ADMIN_AUTH_SYNC</p>
    </div>

    <div id="command-center" style="display: none;">
        <header>
            <div class="brand">AGRIQ<span>TERMINAL</span></div>
            <button class="btn-outline" onclick="confirmLogout()">LOGOUT</button>
        </header>

        <main>
            <section id="view-dashboard" class="view-section active">
                <div class="card">
                    <h2><i data-lucide="settings"></i> System Controls</h2>
                    <div class="switch-container">
                        <div>
                            <div style="font-size:13px; font-weight:700;">Focus Mode</div>
                            <div style="font-size:9px; color:var(--text-dim);">Locks app & changes theme</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="focus-toggle" onchange="toggleFocusMode(this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="card" id="editor-card">
                    <h2 id="editor-title"><i data-lucide="upload"></i> Deploy Module</h2>
                    <input type="text" id="sub-name" placeholder="Subject Name">
                    <textarea id="json-input" rows="8" placeholder='[{"question": "...", "options": ["A","B","C","D"], "answer": "A"}]'></textarea>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-primary" onclick="uploadData()" id="push-btn">PUSH TO LIVE</button>
                        <button class="btn-outline" id="cancel-edit" style="display:none;" onclick="resetEditor()">CANCEL</button>
                    </div>
                </div>

                <div class="card">
                    <h2><i data-lucide="layers"></i> Module Management</h2>
                    <div id="module-list"></div>
                </div>
            </section>

            <section id="view-live" class="view-section">
                <div class="card" style="border-color: var(--success); background: rgba(0, 255, 136, 0.03);">
                    <h2><i data-lucide="bar-chart-3"></i> Platform Stats</h2>
                    <div class="data-pill" style="border-style: dashed;">
                        <div style="font-weight: 800; font-size: 14px;">Total Registered Students</div>
                        <div id="reg-count" style="font-family: 'JetBrains Mono'; font-weight: 800; color: var(--success); font-size: 18px;">--</div>
                    </div>
                </div>

                <div class="card">
                    <h2><i data-lucide="activity"></i> Active Students</h2>
                    <div id="live-users-list"></div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchView('dashboard', this)"><i data-lucide="cpu" size="20"></i>CONSOLE</button>
            <button class="nav-item" onclick="switchView('live', this)"><i data-lucide="zap" size="20"></i>LIVE</button>
            <a href="adminlead.html" class="nav-item"><i data-lucide="trophy" size="20"></i>LEADER</a>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- AUTH & FOCUS MODE FETCH ---
        auth.onAuthStateChanged(user => {
            const loader = document.getElementById('admin-loader');
            if (user) {
                document.getElementById('command-center').style.display = 'block';
                
                // Fetch Focus Mode from Admin's Account
                db.ref(`students/${user.uid}`).on('value', snap => {
                    const userData = snap.val() || {};
                    const isFocus = userData.focusedMode !== false;
                    applyTheme(isFocus);
                    document.getElementById('focus-toggle').checked = isFocus;
                });

                initListeners();
            } else {
                window.location.href = "index.html"; 
            }
            setTimeout(() => loader.classList.add('fade-out'), 2000);
            lucide.createIcons();
        });

        function applyTheme(isActive) {
            if(isActive) document.body.classList.add('focus-active');
            else document.body.classList.remove('focus-active');
            lucide.createIcons();
        }

        function toggleFocusMode(isActive) {
            const user = auth.currentUser;
            if(user) {
                db.ref(`students/${user.uid}`).update({ focusedMode: isActive });
                // Also update global setting for students
                db.ref('settings/global').update({ focus_mode: isActive });
            }
        }

        function initListeners() {
            // Updated registration count logic (students branch)
            db.ref('students').on('value', snap => {
                document.getElementById('reg-count').innerText = snap.numChildren();
            });

            db.ref('questions').on('value', snap => {
                const container = document.getElementById('module-list');
                container.innerHTML = "";
                snap.forEach(child => {
                    const mod = child.val();
                    const div = document.createElement('div');
                    div.className = "data-pill";
                    div.innerHTML = `
                        <div>
                            <div style="font-weight:800; font-size:12px;">${child.key.toUpperCase()}</div>
                            <div style="font-size:9px; color:var(--text-dim); margin-top:2px;">
                                <span style="color:${mod.enabled ? 'var(--success)' : '#ff3b3b'}">${mod.enabled ? 'ONLINE' : 'OFFLINE'}</span>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button class="btn-outline" onclick="loadModuleForEdit('${child.key}')">EDIT</button>
                            <label class="switch">
                                <input type="checkbox" ${mod.enabled ? 'checked' : ''} onchange="db.ref('questions/${child.key}').update({enabled:this.checked})">
                                <span class="slider"></span>
                            </label>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });

            db.ref('live_users').on('value', snap => {
                const list = document.getElementById('live-users-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    const div = document.createElement('div');
                    div.className = "data-pill";
                    div.innerHTML = `
                        <div><div style="font-size:12px; font-weight:800;"><span class="pulse-dot"></span>${u.name}</div><div style="font-size:9px;">${u.subject || 'Browsing'}</div></div>
                        <div style="font-weight:800; color:var(--primary); font-size:10px;">${new Date(u.lastActive).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
                    list.appendChild(div);
                });
            });
        }

        // Standard helpers
        function showModal(title, msg, onConfirm, isAlertOnly = false) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-msg').innerText = msg;
            const confirmBtn = document.getElementById('m-confirm');
            confirmBtn.onclick = () => { onConfirm(); closeModal(); };
            document.getElementById('custom-alert').classList.add('active');
        }
        function closeModal() { document.getElementById('custom-alert').classList.remove('active'); }
        function confirmLogout() { showModal("LOGOUT_SEQUENCE", "Terminate session?", () => auth.signOut().then(() => location.reload())); }
        function switchView(view, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            btn.classList.add('active');
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
