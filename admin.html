<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --border: #222;
            --accent: #ff0000;
            --accent-soft: rgba(255, 0, 0, 0.1);
            --text-main: #ffffff;
            --text-dim: #888;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.5;
            padding-bottom: calc(80px + var(--safe-bottom)); /* Space for bottom nav */
        }

        /* --- LOADER --- */
        #system-loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #system-loader.hidden { opacity: 0; visibility: hidden; }
        .scanner {
            width: 32px; height: 32px; border: 2px solid #111; border-top: 2px solid var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- AUTH SCREEN --- */
        #admin-gate {
            position: fixed; inset: 0; background: #000; z-index: 9000;
            display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .gate-card {
            width: 100%; max-width: 360px;
            padding: 32px; border: 1px solid var(--border); border-radius: 28px;
            background: var(--surface);
        }

        /* --- INPUTS --- */
        input, textarea {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 14px; padding: 14px; color: #fff; outline: none;
            font-size: 15px; margin-bottom: 12px; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }
        textarea { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

        /* --- HEADER --- */
        header { 
            padding: 24px 20px 10px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); z-index: 100;
        }
        .brand { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .brand span { color: var(--accent); }

        /* --- GRID/LAYOUT --- */
        #command-center { display: none; max-width: 600px; margin: 0 auto; padding: 0 16px; }
        .card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 20px;
        }
        h2 { 
            font-size: 12px; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--text-dim); margin-bottom: 16px; 
            display: flex; align-items: center; gap: 8px;
        }

        /* --- MODULE ITEMS --- */
        .module-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid #1a1a1a;
        }
        .module-item:last-child { border: none; }

        /* --- MOBILE BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            height: 64px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-dim); text-decoration: none; font-size: 10px;
            font-weight: 600; gap: 4px; border: none; background: none; transition: 0.2s;
        }
        .nav-item.active { color: var(--accent); }

        /* --- TABLE --- */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: var(--text-dim); padding: 12px 0; }
        td { padding: 14px 0; font-size: 14px; border-bottom: 1px solid #1a1a1a; }
        .rank { font-weight: 800; color: var(--accent); width: 40px; }

        /* --- BUTTONS --- */
        .btn-primary { 
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--accent); color: #fff; font-weight: 700;
            font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-kill {
            background: var(--accent-soft); color: var(--accent);
            border: 1px solid var(--accent); padding: 6px 12px; border-radius: 10px;
            font-size: 11px; font-weight: 700;
        }

        .view-section { display: none; animation: slideUp 0.3s ease-out; }
        .view-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODAL --- */
        #custom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 10001; display: none; align-items: flex-end; }
        .alert-modal { 
            background: var(--surface); width: 100%; border-radius: 32px 32px 0 0; 
            padding: 32px 24px calc(32px + var(--safe-bottom)); border-top: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <div id="system-loader">
        <div class="scanner"></div>
    </div>

    <div id="admin-gate">
        <div class="gate-card" id="gate-card">
            <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">AgriQ<span> PRO</span></h1>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 24px;">Terminal Authentication</p>
            <input type="email" id="admin-email" placeholder="Admin Email">
            <input type="password" id="admin-pass" placeholder="Access Key">
            <button id="login-btn" class="btn-primary" onclick="tryLogin()">Login to Command</button>
            <p id="gate-error" style="color: var(--accent); font-size: 12px; margin-top: 16px; text-align: center;"></p>
        </div>
    </div>

    <div id="command-center">
        <header>
            <div class="brand">AgriQ<span>Pro</span></div>
            <button class="btn-kill" onclick="logout()">Logout</button>
        </header>

        <div id="view-dashboard" class="view-section active">
            <div class="card">
                <h2><i data-lucide="plus-circle" size="14"></i> Add New Module</h2>
                <input type="text" id="sub-name" placeholder="Module Title">
                <textarea id="json-input" rows="6" placeholder="Paste JSON Nodes..."></textarea>
                <button class="btn-primary" onclick="uploadData()">Push Data</button>
                <p id="status" style="font-size: 12px; text-align: center; margin-top: 12px; color: var(--accent);"></p>
            </div>

            <div class="card">
                <h2><i data-lucide="layers" size="14"></i> Active Modules</h2>
                <div id="module-list"></div>
            </div>
        </div>

        <div id="view-leaderboard" class="view-section">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2><i data-lucide="trending-up" size="14"></i> Performance</h2>
                    <span onclick="purgeLeaderboard()" style="color:var(--accent); font-size: 11px; font-weight: 700;">WIPE ALL</span>
                </div>
                <table>
                    <thead>
                        <tr><th>#</th><th>PLAYER</th><th>SCORE</th><th></th></tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" id="btn-dash" onclick="switchView('dashboard')">
                <i data-lucide="terminal" size="20"></i>
                Terminal
            </button>
            <button class="nav-item" id="btn-lead" onclick="switchView('leaderboard')">
                <i data-lucide="award" size="20"></i>
                Rankings
            </button>
        </nav>
    </div>

    <div id="custom-overlay">
        <div class="alert-modal">
            <h3 id="alert-title" style="margin-top:0">System Override</h3>
            <p id="alert-msg" style="color: var(--text-dim); margin-bottom: 24px;">Are you sure you want to proceed?</p>
            <div style="display: flex; gap: 12px;">
                <button class="btn-primary" id="alert-ok" style="flex:2">Confirm Action</button>
                <button class="btn-primary" id="alert-cancel" style="flex:1; background: #222;">Abort</button>
            </div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
        authDomain: "agri-mcar.firebaseapp.com",
        databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
        projectId: "agri-mcar",
        storageBucket: "agri-mcar.firebasestorage.app",
        messagingSenderId: "823436752104",
        appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    function switchView(view) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        
        if(view === 'dashboard') {
            document.getElementById('view-dashboard').classList.add('active');
            document.getElementById('btn-dash').classList.add('active');
        } else {
            document.getElementById('view-leaderboard').classList.add('active');
            document.getElementById('btn-lead').classList.add('active');
        }
        window.scrollTo(0,0);
    }

    auth.onAuthStateChanged(user => {
        const loader = document.getElementById('system-loader');
        if (user) {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('command-center').style.display = 'block';
            loadData();
        } else {
            document.getElementById('admin-gate').style.display = 'flex';
            document.getElementById('command-center').style.display = 'none';
        }
        setTimeout(() => {
            loader.classList.add('hidden');
            lucide.createIcons();
        }, 1000);
    });

    async function tryLogin() {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-pass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            document.getElementById('gate-error').innerText = "Access Denied";
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function loadData() {
        db.ref('questions').on('value', snap => {
            const container = document.getElementById('module-list');
            container.innerHTML = "";
            snap.forEach(child => {
                const div = document.createElement('div');
                div.className = "module-item";
                div.innerHTML = `<span style="font-weight:600">${child.key}</span>
                                 <button class="btn-kill" style="padding:4px 8px" onclick="purgeModule('${child.key}')">Wipe</button>`;
                container.appendChild(div);
            });
        });

        db.ref('leaderboard').on('value', snap => {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = "";
            let data = [];
            snap.forEach(c => { data.push({id: c.key, ...c.val()}) });
            data.sort((a,b) => b.score - a.score).forEach((p, i) => {
                tbody.innerHTML += `<tr>
                    <td class="rank">#${i+1}</td>
                    <td><div style="font-weight:700">${p.name}</div></td>
                    <td>${p.score}%</td>
                    <td style="text-align:right"><i data-lucide="trash-2" size="14" style="color:#444" onclick="kickUser('${p.id}')"></i></td>
                </tr>`;
            });
            lucide.createIcons();
        });
    }

    function uploadData() {
        const name = document.getElementById('sub-name').value;
        const json = document.getElementById('json-input').value;
        if(!name || !json) return;
        try {
            db.ref('questions/' + name).set(JSON.parse(json)).then(() => {
                document.getElementById('status').innerText = "DEPLOYED SUCCESSFULLY";
                document.getElementById('json-input').value = "";
                document.getElementById('sub-name').value = "";
                setTimeout(() => document.getElementById('status').innerText = "", 2000);
            });
        } catch(e) { alert("Format Error: Ensure JSON is valid."); }
    }

    function agriPopup(title, msg, onConfirm) {
        const overlay = document.getElementById('custom-overlay');
        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-msg').innerText = msg;
        overlay.style.display = 'flex';
        document.getElementById('alert-ok').onclick = () => { overlay.style.display = 'none'; onConfirm(); };
        document.getElementById('alert-cancel').onclick = () => { overlay.style.display = 'none'; };
    }

    function purgeModule(name) { agriPopup("Delete Module", `This will erase all questions in ${name}.`, () => db.ref('questions/' + name).remove()); }
    function kickUser(id) { agriPopup("Remove Entry", "Remove this score from rankings?", () => db.ref('leaderboard/' + id).remove()); }
    function purgeLeaderboard() { agriPopup("Full Format", "This will clear the entire leaderboard.", () => db.ref('leaderboard').remove()); }

    window.onload = () => lucide.createIcons();
</script>
</body>
</html>
