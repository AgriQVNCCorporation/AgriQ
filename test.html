<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AgriQ Pro | Active Terminal Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b;
            --primary-glow: rgba(255, 59, 59, 0.4);
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --danger: #ff3b3b;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.elite-mode {
            --primary: #ffcc00;
            --primary-glow: rgba(255, 204, 0, 0.6);
            --bg: #050500;
            --surface: #0f0e0a;
            --text-main: #fffdf0;
            --border: #443300;
        }

        body.focused-mode {
            --primary: #00aaff;
            --primary-glow: rgba(0, 170, 255, 0.3);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            transition: 0.5s ease; 
        }

        #app-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .loader-status { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--surface); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000;
        }

        .timer-badge { 
            background: var(--glass); color: var(--primary); padding: 8px 16px; 
            border-radius: 12px; border: 1px solid var(--border); 
            font-family: 'JetBrains Mono'; font-weight: 800; font-size: 14px;
        }

        .profile-container { position: relative; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        
        #user-initial {
            width: 40px; height: 40px; background: var(--surface); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--primary); font-size: 16px;
            background-size: cover; background-position: center;
            position: relative; z-index: 2; border: 2px solid var(--bg);
        }

        .conqueror-frame {
            position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fcf6ba 75%, #aa771c 100%);
            background-size: 400% 400%; animation: goldShine 3s linear infinite; z-index: 1;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .normal-frame { position: absolute; inset: 2px; border-radius: 12px; border: 1.5px solid var(--border); z-index: 1; }

        .conqueror-crown {
            position: absolute; top: -10px; right: -4px; z-index: 10;
            filter: drop-shadow(0 0 3px rgba(255, 204, 0, 0.8));
            color: #ffcc00; transform: rotate(15deg);
        }

        @keyframes goldShine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .name-wrapper { display: flex; flex-direction: column; }
        .edit-name-btn { cursor: pointer; color: var(--text-dim); transition: 0.2s; margin-left: 5px; }
        .edit-name-btn:hover { color: var(--primary); }

        main { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; padding-bottom: 180px; }

        .marker-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 20px 0; scrollbar-width: none; }
        .marker-scroll::-webkit-scrollbar { display: none; }
        
        .q-pill { 
            min-width: 45px; height: 45px; border-radius: 12px; background: var(--surface); border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-dim); flex-shrink: 0;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .q-pill.active { border-color: var(--primary); background: var(--primary-glow); color: var(--primary); }
        .q-pill.done { border-color: var(--success); color: var(--success); }

        .q-card { background: var(--surface); border-radius: 28px; padding: 26px; border: 1px solid var(--border); margin-bottom: 20px; }
        .opt-box { 
            background: var(--glass); border: 1.5px solid var(--border); padding: 18px; 
            border-radius: 20px; margin-bottom: 12px; font-weight: 700; cursor: pointer; color: var(--text-main);
            transition: 0.2s; font-size: 14px; line-height: 1.4;
        }
        .opt-box.selected { border-color: var(--primary); background: var(--primary); color: #fff; }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 460px; padding: 18px; background: var(--surface);
            backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1001;
        }

        .btn-row { display: flex; gap: 10px; }
        .btn-primary { flex: 1; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sec { flex: 1; padding: 16px; border-radius: 18px; background: var(--glass); color: var(--text-main); border: 1px solid var(--border); font-weight: 800; cursor: pointer; }

        #custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 24px; backdrop-filter: blur(10px); }
        .modal-content { background: var(--surface); border: 2px solid var(--border); width: 100%; max-width: 350px; border-radius: 28px; padding: 30px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-loader">
        <div id="loader-icon" style="color:var(--primary);"><i data-lucide="zap" size="64" fill="currentColor"></i></div>
        <p class="loader-status">Initializing Terminal...</p>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <div id="modal-title" style="font-weight:900; margin-bottom:10px;">ALERT</div>
            <div id="modal-text" style="font-size:13px; color:var(--text-dim); margin-bottom:20px;">Text here.</div>
            <div class="modal-actions" style="display:flex; gap:10px;">
                <button class="btn-sec" id="modal-cancel-btn">CANCEL</button>
                <button class="btn-primary" id="modal-confirm-btn">CONFIRM</button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div class="profile-container" id="profile-container">
                <div id="rank-frame" class="normal-frame"></div>
                <div id="user-initial">U</div>
            </div>
            <div class="name-wrapper">
                <div id="student-tag" style="font-weight: 900; font-size: 10px; letter-spacing: 1px; font-family: 'JetBrains Mono'; color: var(--primary);">TERMINAL ACTIVE</div>
                <div style="display:flex; align-items:center;">
                    <span id="user-display-name" style="font-weight:800; font-size:14px;">STUDENT</span>
                    <i data-lucide="edit-3" id="name-edit-icon" size="12" class="edit-name-btn hidden" onclick="editProfileName()"></i>
                </div>
            </div>
        </div>
        <div id="q-timer" class="timer-badge">00:00</div>
    </header>

    <main>
        <div id="marker-grid" class="marker-scroll"></div>
        <div class="q-card">
            <div id="q-display" style="font-size: 17px; font-weight: 700; line-height: 1.6;">Synchronizing...</div>
        </div>
        <div id="opts-display"></div>
    </main>

    <div class="controls">
        <div class="btn-row">
            <button class="btn-sec" onclick="changeQ(-1)">PREVIOUS</button>
            <button class="btn-primary" onclick="changeQ(1)">NEXT <i data-lucide="chevron-right" size="18"></i></button>
        </div>
        <button class="btn-primary" style="background:var(--danger); box-shadow: 0 4px 15px var(--primary-glow);" onclick="submitTest()">
            SUBMIT TEST <i data-lucide="check-circle" size="18"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let questions = [], currentIdx = 0, userChoices = {}, timer;
        let totalSecondsRemaining = 7200; 
        const moduleKey = new URLSearchParams(window.location.search).get('mod');
        let isSubmitting = false;

        function showModal(title, text, type = 'confirm', onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            modal.style.display = 'flex';
            const cb = document.getElementById('modal-cancel-btn');
            if(type === 'alert') cb.classList.add('hidden'); else cb.classList.remove('hidden');
            document.getElementById('modal-confirm-btn').onclick = () => { modal.style.display = 'none'; if(onConfirm) onConfirm(); };
            cb.onclick = () => modal.style.display = 'none';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        auth.onAuthStateChanged(async user => {
            if (!user) return window.location.href = 'index.html';
            
            db.ref(`students/${user.uid}`).on('value', snap => {
                const userData = snap.val();
                if (userData) {
                    document.getElementById('user-display-name').innerText = userData.name.toUpperCase();
                    
                    const editIcon = document.getElementById('name-edit-icon');
                    if (userData.nameEdited) editIcon.classList.add('hidden');
                    else editIcon.classList.remove('hidden');

                    const initialBox = document.getElementById('user-initial');
                    if (userData.profilePic) {
                        initialBox.style.backgroundImage = `url(${userData.profilePic})`;
                        initialBox.innerText = "";
                    } else {
                        initialBox.style.backgroundImage = "none";
                        initialBox.innerText = userData.name[0];
                    }

                    db.ref('leaderboard').once('value', lbSnap => {
                        const aggregated = {};
                        lbSnap.forEach(c => {
                            const e = c.val();
                            if(!aggregated[e.uid]) aggregated[e.uid] = 0;
                            aggregated[e.uid] += (parseInt(e.score) || 0);
                        });
                        const lbArr = Object.entries(aggregated).sort((a,b) => b[1]-a[1]);
                        const myRank = lbArr.findIndex(x => x[0] === user.uid) + 1;

                        const rankFrame = document.getElementById('rank-frame');
                        const profContainer = document.getElementById('profile-container');
                        const existingCrown = document.getElementById('frame-crown');
                        if(existingCrown) existingCrown.remove();

                        if (myRank > 0 && myRank <= 3) {
                            document.body.classList.add('elite-mode');
                            rankFrame.className = 'conqueror-frame';
                            const crown = document.createElement('div');
                            crown.id = 'frame-crown';
                            crown.innerHTML = `<i data-lucide="crown" size="14" class="conqueror-crown"></i>`;
                            profContainer.appendChild(crown);
                        } else {
                            rankFrame.className = 'normal-frame';
                            if(userData.focusedMode) document.body.classList.add('focused-mode');
                        }
                        lucide.createIcons();
                    });
                }
            });
            loadQuestions();
        });

        function editProfileName() {
            showModal("PERMANENT IDENTITY", "You can only update your terminal name ONCE. Confirm?", "confirm", () => {
                const currentName = document.getElementById('user-display-name').innerText;
                const newName = prompt("Enter Final Terminal Name:", currentName);
                if (newName && newName.trim() !== "" && newName.toUpperCase() !== currentName) {
                    db.ref(`students/${auth.currentUser.uid}`).update({ 
                        name: newName.toUpperCase().trim(),
                        nameEdited: true 
                    });
                }
            });
        }

        async function loadQuestions() {
            try {
                const snap = await db.ref(`subjects/${moduleKey}/questions`).once('value');
                const val = snap.val();
                const dataToUse = (val && val.data) ? val.data : (await db.ref(`questions/${moduleKey}/data`).once('value')).val();
                
                if(!dataToUse) {
                    showModal("TERMINAL ERROR", "No data found.", "alert", () => window.location.href = 'index.html');
                    return;
                }
                setupQuestions(dataToUse);
            } catch (e) { showModal("SYNC ERROR", "Connection failed.", "alert"); }
        }

        function setupQuestions(dataObj) {
            let rawQuestions = Object.values(dataObj).filter(q => q && (q.question || q.q));
            rawQuestions = shuffleArray(rawQuestions);
            questions = rawQuestions.map(q => {
                let options = q.options || [q.A, q.B, q.C, q.D].filter(Boolean);
                return { ...q, shuffledOpts: shuffleArray([...options]), actualCorrect: q.answer || q.ans };
            });
            initUI();
            setTimeout(() => { document.getElementById('app-loader').classList.add('fade-out'); startGlobalTimer(); }, 1200);
        }

        function initUI() {
            const grid = document.getElementById('marker-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const p = document.createElement('div');
                p.className = 'q-pill';
                p.id = `mark-${i}`;
                p.innerText = i + 1;
                p.onclick = () => { currentIdx = i; showQ(); };
                grid.appendChild(p);
            });
            showQ();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('q-display').innerText = q.question || q.q;
            document.querySelectorAll('.q-pill').forEach((p, i) => {
                p.classList.remove('active');
                if (i === currentIdx) p.classList.add('active');
                p.classList.toggle('done', !!userChoices[i]);
            });
            const optBox = document.getElementById('opts-display');
            optBox.innerHTML = '';
            q.shuffledOpts.forEach(opt => {
                const div = document.createElement('div');
                div.className = `opt-box ${userChoices[currentIdx] === opt ? 'selected' : ''}`;
                div.innerText = opt;
                div.onclick = () => { userChoices[currentIdx] = (userChoices[currentIdx] === opt) ? null : opt; showQ(); };
                optBox.appendChild(div);
            });
            const activeMark = document.getElementById(`mark-${currentIdx}`);
            if(activeMark) activeMark.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function startGlobalTimer() {
            timer = setInterval(() => {
                if (totalSecondsRemaining <= 0) { clearInterval(timer); processFinalResults(); }
                else { 
                    totalSecondsRemaining--; 
                    let m = Math.floor(totalSecondsRemaining/60).toString().padStart(2,'0');
                    let s = (totalSecondsRemaining%60).toString().padStart(2,'0');
                    document.getElementById('q-timer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function changeQ(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) { currentIdx = next; showQ(); }
        }

        function submitTest() { showModal("SUBMISSION", "Finalize responses?", "confirm", processFinalResults); }

        async function processFinalResults() {
            if(isSubmitting) return;
            isSubmitting = true;
            clearInterval(timer);
            let score = 0;
            const now = Date.now(); // Numerical timestamp for cooldown check
            
            const details = questions.map((q, i) => {
                const userAns = userChoices[i] || "SKIPPED";
                const isCorrect = userAns === q.actualCorrect;
                if(isCorrect) score++;
                return { question: q.question || q.q, user: userAns, actual: q.actualCorrect };
            });

            const resultData = { 
                uid: auth.currentUser.uid,
                score, 
                total: questions.length, 
                accuracy: Math.round((score / questions.length) * 100),
                module: moduleKey || 'General', 
                timestamp: now,
                date: new Date().toISOString()
            };

            // Push to Firebase Leaderboard
            await db.ref('leaderboard').push(resultData);

            // Save locally for analysis
            localStorage.setItem('agriq_last_result', JSON.stringify({ ...resultData, details }));
            
            if(auth.currentUser) await db.ref(`live_sessions/${auth.currentUser.uid}`).remove();
            window.location.href = 'analysis.html';
        }
    </script>
</body>
</html>
