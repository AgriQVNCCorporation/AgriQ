<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Active Terminal Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b; 
            --primary-glow: rgba(255, 59, 59, 0.4); 
            --bg: #000000;
            --surface: #0a0a0a; 
            --text-main: #ffffff; 
            --text-dim: #a1a1aa;
            --border: #222222; 
            --danger: #ff3b3b; 
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.03); 
            --transition: 0.5s ease;
            --btn-text: #ffffff;
        }

        /* ELITE (GOLDEN) MODE */
        body.elite-mode:not(.focused-mode) {
            --primary: #ffcc00;
            --primary-glow: rgba(255, 204, 0, 0.6);
            --bg: #050500;
            --surface: #0f0e0a;
            --text-main: #fffdf0;
            --border: #443300;
            --btn-text: #000000;
        }

        /* FOCUSED (SKY BLUE) MODE - Overrides Elite */
        body.focused-mode {
            --primary: #00aaff; 
            --primary-glow: rgba(0, 170, 255, 0.3); 
            --bg: #f0f9ff;
            --surface: #ffffff; 
            --text-main: #001a2c; 
            --text-dim: #64748b;
            --border: #e2e8f0; 
            --glass: rgba(0, 170, 255, 0.05);
            --btn-text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            transition: var(--transition); 
            overflow-x: hidden; 
        }

        /* Gold Animation for Elite Mode */
        @keyframes goldGlow { 
            from { box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); } 
            to { box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); } 
        }
        body.elite-mode:not(.focused-mode) .q-card { 
            border: 2px solid #ffcc00; 
            animation: goldGlow 3s infinite alternate; 
        }

        #custom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .alert-modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 350px; padding: 30px; text-align: center; opacity: 0; transform: scale(0.9);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .alert-modal.active { opacity: 1; transform: scale(1); border-color: var(--primary); }

        #app-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s;
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--surface); display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .timer-badge { background: var(--glass); color: var(--primary); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border); font-family: 'JetBrains Mono'; font-weight: 800; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 160px; }

        .marker-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .q-pill { 
            min-width: 45px; height: 45px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-dim); flex-shrink: 0;
            transition: 0.3s;
        }
        .q-pill.active { border-color: var(--primary); background: var(--primary); color: var(--btn-text); }
        .q-pill.done { border-color: var(--success); background: var(--success); color: #fff; }

        .q-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        .opt-box { 
            background: var(--glass); border: 1px solid var(--border); padding: 18px; 
            border-radius: 18px; margin-bottom: 10px; font-weight: 700; cursor: pointer; color: var(--text-main);
            transition: 0.2s;
        }
        .opt-box.selected { border-color: var(--primary); background: var(--primary-glow); }
        body.elite-mode:not(.focused-mode) .opt-box.selected { color: #ffcc00; }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 460px; padding: 15px; background: var(--surface);
            backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px;
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
        }
        .btn-primary { flex: 1; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: var(--btn-text); font-weight: 900; cursor: pointer; }
        .btn-sec { flex: 1; padding: 16px; border-radius: 18px; background: var(--glass); color: var(--text-main); border: 1px solid var(--border); font-weight: 800; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="custom-overlay">
        <div class="alert-modal" id="alert-modal">
            <h3 id="alert-title"></h3>
            <p id="alert-msg" style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn-sec" id="alert-cancel">CANCEL</button>
                <button class="btn-primary" id="alert-ok">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="app-loader">
        <i data-lucide="zap" size="48" color="#ff3b3b" id="loader-icon"></i>
        <p style="color: #ff3b3b; font-family: 'JetBrains Mono'; margin-top: 15px; font-weight: 800;" id="loader-text">INITIALIZING TERMINAL...</p>
    </div>

    <header>
        <div id="student-tag" style="font-weight: 900; font-size: 11px; letter-spacing: 1px;">ID: LOADING</div>
        <div id="q-timer" class="timer-badge">00:00</div>
    </header>

    <main>
        <div id="marker-grid" class="marker-scroll"></div>
        <div id="q-card" class="q-card">
            <div id="q-display" style="font-size: 18px; font-weight: 700; line-height: 1.6;">Loading Protocol...</div>
        </div>
        <div id="opts-display"></div>
    </main>

    <div class="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn-sec" onclick="changeQ(-1)">PREV</button>
            <button class="btn-primary" onclick="changeQ(1)">NEXT</button>
        </div>
        <button class="btn-primary" style="background:var(--danger); color: #fff;" onclick="submitTest()">FINALIZE EXAM 🏁</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let questions = [], currentIdx = 0, userChoices = {}, timer;
        let totalSecondsRemaining = 7200; 
        const moduleKey = new URLSearchParams(window.location.search).get('mod');

        function agriPopup(title, msg, onConfirm, isConfirm = false) {
            const overlay = document.getElementById('custom-overlay');
            const modal = document.getElementById('alert-modal');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            overlay.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            document.getElementById('alert-cancel').style.display = isConfirm ? 'block' : 'none';
            document.getElementById('alert-ok').onclick = () => {
                overlay.style.display = 'none';
                if(onConfirm) onConfirm();
            };
            document.getElementById('alert-cancel').onclick = () => overlay.style.display = 'none';
        }

        auth.onAuthStateChanged(async user => {
            if (!user) return window.location.href = 'index.html';
            
            const profileSnap = await db.ref(`students/${user.uid}`).once('value');
            const userData = profileSnap.val();
            
            if (userData) {
                document.getElementById('student-tag').innerText = `ID: ${userData.name.toUpperCase()}`;
                
                if (userData.focusedMode) {
                    document.body.classList.add('focused-mode');
                    document.getElementById('loader-icon').setAttribute('color', '#00aaff');
                    document.getElementById('loader-text').style.color = '#00aaff';
                } else {
                    await checkEliteStatus(user.uid);
                }
            }

            loadQuestions();
        });

        async function checkEliteStatus(uid) {
            const lbSnap = await db.ref('leaderboard').once('value');
            const scores = {};
            lbSnap.forEach(child => {
                const data = child.val();
                scores[data.uid] = (scores[data.uid] || 0) + (parseInt(data.score) || 0);
            });

            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const rank = sorted.findIndex(x => x[0] === uid) + 1;

            if (rank > 0 && rank <= 3) {
                document.body.classList.add('elite-mode');
                document.getElementById('loader-icon').setAttribute('color', '#ffcc00');
                document.getElementById('loader-text').style.color = '#ffcc00';
                document.getElementById('loader-text').innerText = "ELITE TERMINAL SYNCING...";
            }
        }

        async function loadQuestions() {
            const snap = await db.ref(`subjects/${moduleKey}/questions`).once('value');
            const val = snap.val();

            if (!val || !val.data) return agriPopup("Error", "Question database is empty.");

            if (val.config?.timeLimit) totalSecondsRemaining = parseInt(val.config.timeLimit) * 60;

            questions = Object.values(val.data).filter(q => q && (q.question || q.q)).map(q => {
                let options = q.options || [q.A, q.B, q.C, q.D].filter(Boolean);
                return { 
                    ...q, 
                    shuffledOpts: [...options].sort(() => Math.random() - 0.5), 
                    actualCorrect: q.answer || q.ans 
                };
            });

            initUI();
            setTimeout(() => {
                document.getElementById('app-loader').classList.add('fade-out');
                startGlobalTimer();
            }, 1500);
        }

        function initUI() {
            const grid = document.getElementById('marker-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const p = document.createElement('div');
                p.className = 'q-pill';
                p.id = `mark-${i}`;
                p.innerText = i + 1;
                p.onclick = () => { currentIdx = i; showQ(); };
                grid.appendChild(p);
            });
            showQ();
            lucide.createIcons();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('q-display').innerText = q.question || q.q;
            
            document.querySelectorAll('.q-pill').forEach((p, i) => {
                p.classList.remove('active');
                if (i === currentIdx) p.classList.add('active');
                if (userChoices[i]) p.classList.add('done');
                else p.classList.remove('done'); // Ensure visual reset if deselected
            });

            const optBox = document.getElementById('opts-display');
            optBox.innerHTML = '';
            q.shuffledOpts.forEach(opt => {
                const div = document.createElement('div');
                div.className = `opt-box ${userChoices[currentIdx] === opt ? 'selected' : ''}`;
                div.innerText = opt;
                div.onclick = () => { 
                    // Toggle logic: If already selected, remove choice. Else, set choice.
                    if (userChoices[currentIdx] === opt) {
                        delete userChoices[currentIdx];
                    } else {
                        userChoices[currentIdx] = opt;
                    }
                    showQ(); 
                };
                optBox.appendChild(div);
            });
            
            const activeMark = document.getElementById(`mark-${currentIdx}`);
            if(activeMark) activeMark.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function startGlobalTimer() {
            timer = setInterval(() => {
                if (totalSecondsRemaining <= 0) { 
                    clearInterval(timer); 
                    agriPopup("Time Up", "Session timeout. Submitting results...", processFinalResults);
                } else { 
                    totalSecondsRemaining--; 
                    let m = Math.floor(totalSecondsRemaining/60).toString().padStart(2,'0');
                    let s = (totalSecondsRemaining%60).toString().padStart(2,'0');
                    document.getElementById('q-timer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function changeQ(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) { currentIdx = next; showQ(); }
        }

        function submitTest() {
            const answered = Object.keys(userChoices).length;
            agriPopup("SUBMIT EXAM", `You answered ${answered}/${questions.length} questions. Finalize session?`, processFinalResults, true);
        }

        function processFinalResults() {
            clearInterval(timer);
            let score = 0;
            questions.forEach((q, i) => { if(userChoices[i] === q.actualCorrect) score++; });
            localStorage.setItem('agriq_last_result', JSON.stringify({ 
                score, 
                total: questions.length,
                module: moduleKey
            }));
            window.location.href = 'analysis.html';
        }
    </script>
</body>
</html>
