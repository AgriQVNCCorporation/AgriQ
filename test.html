<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgriQ Pro | Active Terminal Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b;
            --primary-glow: rgba(255, 59, 59, 0.4);
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --danger: #ff3b3b;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.focused-mode {
            --primary: #00aaff;
            --primary-glow: rgba(0, 170, 255, 0.3);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --glass: rgba(0, 170, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); margin: 0; color: var(--text-main); min-height: 100vh; transition: background-color var(--transition); overflow-x: hidden; }

        #custom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .alert-modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 350px; padding: 30px; text-align: center;
            transform: scale(0.9); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .alert-modal.active { transform: scale(1); opacity: 1; border-color: var(--primary); }

        #app-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s;
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; }
        .electric-icon { color: var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; background: var(--surface);
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .timer-badge { background: var(--glass); color: var(--primary); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border); font-family: 'JetBrains Mono'; font-weight: 800; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 180px; }

        .marker-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .q-pill { 
            min-width: 45px; height: 45px; border-radius: 12px; background: var(--surface); border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-dim); flex-shrink: 0;
            cursor: pointer;
        }
        .q-pill.active { border-color: var(--primary); background: var(--primary); color: #fff; }
        .q-pill.done { border-color: var(--success); background: var(--success); color: #fff; }

        .q-card { background: var(--surface); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        .opt-box { 
            background: var(--glass); border: 1.5px solid var(--border); padding: 18px; 
            border-radius: 18px; margin-bottom: 10px; font-weight: 700; cursor: pointer; color: var(--text-main);
            transition: 0.2s;
        }
        .opt-box.selected { border-color: var(--primary); background: var(--primary-glow); }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 460px; padding: 15px; background: var(--surface);
            backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px;
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .btn-primary { flex: 1; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; }
        .btn-sec { flex: 1; padding: 16px; border-radius: 18px; background: var(--glass); color: var(--text-main); border: 1px solid var(--border); font-weight: 800; }
    </style>
</head>
<body>

    <div id="custom-overlay">
        <div class="alert-modal" id="alert-modal">
            <h3 id="alert-title">Attention</h3>
            <p id="alert-msg" style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn-sec" id="alert-cancel">ABORT</button>
                <button class="btn-primary" id="alert-ok">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="app-loader">
        <div class="electric-icon"><i data-lucide="zap" size="48"></i></div>
        <p style="color: var(--primary); font-family: 'JetBrains Mono'; margin-top: 15px; font-weight: 800;">RANDOMIZING PROTOCOLS...</p>
    </div>

    <header>
        <div id="student-tag" style="font-weight: 900; font-size: 11px; letter-spacing: 1px;">ID: LOADING</div>
        <div id="q-timer" class="timer-badge">00:00</div>
    </header>

    <main>
        <div id="marker-grid" class="marker-scroll"></div>
        <div class="q-card">
            <div id="q-display" style="font-size: 18px; font-weight: 700; line-height: 1.6;">Loading Terminal...</div>
        </div>
        <div id="opts-display"></div>
    </main>

    <div class="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn-sec" onclick="changeQ(-1)">PREV</button>
            <button class="btn-primary" onclick="changeQ(1)">NEXT</button>
        </div>
        <button class="btn-primary" style="background:var(--danger);" onclick="submitTest()">FINALIZE EXAM 🏁</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let questions = [], currentIdx = 0, userChoices = {}, timer;
        let totalSecondsRemaining = 7200; 
        const moduleKey = new URLSearchParams(window.location.search).get('mod');
        let isSubmitting = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function agriPopup(title, msg, onConfirm, isConfirm = false) {
            const overlay = document.getElementById('custom-overlay');
            const modal = document.getElementById('alert-modal');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            overlay.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            document.getElementById('alert-cancel').style.display = isConfirm ? 'block' : 'none';
            document.getElementById('alert-ok').onclick = () => {
                overlay.style.display = 'none';
                modal.classList.remove('active');
                if(onConfirm) onConfirm();
            };
            document.getElementById('alert-cancel').onclick = () => {
                overlay.style.display = 'none';
                modal.classList.remove('active');
            };
        }

        auth.onAuthStateChanged(async user => {
            if (!user) return window.location.href = 'index.html';
            const profileSnap = await db.ref(`students/${user.uid}`).once('value');
            const userData = profileSnap.val();
            if (userData) {
                document.getElementById('student-tag').innerText = `ID: ${userData.name.toUpperCase()}`;
                if (userData.focusedMode) document.body.classList.add('focused-mode');
            }
            loadQuestions();
        });

        async function loadQuestions() {
            const snap = await db.ref(`subjects/${moduleKey}/questions`).once('value');
            const val = snap.val();
            if (!val || !val.data) {
                const fallbackSnap = await db.ref(`questions/${moduleKey}/data`).once('value');
                const fallbackVal = fallbackSnap.val();
                if(!fallbackVal) return agriPopup("Error", "No questions found.");
                setupQuestions(fallbackVal);
            } else {
                setupQuestions(val.data);
            }
        }

        function setupQuestions(dataObj) {
            let rawQuestions = Object.values(dataObj).filter(q => q && (q.question || q.q));
            rawQuestions = shuffleArray(rawQuestions);

            questions = rawQuestions.map(q => {
                let options = q.options || [q.A, q.B, q.C, q.D].filter(Boolean);
                const actualCorrect = q.answer || q.ans;
                const shuffledOpts = shuffleArray([...options]);
                return { ...q, shuffledOpts, actualCorrect };
            });

            initUI();
            setTimeout(() => {
                document.getElementById('app-loader').classList.add('fade-out');
                startGlobalTimer();
            }, 1500);
        }

        function initUI() {
            const grid = document.getElementById('marker-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const p = document.createElement('div');
                p.className = 'q-pill';
                p.id = `mark-${i}`;
                p.innerText = i + 1;
                p.onclick = () => { currentIdx = i; showQ(); };
                grid.appendChild(p);
            });
            showQ();
            lucide.createIcons();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('q-display').innerText = q.question || q.q;
            document.querySelectorAll('.q-pill').forEach((p, i) => {
                p.classList.remove('active');
                if (i === currentIdx) p.classList.add('active');
                p.classList.toggle('done', !!userChoices[i]);
            });
            const optBox = document.getElementById('opts-display');
            optBox.innerHTML = '';
            q.shuffledOpts.forEach(opt => {
                const div = document.createElement('div');
                div.className = `opt-box ${userChoices[currentIdx] === opt ? 'selected' : ''}`;
                div.innerText = opt;
                div.onclick = () => { 
                    userChoices[currentIdx] = (userChoices[currentIdx] === opt) ? null : opt;
                    showQ(); 
                };
                optBox.appendChild(div);
            });
            const activeMark = document.getElementById(`mark-${currentIdx}`);
            if(activeMark) activeMark.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function startGlobalTimer() {
            timer = setInterval(() => {
                if (totalSecondsRemaining <= 0) { 
                    clearInterval(timer); 
                    processFinalResults();
                } else { 
                    totalSecondsRemaining--; 
                    let m = Math.floor(totalSecondsRemaining/60).toString().padStart(2,'0');
                    let s = (totalSecondsRemaining%60).toString().padStart(2,'0');
                    document.getElementById('q-timer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function changeQ(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) { currentIdx = next; showQ(); }
        }

        function submitTest() {
            agriPopup("SUBMIT EXAM", "Ready to deploy answers?", processFinalResults, true);
        }

        async function processFinalResults() {
            if(isSubmitting) return;
            isSubmitting = true;
            clearInterval(timer);

            let score = 0;
            // SYNC FIX: Map the details array so analysis.html can read it
            const details = questions.map((q, i) => {
                const userAns = userChoices[i] || "SKIPPED";
                const isCorrect = userAns === q.actualCorrect;
                if(isCorrect) score++;
                return {
                    question: q.question || q.q,
                    user: userAns,
                    actual: q.actualCorrect
                };
            });

            const accuracy = Math.round((score / questions.length) * 100);

            // SAVE FULL DATA PACKAGE
            localStorage.setItem('agriq_last_result', JSON.stringify({ 
                score, 
                total: questions.length, 
                accuracy,
                module: moduleKey || 'General', 
                details: details,
                timestamp: new Date().toISOString()
            }));

            if(auth.currentUser) await db.ref(`live_sessions/${auth.currentUser.uid}`).remove();
            window.location.href = 'analysis.html';
        }
    </script>
</body>
</html>
