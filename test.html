<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>AgriQ Pro | Active Terminal Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff3b3b;
            --primary-glow: rgba(255, 59, 59, 0.4);
            --bg: #000000;
            --surface: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #222222;
            --danger: #ff3b3b;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- GOLDEN THEME FOR TOP 3 --- */
        body.golden-mode {
            --primary: #ffd700;
            --primary-glow: rgba(255, 215, 0, 0.3);
            --bg: #0a0900;
            --surface: #141200;
            --text-main: #fffbeb;
            --text-dim: #bdae6d;
            --border: #3d3600;
            --glass: rgba(255, 215, 0, 0.05);
        }
        body.golden-mode header { border-bottom: 1px solid #ffd70044; }
        body.golden-mode .timer-badge { border-color: #ffd70088; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        /* ----------------------------- */

        body.focused-mode {
            --primary: #00aaff;
            --primary-glow: rgba(0, 170, 255, 0.3);
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-main: #001a2c;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --glass: rgba(0, 170, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            transition: 0.5s ease; 
        }

        #app-loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .loader-status {
            font-family: 'JetBrains Mono';
            font-size: 10px;
            color: var(--primary);
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
        }

        #custom-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; align-items: center; justify-content: center; z-index: 10000; padding: 24px;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--surface); border: 2px solid var(--border); width: 100%; max-width: 350px;
            border-radius: 28px; padding: 30px; text-align: center;
        }
        .modal-icon { color: var(--primary); margin-bottom: 15px; }
        .modal-title { font-weight: 900; font-size: 18px; margin-bottom: 10px; text-transform: uppercase; }
        .modal-text { font-size: 13px; color: var(--text-dim); margin-bottom: 25px; font-weight: 600; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: var(--border); color: var(--text-dim); }

        header {
            padding: calc(env(safe-area-inset-top) + 15px) 24px 15px; 
            background: var(--surface); 
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000;
        }

        .timer-badge { 
            background: var(--glass); 
            color: var(--primary); 
            padding: 8px 16px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            font-family: 'JetBrains Mono'; 
            font-weight: 800; 
            font-size: 14px;
        }

        main { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; padding-bottom: 180px; }

        .marker-scroll { 
            display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 20px 0; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .marker-scroll::-webkit-scrollbar { display: none; }
        
        .q-pill { 
            min-width: 45px; height: 45px; border-radius: 12px; background: var(--surface); border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--text-dim); flex-shrink: 0;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .q-pill.active { border-color: var(--primary); background: var(--primary-glow); color: var(--primary); }
        .q-pill.done { border-color: var(--success); color: var(--success); }

        .q-card { background: var(--surface); border-radius: 28px; padding: 26px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .opt-box { 
            background: var(--glass); border: 1.5px solid var(--border); padding: 18px; 
            border-radius: 20px; margin-bottom: 12px; font-weight: 700; cursor: pointer; color: var(--text-main);
            transition: 0.2s; font-size: 14px; line-height: 1.4;
        }
        .opt-box.selected { border-color: var(--primary); background: var(--primary); color: #fff; }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 460px; padding: 18px; background: var(--surface);
            backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 1001;
        }

        .btn-row { display: flex; gap: 10px; }
        .btn-primary { 
            flex: 1; padding: 16px; border-radius: 18px; border: none; background: var(--primary); 
            color: #fff; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-sec { 
            flex: 1; padding: 16px; border-radius: 18px; background: var(--glass); 
            color: var(--text-main); border: 1px solid var(--border); font-weight: 800; cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-loader">
        <div id="loader-icon" style="color:var(--primary);"><i data-lucide="zap" size="64" fill="currentColor"></i></div>
        <p class="loader-status">Initializing Terminal...</p>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon-container"><i data-lucide="alert-triangle" size="40"></i></div>
            <div class="modal-title" id="modal-title">System Alert</div>
            <div class="modal-text" id="modal-text">Action required to proceed.</div>
            <div class="modal-actions" id="modal-actions">
                <button class="modal-btn btn-cancel" id="modal-cancel-btn">CANCEL</button>
                <button class="modal-btn btn-confirm" id="modal-confirm-btn">CONFIRM</button>
            </div>
        </div>
    </div>

    <header>
        <div id="student-tag" style="font-weight: 900; font-size: 11px; letter-spacing: 1px; font-family: 'JetBrains Mono'; color: var(--text-dim);">TERMINAL: LOADING</div>
        <div id="q-timer" class="timer-badge">00:00</div>
    </header>

    <main>
        <div id="marker-grid" class="marker-scroll"></div>
        <div class="q-card">
            <div id="q-display" style="font-size: 17px; font-weight: 700; line-height: 1.6;">Synchronizing with Database...</div>
        </div>
        <div id="opts-display"></div>
    </main>

    <div class="controls">
        <div class="btn-row">
            <button class="btn-sec" onclick="changeQ(-1)">PREVIOUS</button>
            <button class="btn-primary" onclick="changeQ(1)">NEXT <i data-lucide="chevron-right" size="18"></i></button>
        </div>
        <button class="btn-primary" style="background:var(--danger); box-shadow: 0 4px 15px var(--primary-glow);" onclick="submitTest()">
            SUBMIT TEST <i data-lucide="check-circle" size="18"></i>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar",
            storageBucket: "agri-mcar.firebasestorage.app",
            messagingSenderId: "823436752104",
            appId: "1:823436752104:web:ea093e4cb836b52d36c55d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let questions = [], currentIdx = 0, userChoices = {}, timer;
        let totalSecondsRemaining = 7200; 
        const moduleKey = new URLSearchParams(window.location.search).get('mod');
        let isSubmitting = false;

        function showModal(title, text, type = 'confirm', onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            const titleEl = document.getElementById('modal-title');
            const textEl = document.getElementById('modal-text');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            titleEl.innerText = title;
            textEl.innerText = text;
            modal.style.display = 'flex';

            if (type === 'alert') {
                cancelBtn.classList.add('hidden');
                confirmBtn.innerText = "ACKNOWLEDGE";
            } else {
                cancelBtn.classList.remove('hidden');
                confirmBtn.innerText = "CONFIRM";
            }

            confirmBtn.onclick = () => {
                modal.style.display = 'none';
                if (onConfirm) onConfirm();
            };
            cancelBtn.onclick = () => {
                modal.style.display = 'none';
            };
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        auth.onAuthStateChanged(async user => {
            if (!user) return window.location.href = 'index.html';
            
            const profileSnap = await db.ref(`students/${user.uid}`).once('value');
            const userData = profileSnap.val();
            if (userData) {
                document.getElementById('student-tag').innerText = `TERMINAL: ${userData.name.toUpperCase()}`;
                
                // --- RANK CHECK FOR GOLDEN THEME ---
                if (userData.rank && userData.rank <= 3) {
                    document.body.classList.add('golden-mode');
                } else if (userData.focusedMode) {
                    document.body.classList.add('focused-mode');
                }
                // -----------------------------------
            }
            loadQuestions();
        });

        async function loadQuestions() {
            try {
                const snap = await db.ref(`subjects/${moduleKey}/questions`).once('value');
                const val = snap.val();
                
                if (!val || !val.data) {
                    const fallbackSnap = await db.ref(`questions/${moduleKey}/data`).once('value');
                    const fallbackVal = fallbackSnap.val();
                    if(!fallbackVal) {
                        showModal("TERMINAL ERROR", "No sequence data found for this module.", "alert", () => {
                            window.location.href = 'index.html';
                        });
                        return;
                    }
                    setupQuestions(fallbackVal);
                } else {
                    setupQuestions(val.data);
                }
            } catch (e) {
                showModal("SYNC ERROR", "Failed to connect to the central hub.", "alert");
            }
        }

        function setupQuestions(dataObj) {
            let rawQuestions = Object.values(dataObj).filter(q => q && (q.question || q.q));
            rawQuestions = shuffleArray(rawQuestions);

            questions = rawQuestions.map(q => {
                let options = q.options || [q.A, q.B, q.C, q.D].filter(Boolean);
                const actualCorrect = q.answer || q.ans;
                const shuffledOpts = shuffleArray([...options]);
                return { ...q, shuffledOpts, actualCorrect };
            });

            initUI();
            setTimeout(() => {
                document.getElementById('app-loader').classList.add('fade-out');
                startGlobalTimer();
                lucide.createIcons();
            }, 1200);
        }

        function initUI() {
            const grid = document.getElementById('marker-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const p = document.createElement('div');
                p.className = 'q-pill';
                p.id = `mark-${i}`;
                p.innerText = i + 1;
                p.onclick = () => { currentIdx = i; showQ(); };
                grid.appendChild(p);
            });
            showQ();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('q-display').innerText = q.question || q.q;
            
            document.querySelectorAll('.q-pill').forEach((p, i) => {
                p.classList.remove('active');
                if (i === currentIdx) p.classList.add('active');
                p.classList.toggle('done', !!userChoices[i]);
            });

            const optBox = document.getElementById('opts-display');
            optBox.innerHTML = '';
            
            q.shuffledOpts.forEach(opt => {
                const div = document.createElement('div');
                div.className = `opt-box ${userChoices[currentIdx] === opt ? 'selected' : ''}`;
                div.innerText = opt;
                div.onclick = () => { 
                    userChoices[currentIdx] = (userChoices[currentIdx] === opt) ? null : opt;
                    showQ(); 
                };
                optBox.appendChild(div);
            });

            const activeMark = document.getElementById(`mark-${currentIdx}`);
            if(activeMark) activeMark.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function startGlobalTimer() {
            timer = setInterval(() => {
                if (totalSecondsRemaining <= 0) { 
                    clearInterval(timer); 
                    processFinalResults();
                } else { 
                    totalSecondsRemaining--; 
                    let m = Math.floor(totalSecondsRemaining/60).toString().padStart(2,'0');
                    let s = (totalSecondsRemaining%60).toString().padStart(2,'0');
                    document.getElementById('q-timer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function changeQ(dir) {
            let next = currentIdx + dir;
            if (next >= 0 && next < questions.length) { 
                currentIdx = next; 
                showQ(); 
            }
        }

        function submitTest() {
            showModal("DEVIATION CHECK", "Are you ready to submit your finalized responses?", "confirm", processFinalResults);
        }

        async function processFinalResults() {
            if(isSubmitting) return;
            isSubmitting = true;
            clearInterval(timer);

            let score = 0;
            const details = questions.map((q, i) => {
                const userAns = userChoices[i] || "SKIPPED";
                const isCorrect = userAns === q.actualCorrect;
                if(isCorrect) score++;
                return {
                    question: q.question || q.q,
                    user: userAns,
                    actual: q.actualCorrect
                };
            });

            const accuracy = Math.round((score / questions.length) * 100);

            localStorage.setItem('agriq_last_result', JSON.stringify({ 
                score, 
                total: questions.length, 
                accuracy,
                module: moduleKey || 'General', 
                details: details,
                timestamp: new Date().toISOString()
            }));

            if(auth.currentUser) {
                await db.ref(`live_sessions/${auth.currentUser.uid}`).remove();
            }
            
            window.location.href = 'analysis.html';
        }
    </script>
</body>
</html>
