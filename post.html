<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>AgriQ Pro | Post Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #8b5cf6; /* Purple theme for Communication Hub */
            --primary-glow: rgba(139, 92, 246, 0.15);
            --bg: #f8fafc; --surface: #ffffff;
            --text-main: #0f172a; --text-dim: #64748b; --border: #e2e8f0;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --glass: rgba(255, 255, 255, 0.85);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        html { scroll-behavior: smooth; }
        
        body { 
            background-color: var(--bg); 
            margin: 0; color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            display: none; /* Controlled by Auth */
            overflow-x: hidden;
        }

        #admin-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #admin-loader.fade-out { opacity: 0; visibility: hidden; transition: 0.6s; }
        
        header {
            padding: 20px 24px; background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: env(safe-area-inset-top); z-index: 1000;
        }

        .brand { font-weight: 900; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;}
        .brand span { color: var(--primary); }

        main { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }

        /* Cards */
        .card { 
            background: var(--surface); border-radius: 28px; padding: 24px; 
            border: 1px solid var(--border); margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); 
        }

        .card-header { 
            font-size: 13px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--text-main); margin-bottom: 20px; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-header .title-wrap { display: flex; align-items: center; gap: 10px; }
        .card-header i { color: var(--primary); }

        /* Inputs & Controls */
        textarea { 
            width: 100%; background: #f8fafc; border: 1.5px solid var(--border); 
            border-radius: 18px; padding: 16px; color: var(--text-main); 
            outline: none; font-size: 14px; font-weight: 600; transition: var(--transition);
            font-family: inherit; resize: vertical; min-height: 120px; margin-bottom: 15px;
        }
        textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px var(--primary-glow); }

        .btn-primary { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            background: var(--primary); color: #fff; font-weight: 900; font-size: 14px;
            cursor: pointer; box-shadow: 0 10px 25px var(--primary-glow); transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-outline { 
            background: #fff; border: 1.5px solid var(--border); color: var(--text-dim); 
            padding: 10px 16px; border-radius: 14px; font-size: 11px; font-weight: 800; 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .btn-outline:active { transform: scale(0.95); background: #f1f5f9; }

        /* List Items */
        .data-pill { 
            padding: 20px; background: #fff; border-radius: 24px; margin-bottom: 15px; 
            border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.01);
            transition: var(--transition);
        }
        .data-pill:hover { border-color: var(--primary); }
        .data-pill-content { font-size: 14px; line-height: 1.6; font-weight: 600; color: var(--text-main); margin: 10px 0 15px; white-space: pre-wrap; }
        .data-pill-meta { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono'; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .data-pill-actions { display: flex; gap: 10px; align-items: center; justify-content: flex-end; padding-top: 15px; border-top: 1px solid #f1f5f9; }

        /* Custom Modal & Toast */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 45, 77, 0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 24px; }
        .modal { background: white; padding: 30px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .modal-btn { padding: 16px 24px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; flex: 1; transition: var(--transition); }
        
        #toast { 
            position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            background: #0f172a; color: white; padding: 14px 24px; border-radius: 50px;
            font-size: 13px; font-weight: 700; display: none; z-index: 10001; animation: slideDown 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="margin-top:0; font-weight:900;">Title</h3>
            <div id="m-body"></div>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button class="modal-btn" style="background:#f1f5f9; color:var(--text-dim);" onclick="closeModal()">CANCEL</button>
                <button class="modal-btn" style="background:var(--primary); color:white" id="m-confirm">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="admin-loader">
        <div style="color:var(--primary);"><i data-lucide="radio" size="54"></i></div>
        <p style="font-family:'JetBrains Mono'; font-size: 10px; color: var(--primary); margin-top: 15px; letter-spacing: 2px; font-weight: 800;">CONNECTING TO COMMS...</p>
    </div>

    <header>
        <div class="brand"><i data-lucide="radio" size="20" style="color: var(--primary);"></i> Comms <span>Hub</span></div>
        <button class="btn-outline" onclick="window.location.href='admin.html'">
            <i data-lucide="arrow-left" size="14"></i> BACK
        </button>
    </header>

    <main>
        <div class="card">
            <div class="card-header">
                <div class="title-wrap"><i data-lucide="pen-tool" size="18"></i> New Broadcast</div>
            </div>
            <textarea id="new-post-content" placeholder="Type your announcement, exam update, or tips here..."></textarea>
            <button class="btn-primary" onclick="publishPost()">
                <i data-lucide="send" size="18"></i> PUBLISH POST
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="title-wrap"><i data-lucide="history" size="18"></i> Broadcast History</div>
            </div>
            <div id="posts-list">
                <div style="text-align:center; padding:20px; color:var(--text-dim); font-size:12px; font-weight:600;">Loading posts...</div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFYdQZI4NXaqtWd4rEz3yL-0nw6PJqG6I",
            authDomain: "agri-mcar.firebaseapp.com",
            databaseURL: "https://agri-mcar-default-rtdb.firebaseio.com",
            projectId: "agri-mcar"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // ---------------- AUTHENTICATION ----------------
        auth.onAuthStateChanged(user => {
            if (user && user.email === 'vishalchalse007@gmail.com') {
                document.body.style.display = 'block';
                initPostManager();
                setTimeout(() => document.getElementById('admin-loader').classList.add('fade-out'), 800);
            } else {
                window.location.href = "index.html"; 
            }
        });

        function initPostManager() {
            lucide.createIcons();
            loadPosts();
        }

        // ---------------- CREATE POST ----------------
        function publishPost() {
            const content = document.getElementById('new-post-content').value.trim();
            if(!content) return showToast("Post content cannot be empty!", "error");

            showAppModal("PUBLISH BROADCAST", `<p style="color:var(--text-dim); font-size:14px; font-weight:600;">Push this message to all student dashboards?</p>`, () => {
                const postData = {
                    content: content,
                    timestamp: Date.now(),
                    author: "Official AgriQ Admin"
                };

                db.ref('posts').push(postData).then(() => {
                    showToast("Broadcast Live!", "success");
                    document.getElementById('new-post-content').value = "";
                    closeModal();
                }).catch(err => showToast("Error publishing post.", "error"));
            });
        }

        // ---------------- LOAD POSTS ----------------
        function loadPosts() {
            db.ref('posts').on('value', snap => {
                const container = document.getElementById('posts-list');
                container.innerHTML = "";
                
                if(!snap.exists()) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-dim); font-size:12px; font-weight:600;">No broadcast history found.</div>`;
                    return;
                }

                // Convert to array and sort by newest first
                const postsArr = [];
                snap.forEach(child => { postsArr.push({ key: child.key, ...child.val() }); });
                postsArr.sort((a, b) => b.timestamp - a.timestamp);

                postsArr.forEach(post => {
                    const dateStr = new Date(post.timestamp).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    
                    const pill = document.createElement('div');
                    pill.className = "data-pill";
                    pill.innerHTML = `
                        <div class="data-pill-meta">
                            <i data-lucide="clock" size="12"></i> ${dateStr}
                        </div>
                        <div class="data-pill-content">${escapeHTML(post.content)}</div>
                        <div class="data-pill-actions">
                            <button class="btn-outline" onclick="openEditModal('${post.key}', '${escapeQuotes(post.content)}')"><i data-lucide="edit-3" size="14"></i> EDIT</button>
                            <button class="btn-outline" style="color:var(--danger); border-color:rgba(239, 68, 68, 0.2);" onclick="confirmDelete('${post.key}')"><i data-lucide="trash-2" size="14"></i></button>
                        </div>
                    `;
                    container.appendChild(pill);
                });
                lucide.createIcons();
            });
        }

        // ---------------- EDIT POST ----------------
        function openEditModal(key, currentContent) {
            document.getElementById('m-title').innerText = "EDIT BROADCAST";
            
            // Inject textarea into modal body
            document.getElementById('m-body').innerHTML = `
                <textarea id="edit-post-textarea" style="width:100%; min-height:120px; padding:15px; border-radius:16px; border:1.5px solid var(--border); font-family:inherit; font-size:14px; font-weight:600; outline:none; resize:vertical; color:var(--text-main); margin-bottom:10px;"></textarea>
            `;
            document.getElementById('edit-post-textarea').value = unescapeHTML(currentContent);
            
            document.getElementById('m-confirm').style.background = 'var(--primary)';
            document.getElementById('m-confirm').innerText = "SAVE CHANGES";
            document.getElementById('modal-overlay').style.display = 'flex';
            
            document.getElementById('m-confirm').onclick = () => {
                const newContent = document.getElementById('edit-post-textarea').value.trim();
                if(!newContent) return showToast("Content cannot be empty!", "error");

                db.ref(`posts/${key}`).update({ content: newContent }).then(() => {
                    showToast("Post Updated successfully!");
                    closeModal();
                });
            };
        }

        // ---------------- DELETE POST ----------------
        function confirmDelete(key) {
            document.getElementById('m-title').innerText = "DELETE POST";
            document.getElementById('m-body').innerHTML = `<p style="color:var(--text-dim); font-size:14px; font-weight:600;">Are you sure you want to permanently delete this broadcast?</p>`;
            document.getElementById('m-confirm').style.background = 'var(--danger)';
            document.getElementById('m-confirm').innerText = "DELETE";
            
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('m-confirm').onclick = () => {
                db.ref(`posts/${key}`).remove().then(() => {
                    showToast("Post deleted.");
                    closeModal();
                });
            };
        }

        // ---------------- UTILS ----------------
        function showAppModal(title, textHTML, onConfirm) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-body').innerHTML = textHTML;
            document.getElementById('m-confirm').style.background = 'var(--primary)'; // reset
            document.getElementById('m-confirm').innerText = "CONFIRM";
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('m-confirm').onclick = onConfirm;
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            if(type === 'error') t.style.background = 'var(--danger)';
            else if(type === 'success') t.style.background = 'var(--success)';
            else t.style.background = '#0f172a';
            
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function escapeHTML(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        function unescapeHTML(str) { return str.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#039;/g, "'"); }
        function escapeQuotes(str) { return str.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n'); }
    </script>
</body>
</html>
